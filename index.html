  padding: 3px 8px;
  border-radius: 6px;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.pc-emergency-body {
  flex: 1;
  display: flex !important;
  flex-direction: column;
  justify-content: center;
  gap: 6px !important;
}
.pc-em-line {
  display: block;
  font-size: 15px !important;
  font-weight: 800 !important;
  color: #1A0F0D !important;
  line-height: 1.45 !important;
  letter-spacing: -0.02em !important;
  word-break: keep-all;
}
/* 첫 줄(맥락 설명)은 조금 더 작게, 둘째 줄(액션)은 더 강조 */
.pc-em-line:first-child {
  font-size: 13.5px !important;
  font-weight: 700 !important;
  color: #4A2E1A !important;
  opacity: 0.85;
}
.pc-em-line:last-child {
  font-size: 16px !important;
  font-weight: 900 !important;
}

/* =========================================================
   V63 — 알림 무음영 회색, 안내창 와이드 + 텍스트 통일,
          헤더 질문에 ? 아이콘
   ========================================================= */

/* ------------------------------------------------------------------
   1) 알림방 카드 — 무음영, 밝은 회색, 시간 X
       기존 직원 채팅창처럼 plain text 위주
   ------------------------------------------------------------------ */
.notice-card .chat-feed {
  background: var(--paper) !important;     /* 밝은 베이지 페이퍼 */
  padding: 14px 14px !important;
  gap: 8px !important;
}
.notice-card .chat-msg.system .body {
  background: var(--cream-2) !important;   /* 밝은 회색 톤 */
  border: none !important;
  border-left: none !important;
  border-radius: 10px !important;
  padding: 9px 13px !important;
  box-shadow: none !important;             /* 무음영 */
  max-width: 100% !important;
}
.notice-card .chat-msg.system .body .txt {
  background: none !important;
  padding: 0 !important;
  font-size: 12.5px !important;
  font-weight: 500 !important;
  color: var(--ink-2) !important;
  line-height: 1.5 !important;
  text-align: left !important;
  letter-spacing: -0.01em;
}
.notice-card .chat-msg.system .body .time { display: none !important; }

/* ------------------------------------------------------------------
   2) 안전안내문자 — 본문 너비 확장 + 두 줄 동일 스타일(검정/굵게)
       창의 너비를 옆으로 더 키워 2줄이 한눈에 들어오게
   ------------------------------------------------------------------ */
.pc-emergency {
  max-width: none !important;             /* 가로 제한 해제 */
  width: calc(100% - 14px) !important;    /* 폰 내부 거의 풀폭 */
  min-height: 0 !important;               /* 본문 길이만큼만 */
  padding: 14px 16px 14px !important;
}
.pc-emergency-body {
  gap: 4px !important;
  justify-content: flex-start !important;
}
/* 두 줄 모두 같은 톤: 검정 + 굵게 + 동일 사이즈 */
.pc-em-line,
.pc-emergency-body .pc-em-line:first-child,
.pc-emergency-body .pc-em-line:last-child {
  display: block !important;
  font-size: 14px !important;
  font-weight: 800 !important;
  color: #1A0F0D !important;
  line-height: 1.5 !important;
  letter-spacing: -0.02em !important;
  opacity: 1 !important;
  word-break: keep-all;
}

/* ------------------------------------------------------------------
   3) 휴대폰 헤더 — 질문 ? 아이콘 + 레이아웃
   ------------------------------------------------------------------ */
.phone-screen .pc-head {
  display: flex !important;
  flex-direction: row !important;
  align-items: center !important;
  gap: 12px !important;
  padding: 16px 14px 14px !important;
  text-align: left !important;
}
.pc-q-icon {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #FF6B5A, #FF8A7A);
  color: #fff;
  border-radius: 50%;
  box-shadow: 0 4px 14px -3px rgba(255, 107, 90, 0.5);
  position: relative;
  animation: pc-q-bob 2.4s ease-in-out infinite;
}
.pc-q-icon::before {
  /* 살짝 떠 있는 후광 */
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 107, 90, 0.25), transparent 65%);
  z-index: -1;
  animation: pc-q-glow 2.4s ease-in-out infinite;
}
@keyframes pc-q-bob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-3px); }
}
@keyframes pc-q-glow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.12); }
}
/* 질문 텍스트는 좌측 정렬로 변경 */
.phone-screen .pc-head .pc-rule-bigger {
  flex: 1;
  text-align: left !important;
  align-items: flex-start !important;
}
.pc-rule-line { text-align: left !important; }

/* =========================================================
   V64 — 알림방 테두리 제거 + 카드 단축, 스크롤 가시화,
          안내창 가로 미세 축소, 안내 다시보기 토글 아이콘
   ========================================================= */

/* ------------------------------------------------------------------
   1) 알림방 카드 — 알림창 테두리 완전 제거 + 카드 길이 축소
   ------------------------------------------------------------------ */
.notice-card.chat-card.tall { min-height: 440px !important; }
.notice-card .chat-feed {
  min-height: 280px !important;
  max-height: 340px !important;
  background: #fff !important;            /* 깔끔한 흰 배경 */
  padding: 12px 12px !important;
  gap: 6px !important;
}
.notice-card .chat-msg.system .body {
  background: #F2EEE5 !important;         /* 따뜻한 옅은 회색 */
  border: none !important;
  border-left: none !important;
  border-radius: 8px !important;
  padding: 8px 12px !important;
  box-shadow: none !important;
  outline: none !important;
}
.notice-card .chat-msg.system .body .txt {
  font-size: 12px !important;
  font-weight: 500 !important;
  color: var(--ink-2) !important;
  line-height: 1.5 !important;
}

/* ------------------------------------------------------------------
   2) 스크롤바 — 보이게 (밝은 회색, hover 시 진하게)
   ------------------------------------------------------------------ */
.scroll-y { 
  scrollbar-width: thin !important;
  scrollbar-color: rgba(45, 27, 61, 0.28) transparent !important;
}
.scroll-y::-webkit-scrollbar { 
  width: 8px !important; 
  height: 8px !important;
}
.scroll-y::-webkit-scrollbar-track {
  background: rgba(45, 27, 61, 0.04) !important;
  border-radius: 4px !important;
}
.scroll-y::-webkit-scrollbar-thumb {
  background: rgba(45, 27, 61, 0.28) !important;
  border-radius: 4px !important;
  border: 1px solid transparent;
  background-clip: padding-box;
}
.scroll-y::-webkit-scrollbar-thumb:hover {
  background: rgba(45, 27, 61, 0.5) !important;
  background-clip: padding-box;
}
/* 휴대폰 폰 채팅의 스크롤은 더 잘 보이게 */
.phone-screen .pc-feed::-webkit-scrollbar {
  width: 7px !important;
}
.phone-screen .pc-feed::-webkit-scrollbar-thumb {
  background: rgba(45, 27, 61, 0.35) !important;
  border-radius: 4px !important;
}
.phone-screen .pc-feed::-webkit-scrollbar-thumb:hover {
  background: rgba(45, 27, 61, 0.55) !important;
}

/* ------------------------------------------------------------------
   3) 노란 안내창 — 가로 너비 약간만 축소
       (v63에서 calc(100% - 14px) → 좀 더 들여서)
   ------------------------------------------------------------------ */
.pc-emergency {
  width: calc(100% - 28px) !important;    /* 양옆 약간씩 들여서 */
  max-width: 340px !important;
}

/* ------------------------------------------------------------------
   4) 헤더 우측 — 안내 다시보기 토글 버튼
   ------------------------------------------------------------------ */
.pc-notice-toggle {
  flex-shrink: 0;
  position: relative;
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #FFE600;
  border: 2px solid #C1352D;
  color: #C1352D;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: all 0.18s ease;
  box-shadow: 0 3px 10px -3px rgba(193, 53, 45, 0.4);
}
.pc-notice-toggle:hover {
  transform: translateY(-1px) scale(1.04);
  box-shadow: 0 6px 14px -3px rgba(193, 53, 45, 0.55);
}
.pc-notice-toggle.is-open {
  background: #C1352D;
  color: #FFE600;
  border-color: #C1352D;
}
.pc-notice-toggle .pc-notice-dot {
  position: absolute;
  top: -3px;
  right: -3px;
  width: 9px;
  height: 9px;
  background: #C1352D;
  border: 1.5px solid #fff;
  border-radius: 50%;
  animation: pc-notice-dot-pulse 1.4s ease-in-out infinite;
}
.pc-notice-toggle.is-open .pc-notice-dot { display: none; }
@keyframes pc-notice-dot-pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.3); opacity: 0.7; }
}

/* =========================================================
   V65 — 안내창 블록형(피드 밖) + 와이드,
          알림 카드 음영/배경 완전 제거
   ========================================================= */

/* ------------------------------------------------------------------
   1) 안내창을 pc-feed 밖으로 빼서 블록 요소로 배치
       - 메시지창은 그대로 유지, 토글로 위/아래로 펼침
       - position: absolute 해제 → 자연스러운 인-플로우
   ------------------------------------------------------------------ */
.pc-emergency-block {
  position: static !important;
  top: auto !important;
  left: auto !important;
  transform: none !important;
  margin: 8px auto 0 !important;
  width: calc(100% - 16px) !important;     /* 좌우 여백 줄여서 와이드 */
  max-width: none !important;
  min-height: 0 !important;
  display: flex !important;
  flex-direction: column !important;
  flex-shrink: 0 !important;
  animation: pc-emergency-pulse 1.6s ease-in-out infinite, pc-em-slidedown 0.28s ease-out;
}
@keyframes pc-em-slidedown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
/* phone-screen는 column flex이므로 banner가 head 바로 아래에 자연스럽게 위치 */

/* ------------------------------------------------------------------
   2) 알림방 — 카드별 음영/배경 완전 제거 (텍스트 row 형태)
   ------------------------------------------------------------------ */
.notice-card .chat-feed {
  background: #fff !important;
  padding: 8px 14px !important;
  gap: 0 !important;
}
.notice-card .chat-msg.system {
  margin: 0 !important;
  padding: 0 !important;
}
.notice-card .chat-msg.system .body {
  background: none !important;
  background-color: transparent !important;
  border: none !important;
  border-radius: 0 !important;
  padding: 10px 0 !important;
  box-shadow: none !important;
  outline: none !important;
  border-bottom: 1px dashed rgba(45, 27, 61, 0.08) !important;  /* 줄 구분만 가는 점선 */
}
.notice-card .chat-msg.system:last-child .body {
  border-bottom: none !important;
}
.notice-card .chat-msg.system .body .txt {
  background: none !important;
  background-color: transparent !important;
  padding: 0 !important;
  font-size: 12.5px !important;
  font-weight: 500 !important;
  color: var(--ink-2) !important;
  line-height: 1.55 !important;
  letter-spacing: -0.01em !important;
}

/* =========================================================
   V66 — 알림 카드: 둥근 핀형 + 매우 연한 음영 (테두리 X),
          노란 안내창 컴팩트화
   ========================================================= */

/* ------------------------------------------------------------------
   1) 알림방 — 각 알림 둥근 핀(pill) 모양, 테두리 없음, 음영 매우 연하게
   ------------------------------------------------------------------ */
.notice-card .chat-feed {
  background: #FAF6EE !important;          /* 옅은 페이퍼 */
  padding: 12px 14px !important;
  gap: 8px !important;
}
.notice-card .chat-msg.system {
  margin: 0 !important;
  padding: 0 !important;
}
.notice-card .chat-msg.system .body {
  background: #fff !important;             /* 흰 핀 */
  border: none !important;
  border-left: none !important;
  border-bottom: none !important;          /* v65 점선 구분선 제거 */
  border-radius: 14px !important;
  padding: 11px 16px !important;
  box-shadow: 0 1px 2px rgba(45, 27, 61, 0.04),
              0 1px 1px rgba(45, 27, 61, 0.02) !important;
  outline: none !important;
}
.notice-card .chat-msg.system .body .txt {
  font-size: 12.5px !important;
  font-weight: 500 !important;
  color: var(--ink) !important;
  line-height: 1.5 !important;
}

/* ------------------------------------------------------------------
   2) 노란 안내창 — 컴팩트화 (작아진 사이즈)
   ------------------------------------------------------------------ */
.pc-emergency.pc-emergency-block {
  width: calc(100% - 28px) !important;     /* 좌우 더 들여서 너비 ↓ */
  max-width: 320px !important;
  margin: 10px auto 4px !important;
  padding: 10px 13px 10px !important;      /* 내부 패딩 14→10 */
  border-width: 2.5px !important;
}
/* 헤더 라인 컴팩트 */
.pc-emergency-block .pc-emergency-head {
  padding-bottom: 7px !important;
  margin-bottom: 8px !important;
  gap: 5px !important;
}
.pc-emergency-block .pc-emergency-icon {
  width: 18px !important;
  height: 18px !important;
  font-size: 12px !important;
  border-radius: 4px !important;
}
.pc-emergency-block .pc-emergency-tag {
  font-size: 11px !important;
  letter-spacing: 0.02em !important;
}
.pc-emergency-block .pc-emergency-recipient {
  font-size: 9.5px !important;
  padding: 2px 6px !important;
  border-radius: 5px !important;
}
/* 본문 2줄 모두 동일 + 컴팩트 */
.pc-emergency-block .pc-emergency-body { gap: 2px !important; }
.pc-emergency-block .pc-em-line,
.pc-emergency-block .pc-emergency-body .pc-em-line:first-child,
.pc-emergency-block .pc-emergency-body .pc-em-line:last-child {
  font-size: 12.5px !important;
  font-weight: 800 !important;
  color: #1A0F0D !important;
  line-height: 1.45 !important;
  letter-spacing: -0.02em !important;
  opacity: 1 !important;
}

/* =========================================================
   V67 — 안내창 센터 복귀 + 글씨 ↑,
          알림방 다크톤 음영(테두리 X), 섹션 간격
   ========================================================= */

/* ------------------------------------------------------------------
   1) 안내창 — pc-feed 내부에서 absolute 센터로 복귀 + 글씨 키움
   ------------------------------------------------------------------ */
.pc-emergency {
  position: absolute !important;
  top: 50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%) !important;
  margin: 0 !important;
  width: calc(100% - 28px) !important;
  max-width: 320px !important;
  min-height: 0 !important;
  padding: 14px 16px 14px !important;
  z-index: 12 !important;
  animation: pc-emergency-pulse 1.6s ease-in-out infinite !important;
}
/* 헤더 — 살짝 키움 */
.pc-emergency .pc-emergency-head {
  padding-bottom: 9px !important;
  margin-bottom: 11px !important;
  gap: 6px !important;
}
.pc-emergency .pc-emergency-icon {
  width: 20px !important;
  height: 20px !important;
  font-size: 13px !important;
}
.pc-emergency .pc-emergency-tag {
  font-size: 12.5px !important;
}
.pc-emergency .pc-emergency-recipient {
  font-size: 11px !important;
  padding: 3px 7px !important;
}
/* 본문 두 줄 모두 — 더 크게 */
.pc-emergency .pc-emergency-body { gap: 4px !important; }
.pc-emergency .pc-em-line,
.pc-emergency .pc-emergency-body .pc-em-line:first-child,
.pc-emergency .pc-emergency-body .pc-em-line:last-child {
  font-size: 15.5px !important;
  font-weight: 800 !important;
  color: #1A0F0D !important;
  line-height: 1.5 !important;
  letter-spacing: -0.02em !important;
  opacity: 1 !important;
}

/* feed 내부의 :first-child margin-top: auto 규칙은 absolute 배너에 영향 X */
.phone-screen .pc-feed > .pc-emergency {
  margin-top: 0 !important;
}

/* ------------------------------------------------------------------
   2) 알림방 — 다크 톤(우측 패널 다크 테마 안에서)
       각 알림 핀의 음영을 뒷배경 다크색에 가깝게 (잘 안 보이게), 테두리 X
   ------------------------------------------------------------------ */
/* 알림 피드 영역 — 다크 패널 위에서 투명으로 */
.right .notice-card .chat-feed,
.notice-card .chat-feed {
  background: transparent !important;
  padding: 12px 12px !important;
  gap: 8px !important;
}

/* 각 알림 핀 — 어두운 배경 위 살짝 들떠 보이는 정도, 테두리 없음 */
.right .notice-card .chat-msg.system .body,
.notice-card .chat-msg.system .body {
  background: rgba(255, 255, 255, 0.05) !important;   /* 다크에서 살짝 들뜬 톤 */
  border: none !important;
  border-left: none !important;
  border-bottom: none !important;
  border-top: none !important;
  outline: none !important;
  border-radius: 14px !important;
  padding: 10px 14px !important;
  /* 음영: 뒷배경 다크색과 거의 같은 톤으로 → 잘 안 보임 */
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25),
              inset 0 1px 0 rgba(255, 255, 255, 0.025) !important;
}
/* 알림 텍스트 — 다크 위 밝은 톤 */
.right .notice-card .chat-msg.system .body .txt,
.notice-card .chat-msg.system .body .txt {
  color: rgba(255, 255, 255, 0.88) !important;
  font-size: 12.5px !important;
  font-weight: 500 !important;
  line-height: 1.5 !important;
  letter-spacing: -0.01em !important;
  background: none !important;
}

/* =========================================================
   V68 — 알림방 메시지 풀폭, 노란 안내창 풀폭
   ========================================================= */

/* ------------------------------------------------------------------
   1) 알림방 — 메시지를 좌우 가득 채우기 (양옆 4px만 띄움)
   ------------------------------------------------------------------ */
.right .notice-card .chat-feed,
.notice-card .chat-feed {
  padding: 12px 4px !important;     /* 좌우 12 → 4 */
  gap: 6px !important;
}
.right .notice-card .chat-msg.system,
.notice-card .chat-msg.system {
  width: 100% !important;
  margin: 0 !important;
}
.right .notice-card .chat-msg.system .body,
.notice-card .chat-msg.system .body {
  width: 100% !important;
  max-width: 100% !important;
  padding: 10px 14px !important;
  border-radius: 12px !important;
}

/* ------------------------------------------------------------------
   2) 노란 안내창 — 좌우 풀폭에 가깝게 (양옆 6px만)
   ------------------------------------------------------------------ */
.pc-emergency {
  width: calc(100% - 12px) !important;   /* 양옆 6px만 띄움 */
  max-width: none !important;            /* 320px 상한 해제 */
}

/* =========================================================
   V69 — 알림 메시지 모든 테두리 강제 제거 + 안내창 양옆 7px
   ========================================================= */

/* ------------------------------------------------------------------
   1) 알림 메시지 — 어떤 상태에서도 보더/아웃라인 0
       (.txt 내부 잔존 border-color, hover/focus 등 모든 경로 차단)
   ------------------------------------------------------------------ */
.right .notice-card .chat-msg,
.notice-card .chat-msg,
.right .notice-card .chat-msg .body,
.notice-card .chat-msg .body,
.right .notice-card .chat-msg .body .txt,
.notice-card .chat-msg .body .txt,
.right .notice-card .chat-msg.system,
.notice-card .chat-msg.system,
.right .notice-card .chat-msg.system .body,
.notice-card .chat-msg.system .body,
.right .notice-card .chat-msg.system .body .txt,
.notice-card .chat-msg.system .body .txt {
  border: 0 !important;
  border-top: 0 !important;
  border-right: 0 !important;
  border-bottom: 0 !important;
  border-left: 0 !important;
  border-color: transparent !important;
  border-style: none !important;
  border-width: 0 !important;
  outline: none !important;
  outline-color: transparent !important;
}

/* ------------------------------------------------------------------
   2) 노란 안내창 — 양옆 7px (was 6px) → v70b: 너비를 v69 대비 85%로 축소
       (v69 width = calc(100% - 14px) ≈ 95% → ×0.85 ≈ 80.75% of feed)
   ------------------------------------------------------------------ */
.pc-emergency {
  width: calc((100% - 14px) * 0.85) !important;
}

/* =========================================================
   V71 — 행동 지향점 01/02 라벨 복원
   ========================================================= */

/* ------------------------------------------------------------------
   pc-no-small 라벨 다시 표시 + 코랄 그라데이션 핀 스타일
   (섹션 마커 02 와 동일한 톤으로 위계 통일)
   ------------------------------------------------------------------ */
.pc-no-small {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  background: linear-gradient(135deg, #FF6B5A, #FF8A7A) !important;
  color: #fff !important;
  font-family: var(--f-display) !important;
  font-style: italic !important;
  font-size: 11px !important;
  font-weight: 800 !important;
  letter-spacing: 0.06em !important;
  padding: 3px 11px !important;
  border-radius: 7px !important;
  border: none !important;
  box-shadow: 0 3px 9px -3px rgba(255, 107, 90, 0.5) !important;
  text-transform: none;
  line-height: 1.1 !important;
  align-self: flex-start;
  margin-bottom: 10px;
}

/* 헤더 레이아웃 — 라벨(컬럼 상단) + row(아이콘 + 질문 + 토글) */
.phone-screen .pc-head {
  flex-direction: column !important;
  align-items: stretch !important;
  padding: 14px 14px 14px !important;
  gap: 0 !important;
}
.pc-head-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
}

/* =========================================================
   V72 — 행동지향점 흑백 단조, 메시지 하단 고정,
          Step 01 후보 강조 + 클릭 유도
   ========================================================= */

/* ------------------------------------------------------------------
   1) 행동 지향점 라벨 — 흑백 단조 톤 (튀지 않게)
   ------------------------------------------------------------------ */
.pc-no-small {
  background: var(--ink) !important;             /* 진한 잉크 */
  color: rgba(255, 255, 255, 0.92) !important;
  font-style: normal !important;
  font-family: var(--f-body), system-ui, sans-serif !important;
  font-weight: 700 !important;
  letter-spacing: 0.05em !important;
  box-shadow: none !important;
  border: 1px solid rgba(0, 0, 0, 0.1) !important;
}

/* ------------------------------------------------------------------
   2) 휴대폰 채팅 — 안내창 토글 시에도 메시지가 하단에 고정
       기존: pc-emergency가 :first-child면 그게 margin-top:auto를 먹어
              뒤따르는 메시지가 위로 올라감.
       수정: pc-emergency는 absolute(흐름 영향 X) → 무효화하고,
              pc-emergency 다음 sibling이 margin-top:auto 받게 함
   ------------------------------------------------------------------ */
.phone-screen .pc-feed > .pc-emergency {
  margin-top: 0 !important;
}
.phone-screen .pc-feed > .pc-emergency + * {
  margin-top: auto !important;
}

/* ------------------------------------------------------------------
   3) RULE Step 01 — 후보 박스 강조 + 클릭 유도
   ------------------------------------------------------------------ */
/* 클릭 유도 헤더 안내 문구 */
.cand-click-hint {
  margin-top: 10px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  background: linear-gradient(135deg, rgba(255, 230, 0, 0.18), rgba(255, 196, 0, 0.10));
  border: 1px solid rgba(193, 53, 45, 0.25);
  border-radius: 10px;
  font-size: 12.5px;
  color: var(--ink);
  font-weight: 600;
  animation: cch-glow 2.2s ease-in-out infinite;
}
.cand-click-hint b { color: var(--coral); font-weight: 800; }
.cch-finger {
  display: inline-block;
  font-size: 16px;
  animation: cch-tap 1.4s ease-in-out infinite;
  transform-origin: 70% 70%;
}
@keyframes cch-tap {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  35%      { transform: translateY(-2px) rotate(-8deg); }
  55%      { transform: translateY(2px) rotate(6deg); }
}
@keyframes cch-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255, 196, 0, 0.25); }
  50%      { box-shadow: 0 0 0 6px rgba(255, 196, 0, 0); }
}

/* 후보 카드 — 일반 상태에서 강조된 음영 */
.candidates .cand,
.candidates .cand.cand-neutral {
  box-shadow:
    0 6px 18px -6px rgba(45, 27, 61, 0.18),
    0 2px 4px -1px rgba(45, 27, 61, 0.08) !important;
  transition: all 0.2s ease;
}
.candidates .cand:hover,
.candidates .cand.cand-neutral:hover {
  transform: translateY(-3px);
  box-shadow:
    0 14px 30px -10px rgba(45, 27, 61, 0.28),
    0 4px 8px -2px rgba(45, 27, 61, 0.12) !important;
  cursor: pointer;
}

/* 선택 대기 상태(아직 아무것도 안 골랐을 때) — 카드들이 살짝 펄스 */
.candidates.awaiting-pick .cand {
  animation: cand-await-pulse 2.4s ease-in-out infinite;
  cursor: pointer;
}
.candidates.awaiting-pick .cand:nth-child(2) { animation-delay: 0.2s; }
.candidates.awaiting-pick .cand:nth-child(3) { animation-delay: 0.4s; }
@keyframes cand-await-pulse {
  0%, 100% {
    box-shadow:
      0 6px 18px -6px rgba(45, 27, 61, 0.18),
      0 2px 4px -1px rgba(45, 27, 61, 0.08),
      0 0 0 0 rgba(255, 107, 90, 0);
  }
  50% {
    box-shadow:
      0 10px 24px -8px rgba(45, 27, 61, 0.22),
      0 3px 6px -1px rgba(45, 27, 61, 0.10),
      0 0 0 4px rgba(255, 107, 90, 0.18);
  }
}

/* 선택 상태 — 코랄 강조 보더 + 짙은 그림자 */
.candidates .cand.selected,
.candidates .cand.cand-neutral.selected {
  animation: none !important;
  border-color: var(--coral) !important;
  box-shadow:
    0 12px 28px -8px rgba(255, 107, 90, 0.35),
    0 0 0 2px var(--coral),
    0 3px 8px -2px rgba(45, 27, 61, 0.12) !important;
  transform: translateY(-2px);
}

/* =========================================================
   V73 — 리더 메시지: 채팅 말풍선(텍스트 메시지) 스타일
   ========================================================= */

/* 카드 자체 — 부드러운 채팅창 느낌 */
.leader-card.lc-chat {
  background: var(--paper) !important;
  border: 1px solid var(--line) !important;
  border-radius: 18px !important;
  padding: 18px 18px 14px !important;
  box-shadow: 0 4px 14px -6px rgba(45, 27, 61, 0.10);
}
/* 좌측 컬러 액센트 바는 그대로 유지(::before) — 메시지 톤 컬러 식별 */

/* 메인 row: 프로필 좌측 / 콘텐츠 우측 */
.lc-chat .lc-chat-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

/* 프로필 아바타 — 좌측 큰 원형 */
.lc-chat .lc-chat-avatar {
  flex-shrink: 0;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  box-shadow: 0 3px 8px -2px rgba(45, 27, 61, 0.2);
  border: 2px solid #fff;
  outline: 1px solid var(--line);
}
.lc-chat .lc-chat-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* 콘텐츠 컬럼: 메타 + 말풍선 row */
.lc-chat .lc-chat-content {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* 메타: 이름 / 역할 / 시간 */
.lc-chat .lc-chat-meta {
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
  padding-left: 4px;
}
.lc-chat .lc-chat-name {
  font-size: 14px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.lc-chat .lc-chat-role {
  font-size: 11.5px;
  color: var(--ink-3);
  font-weight: 500;
}
.lc-chat .lc-chat-time {
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 500;
  opacity: 0.75;
  margin-left: auto;
}

/* 말풍선 row: 말풍선 + 우측 공감 버튼 */
.lc-chat .lc-chat-bubble-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

/* 말풍선 본체 — 좌측 꼬리 달린 채팅 버블 */
.lc-chat .lc-chat-bubble {
  position: relative;
  flex: 1;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 4px 18px 18px 18px;     /* 좌상 꼬리 부분만 sharp */
  padding: 12px 16px;
  box-shadow: 0 2px 8px -3px rgba(45, 27, 61, 0.08);
}
/* 좌측 위 작은 꼬리(삼각형) — 프로필 방향 */
.lc-chat .lc-chat-bubble::before {
  content: "";
  position: absolute;
  top: 0;
  left: -7px;
  width: 12px;
  height: 12px;
  background: #fff;
  border-left: 1px solid var(--line);
  border-top: 1px solid var(--line);
  border-top-left-radius: 2px;
  clip-path: polygon(0 0, 100% 0, 0 100%);
  transform: translateY(2px);
}

/* 카드별 액센트 — 말풍선 좌측 보더 컬러 */
.leader-card.lc-chat.c1 .lc-chat-bubble { border-left: 3px solid var(--coral); }
.leader-card.lc-chat.c2 .lc-chat-bubble { border-left: 3px solid var(--lilac); }
.leader-card.lc-chat.c3 .lc-chat-bubble { border-left: 3px solid var(--mint); }
.leader-card.lc-chat.c1 .lc-chat-bubble::before { border-left-color: var(--coral); }
.leader-card.lc-chat.c2 .lc-chat-bubble::before { border-left-color: var(--lilac); }
.leader-card.lc-chat.c3 .lc-chat-bubble::before { border-left-color: var(--mint); }

/* 메시지 텍스트 */
.lc-chat .lc-chat-msg {
  margin: 0 !important;
  font-size: 13.5px;
  line-height: 1.65;
  color: var(--ink);
  letter-spacing: -0.01em;
  word-break: keep-all;
  white-space: pre-wrap;
}

/* 공감(♥) 버튼 — 말풍선 하단 우측에 작게 */
.lc-chat .lc-chat-like {
  flex-shrink: 0;
  align-self: flex-end;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 5px 10px;
  border-radius: 999px;
  background: #fff;
  border: 1px solid var(--line);
  font-size: 11.5px;
  font-weight: 700;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: 0 2px 5px -2px rgba(45, 27, 61, 0.08);
}
.lc-chat .lc-chat-like .lk-icon { font-size: 12.5px; }
.lc-chat .lc-chat-like:hover {
  border-color: var(--coral);
  color: var(--coral);
  transform: translateY(-1px);
}
.lc-chat .lc-chat-like.liked {
  background: var(--coral);
  border-color: var(--coral);
  color: #fff;
}

/* 댓글 입력란/댓글 블록은 카드 하단에 그대로 — 위에 살짝 여백 */
.leader-card.lc-chat .leader-cmt-input-stable {
  margin-top: 14px !important;
}

/* 기존 .leader-top, .leader-msg 스타일 충돌 방지(우리는 사용 안 함) */
.leader-card.lc-chat .leader-top,
.leader-card.lc-chat > .leader-msg {
  display: none !important;
}

/* =========================================================
   V74 — 리더 메시지: 한 행에 한 명씩 세로 배열
   ========================================================= */

.talk-leaders {
  display: flex !important;
  flex-direction: column !important;
  grid-template-columns: none !important;     /* grid 잔재 해제 */
  gap: 16px !important;
  align-items: stretch !important;
}

/* =========================================================
   V75 — 말풍선 꼬리 제거(아티팩트 수정), 배경 별 제거,
          안내창 연한 노란/중앙정렬/수신 제거
   ========================================================= */

/* ------------------------------------------------------------------
   1) 말풍선 꼬리(::before) 완전 제거 — 깨지는 모양 방지
       프로필이 좌측에 큰 원형으로 있으므로 꼬리 없이도 대화 느낌 충분
   ------------------------------------------------------------------ */
.lc-chat .lc-chat-bubble::before,
.lc-chat .lc-chat-bubble::after {
  content: none !important;
  display: none !important;
}
/* 좌상 모서리도 다른 모서리와 동일하게 부드럽게 */
.lc-chat .lc-chat-bubble {
  border-radius: 14px !important;
}

/* 시간 표시도 CSS에서 안전망으로 숨김 */
.lc-chat .lc-chat-time { display: none !important; }

/* ------------------------------------------------------------------
   2) 배경 별/별똥별 모두 제거
   ------------------------------------------------------------------ */
.bg-stars,
.bg-stars *,
.bg-star,
.hero-bg-stars,
.hero-bg-stars * {
  display: none !important;
}

/* ------------------------------------------------------------------
   3) 노란 안내창 — 더 연한 노란색 + 텍스트 전체 중앙 정렬
   ------------------------------------------------------------------ */
.pc-emergency {
  background: #FFF59D !important;        /* was #FFE600 → 더 연한 파스텔 옐로 */
  border-color: #D89B2C !important;      /* 보더도 살짝 부드러운 호박색 */
  text-align: center !important;
}
.pc-emergency .pc-emergency-icon {
  background: #D89B2C !important;
  color: #FFF59D !important;
}
.pc-emergency .pc-emergency-tag {
  color: #6B3F0A !important;
}
.pc-emergency .pc-emergency-head {
  justify-content: center !important;
  flex-wrap: wrap !important;
}
.pc-emergency .pc-emergency-body {
  align-items: center !important;
  text-align: center !important;
}
.pc-emergency .pc-em-line {
  text-align: center !important;
  color: #1A0F0D !important;
}
/* 펄스 그림자도 연한 호박톤으로 부드럽게 조정 */
.pc-emergency {
  box-shadow:
    0 10px 26px -6px rgba(216, 155, 44, 0.35),
    0 0 0 4px rgba(255, 245, 157, 0.45),
    0 0 0 6px rgba(216, 155, 44, 0.15) !important;
}
@keyframes pc-emergency-pulse {
  0%, 100% {
    box-shadow:
      0 10px 26px -6px rgba(216, 155, 44, 0.35),
      0 0 0 4px rgba(255, 245, 157, 0.45),
      0 0 0 6px rgba(216, 155, 44, 0.15);
  }
  50% {
    box-shadow:
      0 12px 30px -4px rgba(216, 155, 44, 0.50),
      0 0 0 5px rgba(255, 245, 157, 0.6),
      0 0 0 8px rgba(216, 155, 44, 0.28);
  }
}

/* =========================================================
   V76 — 별/별똥별 완전 박멸 (안전망)
   ========================================================= */
.bg-stars,
.bg-stars *,
.bg-star,
.hero-bg-stars,
.hero-bg-stars *,
.shooting-stars,
.shooting-stars *,
.shooting-star,
.fstar-anchor,
.fstar-evade,
.fstar-drift,
.fstar-dot {
  display: none !important;
  opacity: 0 !important;
  animation: none !important;
}

/* =========================================================
   V77 — 즐겨찾기 버튼(상단바), 레이아웃 폭 조정(중앙↑),
          TALK/PLAY/RULE 탭 톤다운
   ========================================================= */

/* ------------------------------------------------------------------
   1) 상단바 즐겨찾기 버튼 (.favbtn-v77)
   ------------------------------------------------------------------ */
.topnav .favbtn-v77 {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 14px 9px 12px;
  background: linear-gradient(135deg, #FBBF24, #F59E0B);
  border: 1.5px solid rgba(255, 255, 255, 0.35);
  border-radius: 999px;
  color: #2D1B3D;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: -0.005em;
  cursor: pointer;
  transition: all 0.18s ease;
  box-shadow:
    0 4px 14px -4px rgba(251, 191, 36, 0.55),
    0 0 0 1px rgba(0, 0, 0, 0.06);
  white-space: nowrap;
  margin-left: 12px;
}
.topnav .favbtn-v77:hover {
  transform: translateY(-2px);
  box-shadow:
    0 8px 22px -6px rgba(251, 191, 36, 0.7),
    0 0 0 1px rgba(0, 0, 0, 0.08);
}
.topnav .favbtn-v77 .favbtn-star {
  font-size: 16px;
  line-height: 1;
  color: #D97706;
  transition: transform 0.25s cubic-bezier(.18,.89,.32,1.28);
}
.topnav .favbtn-v77:hover .favbtn-star {
  transform: rotate(-12deg) scale(1.15);
}
.topnav .favbtn-v77 .favbtn-text {
  letter-spacing: -0.01em;
}
.topnav .favbtn-v77 .favbtn-pts {
  font-size: 10.5px;
  font-weight: 900;
  padding: 2px 6px;
  background: rgba(45, 27, 61, 0.18);
  border-radius: 6px;
  letter-spacing: 0.02em;
  color: #2D1B3D;
}
/* 활성화(클릭 후) 상태 — 부드러운 그린톤으로 완료감 */
.topnav .favbtn-v77.is-on {
  background: linear-gradient(135deg, #10B981, #059669);
  border-color: rgba(255, 255, 255, 0.4);
  color: #fff;
  cursor: default;
  box-shadow:
    0 4px 14px -4px rgba(16, 185, 129, 0.55),
    0 0 0 1px rgba(0, 0, 0, 0.06);
}
.topnav .favbtn-v77.is-on:hover { transform: none; }
.topnav .favbtn-v77.is-on .favbtn-star {
  color: #FBBF24;
  animation: favbtn-twinkle 1.4s ease-in-out infinite;
}
.topnav .favbtn-v77.is-on:hover .favbtn-star { transform: none; }
.topnav .favbtn-v77.is-on .favbtn-pts {
  background: rgba(255, 255, 255, 0.22);
  color: #fff;
}
@keyframes favbtn-twinkle {
  0%, 100% { transform: scale(1) rotate(0); }
  50%      { transform: scale(1.18) rotate(8deg); }
}

/* ------------------------------------------------------------------
   2) 레이아웃 — 좌우 폭 축소, 중앙 실천활동 영역 확대
   ------------------------------------------------------------------ */
.layout {
  grid-template-columns: 270px minmax(0, 1fr) 290px !important;  /* was 320 / 1fr / 340 */
  gap: 18px !important;                                          /* was 24 → 컴팩트 */
}
@media (max-width: 1280px) {
  .layout {
    grid-template-columns: 250px minmax(0, 1fr) 270px !important;
  }
}

/* ------------------------------------------------------------------
   3) TALK · PLAY · RULE 탭 — 오로라/짙은 음영 톤다운
   ------------------------------------------------------------------ */
.tabs.tabs-v19 {
  box-shadow: 0 2px 8px -3px rgba(45, 27, 61, 0.10) !important;
}
.tabs.tabs-v19 .tab.active {
  /* 짙은 플럼 그라데이션 → 잉크 단색으로 차분하게 */
  background: var(--ink) !important;
  box-shadow:
    0 4px 12px -4px rgba(45, 27, 61, 0.32),
    inset 0 1px 0 rgba(255, 255, 255, 0.08) !important;
}
.tabs.tabs-v19 .tab:hover {
  background: rgba(45, 27, 61, 0.04) !important;
  color: var(--ink) !important;
}
.tabs.tabs-v19 .tab.active .tlabel {
  color: rgba(255, 255, 255, 0.96) !important;
  letter-spacing: 0.08em !important;
}
/* 비활성 탭은 살짝 더 차분한 텍스트 */
.tabs.tabs-v19 .tab .tlabel {
  font-weight: 600 !important;
  color: var(--ink-3) !important;
  letter-spacing: 0.08em !important;
}
/* 활성 액센트 라인(::before)이 v60에서 있으면 제거하여 단조롭게 — 이미 v61에서 hidden 처리됨, 안전망 */
.tabs.tabs-v19 .tab.active::before { display: none !important; }

/* =========================================================
   V78 — PLAY 탭: 게임 메뉴 + 십자낱말풀이 + 지뢰찾기 + 안내창 투명도
   ========================================================= */

/* ------------------------------------------------------------------
   0) 노란 안내창 — 살짝 투명도
   ------------------------------------------------------------------ */
.pc-emergency {
  background: rgba(255, 245, 157, 0.86) !important;  /* was #FFF59D 100% */
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

/* ------------------------------------------------------------------
   1) 게임 메뉴 — 3개 카드 그리드
   ------------------------------------------------------------------ */
.game-menu {
  padding: 8px 0 24px;
}
.game-menu-head {
  margin-bottom: 22px;
  text-align: center;
}
.game-menu-head h2 {
  margin: 0 0 6px;
  font-family: var(--f-display);
  font-size: 28px;
  color: var(--ink);
}
.game-menu-head p {
  margin: 0;
  color: var(--ink-3);
  font-size: 13.5px;
}
/* v94 — 제목 제거, 부제만 표시. 폰트 약간 키움 */
.game-menu-head.game-menu-head-v94 {
  margin-bottom: 18px;
  padding: 4px 0;
}
.game-menu-head.game-menu-head-v94 p {
  font-size: 16px;
  font-weight: 600;
  color: var(--ink-2);
  letter-spacing: -0.005em;
}
.game-menu-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.game-card {
  display: flex;
  flex-direction: column;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 22px 20px 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 6px 18px -8px rgba(45, 27, 61, 0.15);
  text-align: left;
  font-family: inherit;
}
.game-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 30px -10px rgba(45, 27, 61, 0.25);
}
.game-card:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none;
}
.game-card.tint-coral { border-top: 4px solid var(--coral); }
.game-card.tint-lilac { border-top: 4px solid var(--lilac); }
.game-card.tint-mint  { border-top: 4px solid var(--mint); }
.game-card-icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  margin-bottom: 14px;
}
.game-card.tint-coral .game-card-icon { background: linear-gradient(135deg, #FF6B5A, #FF8A7A); }
.game-card.tint-lilac .game-card-icon { background: linear-gradient(135deg, #A78BFA, #C4B5FD); }
.game-card.tint-mint  .game-card-icon { background: linear-gradient(135deg, #34D399, #6EE7B7); }
.game-card-icon svg { width: 28px; height: 28px; }
.game-card-body h3 {
  margin: 0 0 8px;
  font-size: 19px;
  color: var(--ink);
  font-family: var(--f-display);
}
.game-card-body p {
  margin: 0;
  font-size: 13px;
  color: var(--ink-3);
  line-height: 1.55;
  min-height: 40px;
}
.game-card-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
}
.gc-chances {
  font-size: 11.5px;
  color: var(--ink-3);
  font-weight: 600;
}
.gc-arrow {
  font-size: 18px;
  color: var(--coral);
  font-weight: 700;
}

/* ------------------------------------------------------------------
   2) 게임 헤더 — 나가기 + 정보 + 도전권
   ------------------------------------------------------------------ */
.game-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 0 18px;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--line);
}
.game-exit-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 12px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
}
.game-exit-btn:hover {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.game-header-info { flex: 1; min-width: 0; }
.game-header-info h2 {
  margin: 0;
  font-family: var(--f-display);
  font-size: 22px;
  color: var(--ink);
}
.game-header-info p {
  margin: 4px 0 0;
  font-size: 12.5px;
  color: var(--ink-3);
}
.game-chances {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-end;
  flex-shrink: 0;
}
.game-chances-num {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 24px;
  font-weight: 800;
  color: var(--coral);
  line-height: 1;
}
.game-chances-txt {
  font-size: 10.5px;
  color: var(--ink-3);
  margin-top: 2px;
}

/* ------------------------------------------------------------------
   3) 게임 공통 — 시작 화면 + 결과 화면
   ------------------------------------------------------------------ */
.game-pre {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 24px 22px;
  text-align: center;
}
.game-pre-desc {
  margin: 0 0 18px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-2);
}
.game-pre-desc b { color: var(--coral); font-weight: 800; }
.game-start-btn {
  padding: 12px 28px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.18s ease;
  box-shadow: 0 4px 14px -4px rgba(45, 27, 61, 0.4);
}
.game-start-btn:hover {
  background: #432659;
  transform: translateY(-2px);
}
.game-start-btn:disabled {
  background: #B8B0C2;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

.game-result {
  margin-top: 18px;
  background: linear-gradient(135deg, #FFF4E8, #FFEBD9);
  border: 1px solid #F5C896;
  border-radius: 14px;
  padding: 18px 22px;
}
.game-result h3 {
  margin: 0 0 12px;
  font-size: 18px;
  color: #C1352D;
}
.rank-table {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
}
.rank-head {
  padding: 10px 14px;
  background: var(--cream-2);
  font-size: 11.5px;
  font-weight: 700;
  color: var(--ink-2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.rank-row {
  display: grid;
  grid-template-columns: 50px 1fr auto;
  align-items: center;
  padding: 9px 14px;
  border-top: 1px solid var(--line);
  font-size: 13px;
}
.rank-row.me {
  background: rgba(255, 107, 90, 0.08);
  font-weight: 700;
}
.rank-no { color: var(--ink-3); font-weight: 800; font-family: var(--f-display); }
.rank-row.me .rank-no { color: var(--coral); }
.rank-pts { font-weight: 700; color: var(--coral); }

/* ------------------------------------------------------------------
   4) 십자낱말풀이 — 그리드 + 사이드 키워드
   ------------------------------------------------------------------ */
.crossword-layout {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 18px;
  align-items: start;
}
.crossword-board {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px;
}
.cw-timer {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
  font-family: var(--f-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--coral);
}
.cw-found {
  font-size: 12px;
  color: var(--ink-3);
  font-weight: 600;
  font-family: var(--f-body);
}
.cw-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
  user-select: none;
}
.cw-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.1s ease;
}
.cw-cell:hover { background: var(--cream-2); }
.cw-cell.start {
  background: var(--coral);
  color: #fff;
  border-color: var(--coral);
}
.cw-cell.preview {
  background: rgba(255, 107, 90, 0.18);
  border-color: var(--coral);
}
.cw-cell.found {
  background: linear-gradient(135deg, #34D399, #6EE7B7);
  color: #fff;
  border-color: #34D399;
  cursor: default;
}
.cw-tip {
  margin: 12px 0 0;
  font-size: 11.5px;
  color: var(--ink-3);
  text-align: center;
}
.crossword-side {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 14px 8px;
  max-height: 520px;
  overflow-y: auto;
}
.crossword-side h4 {
  margin: 0 0 10px;
  font-size: 13px;
  color: var(--ink-2);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.cw-wordlist { display: flex; flex-direction: column; gap: 6px; }
.cw-word-item {
  display: grid;
  grid-template-columns: 16px 50px 1fr;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-size: 12px;
}
.cw-word-item.found {
  background: #ECFDF5;
  border-color: #6EE7B7;
}
.cw-word-tag { color: var(--ink-3); font-weight: 700; text-align: center; }
.cw-word-item.found .cw-word-tag { color: #059669; }
.cw-word-text { font-weight: 800; color: var(--ink); }
.cw-word-item.found .cw-word-text { text-decoration: line-through; opacity: 0.6; }
.cw-word-clue { color: var(--ink-3); font-size: 11px; line-height: 1.4; }

/* ------------------------------------------------------------------
   5) 지뢰찾기 — 그리드 + 메타
   ------------------------------------------------------------------ */
.ms-layout {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 20px 0;
}
.ms-meta {
  display: flex;
  align-items: center;
  gap: 18px;
  font-family: var(--f-display);
  font-size: 16px;
  font-weight: 700;
}
.ms-mines { color: #C1352D; }
.ms-timer { color: var(--coral); }
.ms-result.won { color: #059669; }
.ms-result.lost { color: #C1352D; }
.ms-grid {
  display: grid;
  grid-template-columns: repeat(8, 40px);
  gap: 3px;
  background: #2D1B3D;
  padding: 8px;
  border-radius: 10px;
  user-select: none;
}
.ms-cell {
  width: 40px;
  height: 40px;
  background: #6A4F8A;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 16px;
  color: #fff;
  cursor: pointer;
  transition: background 0.1s ease;
}
.ms-cell:hover:not(.revealed) { background: #856BA5; }
.ms-cell.revealed {
  background: #F3ECDF;
  color: var(--ink);
  cursor: default;
}
.ms-cell.mine { background: #C1352D !important; color: #fff !important; }
.ms-cell.flagged { background: #FBBF24; color: #2D1B3D; }
.ms-cell.adj-1 { color: #2563EB; }
.ms-cell.adj-2 { color: #059669; }
.ms-cell.adj-3 { color: #DC2626; }
.ms-cell.adj-4 { color: #6B21A8; }
.ms-cell.adj-5 { color: #92400E; }
.ms-cell.adj-6 { color: #0891B2; }
.ms-cell.adj-7 { color: #1F2937; }
.ms-cell.adj-8 { color: #4B5563; }
.ms-tip {
  font-size: 11.5px;
  color: var(--ink-3);
  margin: 0;
}

/* =========================================================
   V79 — 진짜 크로스워드 + 클래식 지뢰찾기
   ========================================================= */

/* ------------------------------------------------------------------
   1) 크로스워드 — 그리드 + 입력 + 힌트 + 랭킹
   ------------------------------------------------------------------ */
.cw-layout-v79 {
  display: grid;
  grid-template-columns: 1fr 270px;
  gap: 22px;
  align-items: start;
}
.cw-board-col {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px;
}
.cw-status {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  font-family: var(--f-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--coral);
}
.cw-done { color: #059669; }
.cw-grid-v79 {
  display: grid;
  gap: 0;
  background: #1F1F1F;
  border: 2px solid #1F1F1F;
  border-radius: 4px;
  margin: 0 auto 18px;
  width: fit-content;
  user-select: none;
}
.cw-blocked {
  width: 44px;
  height: 44px;
  background: #1F1F1F;
}
.cw-cell-v79 {
  position: relative;
  width: 44px;
  height: 44px;
  background: #fff;
  border: 1px solid #888;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: text;
  transition: background 0.1s;
}
.cw-cell-v79.hl-across { background: #FFF4D6; }
.cw-cell-v79.hl-down   { background: #FFE4DC; }
.cw-cell-v79.hl-across.hl-down { background: linear-gradient(135deg, #FFF4D6 50%, #FFE4DC 50%); }
.cw-cell-v79.focused {
  background: var(--coral) !important;
  box-shadow: inset 0 0 0 2px #C1352D;
}
.cw-cell-v79.focused input { color: #fff; }
.cw-cell-v79.done {
  background: #E8F8F0 !important;
  border-color: #6EE7B7;
}
.cw-cell-v79 .cw-num {
  position: absolute;
  top: 1px;
  left: 3px;
  font-size: 9px;
  font-weight: 700;
  color: #555;
  line-height: 1;
  pointer-events: none;
}
.cw-cell-v79.focused .cw-num { color: #fff; }
.cw-cell-v79 input {
  width: 100%;
  height: 100%;
  border: none;
  outline: none;
  background: transparent;
  text-align: center;
  font-size: 19px;
  font-weight: 700;
  color: var(--ink);
  font-family: var(--f-display);
  padding: 0;
  caret-color: transparent;
}
.cw-clues-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.cw-clue-col h4 {
  margin: 0 0 10px;
  font-family: var(--f-display);
  font-size: 14px;
  color: var(--ink);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.cw-clue-cnt {
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 600;
  margin-left: 4px;
}
.cw-clue-col ul {
  margin: 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.cw-clue-col li {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 6px;
  font-size: 12.5px;
  line-height: 1.45;
  color: var(--ink-2);
  padding: 4px 0;
  align-items: baseline;
}
.cw-clue-no {
  font-family: var(--f-display);
  font-weight: 800;
  color: var(--coral);
  font-size: 13px;
}
.cw-clue-len {
  font-size: 10.5px;
  color: var(--ink-3);
  white-space: nowrap;
}

/* 랭킹 사이드 (크로스워드 + 지뢰 공통) */
.cw-rank-col,
.ms-rank-col {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px 16px 12px;
  position: sticky;
  top: 100px;
}
.cw-rank-col h4,
.ms-rank-col h4 {
  margin: 0 0 10px;
  font-family: var(--f-display);
  font-size: 14px;
  color: var(--ink);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.ms-rank-diff {
  font-size: 12px;
  color: var(--ink-3);
  margin: 0 0 10px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--line);
}
.cw-rank-empty {
  margin: 0 0 12px;
  font-size: 12px;
  color: var(--ink-3);
  font-style: italic;
}
.cw-rank-mine {
  margin: 0 0 12px;
  font-size: 13px;
  color: var(--coral);
  font-weight: 600;
  padding: 8px 10px;
  background: rgba(255, 107, 90, 0.08);
  border-radius: 8px;
  border-left: 3px solid var(--coral);
}
.cw-rank-mine strong { font-size: 16px; font-family: var(--f-display); }

/* ------------------------------------------------------------------
   2) 지뢰찾기 v79 — 클래식 디자인 + 난이도 + 랭킹
   ------------------------------------------------------------------ */
.ms-diff-select {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 18px;
}
.ms-diff-btn {
  padding: 14px 12px;
  background: #fff;
  border: 2px solid var(--line);
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  transition: all 0.15s ease;
}
.ms-diff-btn:hover {
  border-color: var(--coral);
  transform: translateY(-2px);
}
.ms-diff-btn.active {
  background: var(--coral);
  border-color: var(--coral);
  color: #fff;
}
.ms-diff-btn .msd-label {
  font-family: var(--f-display);
  font-size: 17px;
  font-weight: 800;
  color: var(--ink);
}
.ms-diff-btn.active .msd-label { color: #fff; }
.ms-diff-btn .msd-info {
  font-size: 11.5px;
  color: var(--ink-3);
  font-weight: 600;
}
.ms-diff-btn.active .msd-info { color: rgba(255,255,255,0.85); }

.ms-layout-v79 {
  display: grid;
  grid-template-columns: 1fr 250px;
  gap: 22px;
  align-items: start;
}
.ms-board-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 20px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
}
.ms-hud {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 14px;
  background: #C0C0C0;
  border: 3px solid;
  border-color: #7B7B7B #FFFFFF #FFFFFF #7B7B7B;
  border-radius: 2px;
}
.ms-counter {
  background: #000;
  color: #FF0000;
  padding: 4px 8px;
  font-family: 'Courier New', monospace;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 2px;
  border: 1px solid #444;
  min-width: 56px;
  text-align: center;
}
.ms-face {
  width: 38px;
  height: 38px;
  background: #FFD700;
  border: 2px solid;
  border-color: #FFFFFF #7B7B7B #7B7B7B #FFFFFF;
  border-radius: 4px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.ms-face:hover { background: #FFE94A; }
.ms-grid-v79 {
  display: grid;
  gap: 0;
  background: #7B7B7B;
  padding: 3px;
  user-select: none;
}
.msc {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #C0C0C0;
  border: 2px solid;
  border-color: #FFFFFF #7B7B7B #7B7B7B #FFFFFF;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  color: var(--ink);
}
.msc:hover:not(.revealed):not(.flagged) { background: #D5D5D5; }
.msc.revealed {
  background: #C0C0C0;
  border: 1px solid #7B7B7B;
  cursor: default;
}
.msc.mine {
  background: #C0C0C0;
}
.msc.triggered {
  background: #FF0000 !important;
}
.msc.flagged { background: #C0C0C0; }
.msc.adj-1 { color: #0000FF; }
.msc.adj-2 { color: #008000; }
.msc.adj-3 { color: #FF0000; }
.msc.adj-4 { color: #000080; }
.msc.adj-5 { color: #800000; }
.msc.adj-6 { color: #008080; }
.msc.adj-7 { color: #000000; }
.msc.adj-8 { color: #808080; }

/* =========================================================
   V80 — 휴대폰 질문 — 검정 기본 + 일부 강조 부분만 빨강
   ========================================================= */
.phone-screen .pc-head .pc-rule-bigger {
  /* 기본 색상은 검정 잉크 */
  color: var(--ink) !important;
}
.pc-rl-black {
  color: var(--ink);
}
.pc-rl-red {
  color: #C1352D;
  font-weight: 800;
}

/* =========================================================
   V81 — Tetris iframe 임베드 (지뢰찾기 → 테트리스)
   ========================================================= */
.tetris-game .tetris-frame-wrap {
  width: 100%;
  background: #080f1e;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--line);
  box-shadow: 0 10px 30px -10px rgba(45, 27, 61, 0.25);
}
.tetris-iframe {
  display: block;
  width: 100%;
  height: 760px;
  border: none;
  background: #080f1e;
}

/* =========================================================
   V83 — 게임 진행 흐름 개편, RULE 후보 컬러, 랭킹 10위
   ========================================================= */

/* ------------------------------------------------------------------
   1) RULE 후보 박스 — 1/2/3 카드별 컬러 + 연한 그린 음영
       v84 OVERRIDES below replace these with muted palette
   ------------------------------------------------------------------ */
.candidates .cand {
  background: #ECFDF5 !important;          /* 연한 그린 배경 (베이스) */
  position: relative;
}
.candidates .cand.cand-neutral {
  background: #ECFDF5 !important;
}

/* =========================================================
   V84 — RULE 3-컬러를 muted 톤으로 + Step 02·03에 컬러 연결
        + 선택한 내용 강조 표시
   ========================================================= */

/* 컬러 토큰 (3가지 — muted, 톤 매칭) */
:root {
  --c1-strong: #A87689;   /* 탁한 로즈 (후보 1) */
  --c1-soft:   #F5E8EE;
  --c1-line:   #C49AAB;

  --c2-strong: #A88B5F;   /* 탁한 골드 (후보 2) */
  --c2-soft:   #F4EAD8;
  --c2-line:   #C3AC85;

  --c3-strong: #6B7F94;   /* 탁한 블루그레이 (후보 3) */
  --c3-soft:   #E6ECF2;
  --c3-line:   #92A4B7;
}

/* ------------------------------------------------------------------
   1) Step 01 — 후보 카드: muted 그라데이션 + 좌측 5px 액센트
   ------------------------------------------------------------------ */
.candidates .cand:nth-child(1) {
  border-left: 5px solid var(--c1-strong) !important;
  background: linear-gradient(135deg, var(--c1-soft) 0%, #FAFAF7 78%) !important;
}
.candidates .cand:nth-child(2) {
  border-left: 5px solid var(--c2-strong) !important;
  background: linear-gradient(135deg, var(--c2-soft) 0%, #FAFAF7 78%) !important;
}
.candidates .cand:nth-child(3) {
  border-left: 5px solid var(--c3-strong) !important;
  background: linear-gradient(135deg, var(--c3-soft) 0%, #FAFAF7 78%) !important;
}
.candidates .cand:nth-child(1).selected {
  border-color: var(--c1-strong) !important;
  box-shadow:
    0 12px 28px -8px rgba(168, 118, 137, 0.45),
    0 0 0 2px var(--c1-strong),
    0 3px 8px -2px rgba(45, 27, 61, 0.10) !important;
}
.candidates .cand:nth-child(2).selected {
  border-color: var(--c2-strong) !important;
  box-shadow:
    0 12px 28px -8px rgba(168, 139, 95, 0.45),
    0 0 0 2px var(--c2-strong),
    0 3px 8px -2px rgba(45, 27, 61, 0.10) !important;
}
.candidates .cand:nth-child(3).selected {
  border-color: var(--c3-strong) !important;
  box-shadow:
    0 12px 28px -8px rgba(107, 127, 148, 0.45),
    0 0 0 2px var(--c3-strong),
    0 3px 8px -2px rgba(45, 27, 61, 0.10) !important;
}

/* "후보 1/2/3" 라벨 배지 — 어디서든 동일 색 사용 (Step 01/02/03) */
.cand-label.cand-label-c1 {
  background: var(--c1-strong) !important;
  color: #fff !important;
  border: none !important;
  box-shadow: none !important;
}
.cand-label.cand-label-c2 {
  background: var(--c2-strong) !important;
  color: #fff !important;
  border: none !important;
  box-shadow: none !important;
}
.cand-label.cand-label-c3 {
  background: var(--c3-strong) !important;
  color: #fff !important;
  border: none !important;
  box-shadow: none !important;
}

/* ------------------------------------------------------------------
   2) Step 02 — 선택한 후보 박스(picked-rule)에 컬러 연결 + 강조
   ------------------------------------------------------------------ */
.picked-rule.pr-c1 {
  background: linear-gradient(135deg, var(--c1-soft) 0%, #FFFFFF 100%) !important;
  border: 1.5px solid var(--c1-line) !important;
  border-left: 5px solid var(--c1-strong) !important;
}
.picked-rule.pr-c2 {
  background: linear-gradient(135deg, var(--c2-soft) 0%, #FFFFFF 100%) !important;
  border: 1.5px solid var(--c2-line) !important;
  border-left: 5px solid var(--c2-strong) !important;
}
.picked-rule.pr-c3 {
  background: linear-gradient(135deg, var(--c3-soft) 0%, #FFFFFF 100%) !important;
  border: 1.5px solid var(--c3-line) !important;
  border-left: 5px solid var(--c3-strong) !important;
}
/* 선택된 후보 텍스트 강조 — 사이즈/굵기/색 */
.picked-rule .l {
  font-size: 10.5px !important;
  letter-spacing: 0.06em !important;
  color: var(--ink-3) !important;
  text-transform: uppercase;
  margin-bottom: 4px !important;
}
.picked-rule .t.pr-emphasized {
  font-size: 17px !important;
  font-weight: 800 !important;
  color: var(--ink) !important;
  line-height: 1.4 !important;
  letter-spacing: -0.01em !important;
}
.picked-rule.pr-c1 .t.pr-emphasized { color: #6B3A4A !important; }
.picked-rule.pr-c2 .t.pr-emphasized { color: #6B5530 !important; }
.picked-rule.pr-c3 .t.pr-emphasized { color: #3D4A5C !important; }
/* 선택 컬러 강조용 ::before 라인(우상단 작은 인디케이터) */
.picked-rule.pr-c1::after,
.picked-rule.pr-c2::after,
.picked-rule.pr-c3::after {
  content: "✓ Step 01에서 선택";
  position: absolute;
  top: 10px;
  right: 14px;
  font-size: 10.5px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  letter-spacing: 0.02em;
}
.picked-rule.pr-c1::after { background: var(--c1-strong); color: #fff; }
.picked-rule.pr-c2::after { background: var(--c2-strong); color: #fff; }
.picked-rule.pr-c3::after { background: var(--c3-strong); color: #fff; }
.picked-rule { position: relative; }

/* ------------------------------------------------------------------
   3) Step 03 — 제안 칼럼(prop-group)에 컬러 연결
   ------------------------------------------------------------------ */
.prop-group.pg-c1 {
  border-top: 4px solid var(--c1-strong) !important;
  background: linear-gradient(180deg, var(--c1-soft) 0%, #FAFAF7 60%) !important;
}
.prop-group.pg-c2 {
  border-top: 4px solid var(--c2-strong) !important;
  background: linear-gradient(180deg, var(--c2-soft) 0%, #FAFAF7 60%) !important;
}
.prop-group.pg-c3 {
  border-top: 4px solid var(--c3-strong) !important;
  background: linear-gradient(180deg, var(--c3-soft) 0%, #FAFAF7 60%) !important;
}
.prop-group.pg-c1 .pg-title { color: #6B3A4A !important; font-weight: 700; }
.prop-group.pg-c2 .pg-title { color: #6B5530 !important; font-weight: 700; }
.prop-group.pg-c3 .pg-title { color: #3D4A5C !important; font-weight: 700; }

/* =========================================================
   V85 — Step 02 항상 표시 + 후보 미선택 시 placeholder 메시지
   ========================================================= */
.picked-rule.pr-empty {
  display: flex;
  align-items: center;
  gap: 14px;
  background: linear-gradient(135deg, #FFF8E7 0%, #FFFAF0 100%) !important;
  border: 1.5px dashed #E0B85A !important;
  border-left: 5px solid #E0B85A !important;
  padding: 16px 18px !important;
  border-radius: 12px;
  position: relative;
  animation: pr-empty-pulse 2.4s ease-in-out infinite;
}
@keyframes pr-empty-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(224, 184, 90, 0.30); }
  50%      { box-shadow: 0 0 0 6px rgba(224, 184, 90, 0); }
}
.picked-rule.pr-empty .pr-empty-icon {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #E0B85A;
  color: #fff;
}
.picked-rule.pr-empty .pr-empty-title {
  font-size: 15.5px;
  font-weight: 800;
  color: #6B5530;
  letter-spacing: -0.01em;
  margin-bottom: 4px;
  line-height: 1.35;
}
.picked-rule.pr-empty .pr-empty-sub {
  font-size: 12px;
  color: #8B7140;
  line-height: 1.5;
}
.picked-rule.pr-empty .pr-empty-sub b {
  color: #6B5530;
  font-weight: 800;
}

/* picked 없을 때 form 영역 시각적 약화 (입력은 가능) */
.detail-form.is-awaiting-pick .fld {
  opacity: 0.6;
}
.detail-form.is-awaiting-pick textarea,
.detail-form.is-awaiting-pick input[type="text"],
.detail-form.is-awaiting-pick select {
  background: #FAFAF7 !important;
}

/* =========================================================
   V86 — 컬처 가로세로 iframe 임베드 + 상단 빈공간 제거
   ========================================================= */

/* 게임 헤더 — 상단 패딩 축소 */
.crossword-game .game-header {
  padding-top: 6px !important;
  padding-bottom: 12px !important;
  margin-bottom: 10px !important;
}

/* 게임 툴바 컴팩트 — 위 여백 줄임 */
.game-toolbar.game-toolbar-compact {
  margin: 0 0 14px !important;
  padding: 10px 14px !important;
}

/* iframe + 랭킹 레이아웃 — v92: iframe 더 넓게, 랭킹 슬림 */
.cw-layout-v86 {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 12px;
  align-items: start;
}
.cw-iframe-col {
  background: #f5f5f0;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--line);
  box-shadow: 0 4px 14px -4px rgba(45, 27, 61, 0.10);
  min-height: 820px;
}
.cw-iframe-v86 {
  display: block;
  width: 100%;
  height: 1080px;
  border: none;
  background: #f5f5f0;
}

/* 랭킹 컬럼 v86 — sticky 위치 약간 위로 조정 */
.cw-rank-col-v86 {
  top: 80px !important;
}


/* ------------------------------------------------------------------
   2) 게임 상단 툴바 — ▶ 시작 버튼 + 상태 안내
   ------------------------------------------------------------------ */
.game-toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 14px 0 18px;
  padding: 12px 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
}
.game-toolbar-start {
  flex-shrink: 0;
  padding: 11px 22px;
  background: linear-gradient(135deg, #FF6B5A, #FF8A7A);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14.5px;
  font-weight: 800;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.18s ease;
  box-shadow: 0 4px 14px -4px rgba(255, 107, 90, 0.4);
}
.game-toolbar-start:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px -6px rgba(255, 107, 90, 0.55);
}
.game-toolbar-start:disabled {
  background: #B8B0C2;
  cursor: not-allowed;
  box-shadow: none;
}
.game-toolbar-start.is-running {
  background: linear-gradient(135deg, #10B981, #059669);
  cursor: default;
}
.game-toolbar-info {
  flex: 1;
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.5;
}
.game-toolbar-info b { color: var(--coral); font-weight: 800; }
.gt-hint { color: var(--ink-3); }
.gt-stat { color: #059669; font-weight: 600; }
.gt-done { color: #059669; font-weight: 700; font-family: var(--f-display); font-size: 14px; }
.gt-fail { color: #C1352D; font-weight: 600; }

/* ------------------------------------------------------------------
   3) 컬처 크로스 — 잠금 상태 그리드(상단 시작 누르기 전)
   ------------------------------------------------------------------ */
.cw-grid-v79.is-locked {
  opacity: 0.55;
  pointer-events: none;
  filter: saturate(0.6);
}
.cw-grid-v79.is-locked input {
  cursor: not-allowed;
}

/* ------------------------------------------------------------------
   4) 랭킹 v83 — 이름 + 직급 + 시간 (10위)
   ------------------------------------------------------------------ */
.rank-table-v83 {
  max-height: 460px;
  overflow-y: auto;
}
.rank-row-v83 {
  display: grid;
  grid-template-columns: 36px 1fr auto auto;
  gap: 8px;
  align-items: center;
  padding: 8px 12px;
  font-size: 12.5px;
}
.rank-row-v83 .rank-name {
  font-weight: 700;
  color: var(--ink);
}
.rank-row-v83 .rank-role {
  font-size: 11px;
  color: var(--ink-3);
  padding: 2px 6px;
  background: var(--cream-2);
  border-radius: 4px;
}
.rank-row-v83 .rank-time {
  font-weight: 700;
  color: var(--coral);
  font-family: 'Courier New', monospace;
  font-size: 12px;
}
.rank-row-v83.me .rank-role {
  background: rgba(255, 107, 90, 0.15);
  color: var(--coral);
  font-weight: 700;
}
.rank-row-v83.me .rank-time { color: var(--coral); }

/* ------------------------------------------------------------------
   5) 테트리스 — 시작 전 프리뷰 영역
   ------------------------------------------------------------------ */
.tetris-preview {
  width: 100%;
  min-height: 380px;
  background: linear-gradient(160deg, #0c1830, #110828);
  border-radius: 12px;
  border: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
}
.tp-icons {
  display: flex;
  gap: 10px;
}
.tp-bk {
  width: 42px;
  height: 42px;
  border-radius: 6px;
  display: inline-block;
  box-shadow: 0 4px 12px -4px rgba(0,0,0,0.4);
}
.tp-bk1 { background: linear-gradient(135deg, #FF6B5A, #FFA08F); animation: tp-bounce 1.4s ease-in-out infinite; }
.tp-bk2 { background: linear-gradient(135deg, #FBBF24, #FDE68A); animation: tp-bounce 1.4s ease-in-out infinite 0.15s; }
.tp-bk3 { background: linear-gradient(135deg, #34D399, #6EE7B7); animation: tp-bounce 1.4s ease-in-out infinite 0.3s; }
.tp-bk4 { background: linear-gradient(135deg, #60A5FA, #93C5FD); animation: tp-bounce 1.4s ease-in-out infinite 0.45s; }
@keyframes tp-bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-14px); }
}
.tp-msg {
  margin: 0;
  color: rgba(255, 255, 255, 0.75);
  font-size: 14px;
  font-weight: 500;
}

/* =========================================================
   V87 — 시작 버튼 헤더 우측 배치, 랭킹 한줄, 테트리스 축소+랭킹
        + 게임 헤더 컴팩트화 (상단 빈공간 정리)
   ========================================================= */

/* 게임 헤더 — 액션 슬롯 추가 + 패딩/마진 컴팩트 */
.game-view .game-header {
  display: flex !important;
  align-items: center !important;
  gap: 14px !important;
  padding: 8px 12px !important;
  margin: 0 0 12px !important;
}
.game-view .game-header-info {
  flex: 1;
  min-width: 0;
}
.game-view .game-header-info h2 {
  margin: 0 !important;
  font-size: 19px !important;
}
.game-view .game-header-info p {
  margin: 2px 0 0 !important;
  font-size: 12.5px !important;
}
.game-header-actions {
  flex-shrink: 0;
  display: flex;
  align-items: center;
}
/* 헤더 내 시작 버튼 — v83 코랄 그라데이션 (붉은) */
.gh-start-btn {
  padding: 10px 24px !important;
  font-size: 14.5px !important;
  border-radius: 10px !important;
  background: linear-gradient(135deg, #FF6B5A, #FF8A7A) !important;
  color: #fff !important;
  border: none !important;
  font-weight: 800 !important;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.18s ease;
  box-shadow: 0 4px 14px -4px rgba(255, 107, 90, 0.45);

}
.gh-start-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px -6px rgba(255, 107, 90, 0.55);
}
.gh-start-btn:disabled {
  background: #B8B0C2 !important;
  cursor: not-allowed;
  box-shadow: none;
}
.gh-start-btn.is-running {
  background: linear-gradient(135deg, #10B981, #059669) !important;
  cursor: default;
}

/* 게임 상태바 — 진행 상태 한 줄 안내 */
.game-status-bar {
  margin: 0 0 12px;
  padding: 8px 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 13px;
  color: var(--ink-2);
}
.game-status-bar .gt-stat { color: #059669; font-weight: 600; }
.game-status-bar .gt-done { color: #059669; font-weight: 700; font-size: 14px; }
.game-status-bar .gt-fail { color: #C1352D; font-weight: 600; }

/* 랭킹 한줄 배치 v87 — 순위 / 이름 / 직책 / 시간 또는 점수 */
.rank-table-v87 {
  max-height: 540px;
  overflow-y: auto;
}
/* v88: 이름+직책을 한 그룹으로 묶고 직책에 박스 제거 */
.rank-row-v87 {
  display: grid;
  grid-template-columns: 42px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 7px 10px;
  font-size: 12.5px;

}
.rank-row-v87:last-child { border-bottom: none; }
.rank-row-v87 .rank-no {
  font-weight: 800;
  color: var(--ink-3);
  font-size: 12px;
}
.rank-row-v87 .rank-namerole {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  min-width: 0;
  white-space: nowrap;

  text-overflow: ellipsis;
}
.rank-row-v87 .rank-name {
  font-weight: 700;
  color: var(--ink);
}
.rank-row-v87 .rank-role {
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 500;
  /* 박스/배경/패딩/보더 모두 제거 — 텍스트만 */

}
.rank-row-v87 .rank-time {

.rank-row-v87.me { background: rgba(255, 107, 90, 0.10); }
.rank-row-v87.me .rank-role {

}

.rank-row-v87:nth-child(2) .rank-no { color: #8B92A0; font-size: 13px; }
.rank-row-v87:nth-child(3) .rank-no { color: #B07843; font-size: 13px; }

/* 테트리스 — 가로 축소 + 우측 랭킹 v87 */
.tetris-game-v87 .tetris-layout-v87 {
  display: grid;
  grid-template-columns: 1fr 260px;
  gap: 18px;
  align-items: start;
}
.tetris-game-v87 .tetris-frame-wrap {
  width: 100%;
  background: #080f1e;
  border-radius: 12px;

}
.tetris-game-v87 .tetris-iframe {
  display: block;

  height: 720px;
  border: none;

/* V98 — iframe 안전장치: 어떤 환경에서도 최소 크기 보장 */
.cw-iframe-v86,
.tetris-iframe {
  min-width: 280px;
  min-height: 500px;
}

/* =========================================================
   V96 — 인게임 도전권 배너 (헤더 우측 도전권 카운터 대체)
   ========================================================= */
.ingame-chances-banner {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 16px;
  margin: 0 0 12px;
  background: linear-gradient(135deg, #FFF4F0 0%, #FFE8E0 100%);
  border: 1px solid #FFC9B8;
  border-radius: 10px;
  box-shadow: 0 2px 8px -4px rgba(255, 107, 90, 0.18);
}
.ingame-chances-banner .igc-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-2);

  color: var(--ink-3);
  margin: 0 2px;

}
.ingame-chances-banner .igc-total {

  color: var(--ink-3);
  line-height: 1;
}

/* V97 — 도전권 소진 시 게임 비활성화 오버레이 */
.game-disabled-overlay {
  position: absolute;
  inset: 0;
  background: rgba(45, 27, 61, 0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  border-radius: 12px;
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  pointer-events: auto;
  cursor: not-allowed;
}
.game-disabled-overlay .gdo-card {
  background: #fff;
  padding: 32px 44px;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 24px 60px -8px rgba(0, 0, 0, 0.45);
  max-width: 360px;
  border: 1px solid rgba(255, 255, 255, 0.6);
}
.game-disabled-overlay .gdo-icon {
  font-size: 44px;
  line-height: 1;
  margin-bottom: 14px;
}
.game-disabled-overlay .gdo-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--ink);
  margin-bottom: 6px;
  letter-spacing: -0.005em;
}
.game-disabled-overlay .gdo-sub {
  font-size: 13.5px;
  color: var(--ink-3);
  font-weight: 500;
}
@media (max-width: 600px) {
  .game-disabled-overlay .gdo-card {
    padding: 24px 28px;
    max-width: 280px;
  }
  .game-disabled-overlay .gdo-icon { font-size: 36px; }
  .game-disabled-overlay .gdo-title { font-size: 15px; }
  .game-disabled-overlay .gdo-sub { font-size: 12.5px; }
}

// Avatar background helper — used by v1 components
window.AV_BG = function(name) {
  // Stable color from name hash
  const palettes = [
    "linear-gradient(135deg, #FF6B5A, #FF8A7A)",   // coral
    "linear-gradient(135deg, #A78BFA, #C4B5FD)",   // lilac
    "linear-gradient(135deg, #34D399, #6EE7B7)",   // mint
    "linear-gradient(135deg, #FBBF24, #FCD34D)",   // sun
    "linear-gradient(135deg, #60A5FA, #93C5FD)",   // sky
    "linear-gradient(135deg, #F472B6, #F9A8D4)",   // pink
    "linear-gradient(135deg, #818CF8, #A5B4FC)",   // indigo
  ];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  return palettes[hash % palettes.length];
};

// Person photo helper — returns a stable pravatar URL based on name hash (1-70)
window.personPhoto = function(name, size = 120) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = (hash * 31 + name.charCodeAt(i)) >>> 0;
  const imgNum = (hash % 70) + 1;
  return `https://i.pravatar.cc/${size}?img=${imgNum}`;
};

// Toast notification helper
window.showToast = function(msg, duration) {
  duration = duration || 2800;
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    document.body.appendChild(container);
  }
  // Force top position via inline style (bulletproof against any CSS race)
  container.style.position = 'fixed';
  container.style.top = '24px';
  container.style.bottom = 'auto';
  container.style.left = '50%';
  container.style.transform = 'translateX(-50%)';
  container.style.zIndex = '99999';
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  container.style.alignItems = 'center';
  container.style.gap = '8px';
  container.style.pointerEvents = 'none';

  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  // Inline initial transform — slide DOWN from above
  t.style.transform = 'translateY(-20px) scale(0.95)';
  t.style.opacity = '0';
  t.style.transition = 'opacity 0.3s ease, transform 0.3s cubic-bezier(.18,.89,.32,1.28)';
  container.appendChild(t);
  // Force reflow then show
  void t.offsetWidth;
  t.style.transform = 'translateY(0) scale(1)';
  t.style.opacity = '1';
  t.classList.add('show');
  setTimeout(function() {
    t.style.transform = 'translateY(-20px) scale(0.95)';
    t.style.opacity = '0';
    t.classList.remove('show');
    setTimeout(function() { if (t.parentNode) t.remove(); }, 300);
  }, duration);
};

function LeaderCard({ leader, idx }) {
  const [liked, setLiked] = useState(false);
  const [open, setOpen] = useState(false);
  const [draft, setDraft] = useState("");
  const [extraComments, setExtraComments] = useState([]);

  const toggleLike = (e) => {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    const next = !liked;
    setLiked(next);
    if (typeof window.bumpMission === "function") window.bumpMission(2, next ? 1 : -1);
  };

  const submit = () => {
    if (!draft.trim()) return;
    setExtraComments([...extraComments, { txt: draft }]);
    setDraft("");
    if (typeof window.bumpMission === "function") window.bumpMission(1, 1);
  };

  const allComments = [...leader.comments, ...extraComments];

  return (
    <article className={`leader-card lc-v17 lc-chat c${idx+1}`}>
      <div className="lc-chat-row">
        <div className="lc-chat-avatar" style={{background: leader.accent}}>
          <img src={window.personPhoto(leader.name, 96)} alt={leader.name}
               onError={(e) => { e.currentTarget.style.display = 'none'; }} />
        </div>
        <div className="lc-chat-content">
          <div className="lc-chat-meta">
            <span className="lc-chat-name">{leader.name}</span>
            <span className="lc-chat-role">{leader.role}</span>
          </div>
          <div className="lc-chat-bubble-row">
            <div className="lc-chat-bubble">
              <p className="lc-chat-msg">{leader.msg}</p>
            </div>
            <div
              className={`lc-chat-like lk-v17 ${liked ? 'liked' : ''}`}
              onClick={toggleLike}
              role="button"
              tabIndex={0}
              onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') toggleLike(e); }}
            >
              <span className="lk-icon" style={{pointerEvents:'none'}}>{liked ? '♥' : '♡'}</span>
              <span className="lk-num" style={{pointerEvents:'none'}}>{leader.likes + (liked ? 1 : 0)}</span>
            </div>
          </div>
        </div>
      </div>

      <div className="leader-cmt-input-stable">
        <input
          className="white-input"
          placeholder="댓글을 남겨주세요 (익명)"
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submit()}
        />
        <button className="cmt-submit" onClick={submit}>등록</button>
      </div>

      <div className="leader-comments-block">
        <div className={`leader-foot single ${open ? 'open' : ''}`} onClick={() => setOpen(!open)}>
          <span>💬 댓글 {allComments.length}개 {open ? '접기 ▴' : '보기 ▾'}</span>
        </div>
        {open && (
          <div className="leader-comments">
            {allComments.map((c, i) => (
              <div key={i} className="leader-comment anon">
                <div className="body">
                  <div className="txt">{c.txt}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </article>
  );
}
