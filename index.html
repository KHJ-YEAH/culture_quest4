/* =========================================================
   V9 — Hero with star constellation animation
   ========================================================= */
.hero.hero-v9 {
  position: relative;
  padding: 40px 44px 44px !important;
  min-height: 280px !important;
  display: flex !important;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border-radius: var(--r-xl);
  overflow: hidden;
  background: linear-gradient(135deg, #0E0822 0%, #1A0F2E 50%, #2D1B3D 100%);
  box-shadow: var(--sh-3);
}

/* Background drifting tiny stars */
.hero-bg-stars {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 0;
}
.hero-bg-stars .bg-star {
  position: absolute;
  width: 2px; height: 2px;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 50%;
  box-shadow: 0 0 4px rgba(251, 191, 36, 0.5);
  animation: bg-twinkle 4s ease-in-out infinite;
}
@keyframes bg-twinkle {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.9; }
}

/* Constellation SVG covering hero */
.constellation {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  opacity: 0.92;
}

/* Star: drift → form → linger → high-5 → scatter (16s loop) */
.hero-star, .hero-star-core {
  transform: translate(0, 0);
  transform-box: fill-box;
  transform-origin: center;
  animation: star-loop 16s cubic-bezier(.45, .2, .55, .85) infinite;
}
@keyframes star-loop {
  0%, 18% {
    transform: translate(0, 0) scale(1);
    opacity: 0.7;
  }
  28% {
    transform: translate(calc(var(--dx) * 0.4), calc(var(--dy) * 0.4)) scale(1);
    opacity: 0.9;
  }
  40%, 58% {
    transform: translate(var(--dx), var(--dy)) scale(1);
    opacity: 1;
  }
  /* High-5 moment — slight pulse */
  48%, 50% {
    transform: translate(var(--dx), var(--dy)) scale(1.05);
  }
  68% {
    transform: translate(calc(var(--dx) * 0.4), calc(var(--dy) * 0.4)) scale(1);
    opacity: 0.8;
  }
  85%, 100% {
    transform: translate(0, 0) scale(1);
    opacity: 0.7;
  }
}

/* The two high-5 hand stars get extra glow + special pulse */
.hand-star {
  animation: star-loop 16s cubic-bezier(.45, .2, .55, .85) infinite, hand-glow 16s ease-out infinite;
}
@keyframes hand-glow {
  0%, 38% { filter: url(#starGlow) drop-shadow(0 0 0 transparent); }
  46%, 56% { filter: url(#starGlow) drop-shadow(0 0 12px #FBBF24); }
  64%, 100% { filter: url(#starGlow) drop-shadow(0 0 0 transparent); }
}

/* Bones — visible only during formation */
.bone {
  stroke: rgba(251, 191, 36, 0.55);
  stroke-width: 0.7;
  fill: none;
  opacity: 0;
  animation: bone-fade 16s ease-in-out infinite;
}
@keyframes bone-fade {
  0%, 35% { opacity: 0; }
  42%, 62% { opacity: 0.55; }
  68%, 100% { opacity: 0; }
}
.bone.hi5-bone {
  stroke: #FBBF24;
  stroke-width: 1.5;
  filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.8));
  animation: hi5-bone-fade 16s ease-out infinite;
}
@keyframes hi5-bone-fade {
  0%, 42% { opacity: 0; }
  46%, 56% { opacity: 1; }
  62%, 100% { opacity: 0; }
}

/* High-5 halo burst */
.hi5-halo {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: halo-burst 16s ease-out infinite;
}
@keyframes halo-burst {
  0%, 43% { opacity: 0; transform: scale(0.4); }
  47% { opacity: 0.9; transform: scale(1); }
  52% { opacity: 1; transform: scale(1.5); }
  58% { opacity: 0.6; transform: scale(2); }
  62% { opacity: 0; transform: scale(2.5); }
  100% { opacity: 0; transform: scale(0.4); }
}

/* High-5 sparkle rays */
.hi5-rays {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: rays-burst 16s ease-out infinite;
}
@keyframes rays-burst {
  0%, 44% { opacity: 0; transform: rotate(0deg) scale(0.5); }
  48% { opacity: 1; transform: rotate(20deg) scale(1); }
  56% { opacity: 0.7; transform: rotate(40deg) scale(1.4); }
  60% { opacity: 0; transform: rotate(60deg) scale(1.6); }
  100% { opacity: 0; transform: rotate(60deg) scale(0.5); }
}

/* Hero text content overlaid above constellation */
.hero-content {
  position: relative;
  z-index: 2;
  max-width: 720px;
}
.hero.hero-v9 .hero-title {
  margin: 0;

/* Hide the default .flame container — DISABLED in v17 (v7 flame restored) */
/* .streak .flame { display: none !important; }  <-- v17: re-enabled */

/* New flame fill component */
.flame-wrap {
  position: relative;
  width: 44px; height: 50px;
  display: grid; place-items: center;
}
.flame-svg { overflow: visible; }
.flame-fill {
  transform-origin: bottom;
  /* Rect: y position controls how much is shown — use stroke-dashoffset alternative via y attribute */
  /* Use CSS variable --fill (top inset %) to mask: scale-y from bottom */
  /* Trick: shift y position; we use scale-y via animation */
  animation: flame-flicker 1.4s ease-in-out infinite;
}
/* Day fill: scale-y based on --fill value (CSS var: 0% = full, 100% = empty) */
.flame-wrap[style*="--fill"] .flame-fill {
  transform-origin: 50% 28px;
  /* JS sets --fill as ex "20%" for 80% filled; we convert: scale-y = 1 - fill/100% */
}
.flame-wrap .flame-fill {
  /* Use CSS to compute scale-y from var(--fill) */
  /* Trick: y attr can't be CSS-var'd cross-browser, so use transform scale */
  transform: scale(1, calc((100% - var(--fill, 100%)) / 100%));
}
@keyframes flame-flicker {
  0%, 100% { filter: brightness(1) drop-shadow(0 0 4px rgba(255, 107, 90, .4)); }
  50% { filter: brightness(1.2) drop-shadow(0 0 8px rgba(251, 191, 36, .8)); }
}
.flame-wrap.blaze .flame-svg {
  animation: blaze-pulse 0.9s ease-in-out infinite;
}
@keyframes blaze-pulse {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 6px rgba(251, 191, 36, .55)); }
  50% { transform: scale(1.08) translateY(-1px); filter: drop-shadow(0 0 14px rgba(255, 107, 90, .85)); }
}
.flame-spark {
  animation: spark-rise 1.5s ease-out infinite;
}
.flame-spark.s2 { animation-delay: 0.4s; }
.flame-spark.s3 { animation-delay: 0.8s; }
@keyframes spark-rise {
  0% { transform: translateY(4px); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateY(-8px); opacity: 0; }
}
.flame-tip { animation: flame-flicker 1.2s ease-in-out infinite reverse; }

/* =========================================================
   V10 — Constellation: continuous motion + face stars
   ========================================================= */
.face-star {
  animation: face-twinkle 2s ease-in-out infinite, star-loop 16s cubic-bezier(.45, .2, .55, .85) infinite;
}
@keyframes face-twinkle {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }

/* Override the static rest behavior with continuous gentle drift */
.hero-star, .hero-star-core {
  animation: star-loop-v10 18s cubic-bezier(.45, .2, .55, .85) infinite;
  animation-delay: var(--delay, 0s);
}

@keyframes star-loop-v10 {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 0.6;
  }
  /* Drift phase 1 — gentle motion */
  10% {
    transform: translate(var(--drift-x), var(--drift-y)) scale(1);
    opacity: 0.85;
  }
  18% {
    transform: translate(calc(var(--drift-x) * -1), calc(var(--drift-y) * -1)) scale(1);
    opacity: 0.7;
  }
  /* Begin gathering */
  26% {
    transform: translate(calc(var(--dx) * 0.3), calc(var(--dy) * 0.3)) scale(1);
    opacity: 0.85;
  }
  /* In formation */
  38%, 56% {
    transform: translate(var(--dx), var(--dy)) scale(1);
    opacity: 1;
  }
  /* High-5 pulse */
  46%, 50% {
    transform: translate(var(--dx), var(--dy)) scale(1.08);
  }
  /* Scattering */
  65% {
    transform: translate(calc(var(--dx) * 0.35), calc(var(--dy) * 0.35)) scale(1);
    opacity: 0.85;
  }
  /* Back to drifting */
  78% {
    transform: translate(var(--drift-x), var(--drift-y)) scale(1);
    opacity: 0.8;
  }
  90% {
    transform: translate(calc(var(--drift-x) * -1), calc(var(--drift-y) * -1)) scale(1);
    opacity: 0.65;
  }
  100% {
    transform: translate(0, 0) scale(1);
    opacity: 0.6;
  }
}

/* Constellation v11 — wider viewBox, no animation cycle that hides bodies */

  z-index: 1;
  pointer-events: none;

/* Star animation v11 — rest (lying at edges) ↔ meet (flying to center, HI-5)
   18s loop: 0-25% lying with subtle drift, 25-45% flying in, 45-60% MEET + HIGH-5,
   60-80% flying out, 80-100% lying again */
.hero.hero-v11 .hero-star,
.hero.hero-v11 .hero-star-core {
  transform: translate(0, 0);
  transform-box: fill-box;
  transform-origin: center;
  animation: superman-loop 18s cubic-bezier(.45, .2, .55, .85) infinite;
}
@keyframes superman-loop {
  /* Phase 1: Lying at edges (with breathing drift) */
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 0.7;
  }
  10% {
    transform: translate(var(--drift-x), var(--drift-y)) scale(1);
    opacity: 0.9;
  }
  18% {
    transform: translate(calc(var(--drift-x) * -0.5), calc(var(--drift-y) * 0.5)) scale(1);
    opacity: 0.75;
  }
  22% {
    transform: translate(0, 0) scale(1);
    opacity: 0.85;
  }
  /* Phase 2: Flying in superman pose, lifting up slightly */
  30% {
    transform: translate(calc(var(--dx) * 0.4), calc(var(--dy) * 0.4 - 8px)) scale(1.02);
    opacity: 1;
  }
  40% {
    transform: translate(calc(var(--dx) * 0.85), calc(var(--dy) * 0.85 - 5px)) scale(1.02);
    opacity: 1;
  }
  /* Phase 3: MEET — HIGH-5 with slight pulse */
  46%, 56% {
    transform: translate(var(--dx), var(--dy)) scale(1.04);
    opacity: 1;
  }
  /* high-5 climax */
  50%, 52% {
    transform: translate(var(--dx), var(--dy)) scale(1.10);
  }
  /* Phase 4: Fly back to edges */
  64% {
    transform: translate(calc(var(--dx) * 0.85), calc(var(--dy) * 0.85 - 4px)) scale(1.02);
    opacity: 1;
  }
  74% {
    transform: translate(calc(var(--dx) * 0.4), calc(var(--dy) * 0.4 - 4px)) scale(1);
    opacity: 0.95;
  }
  /* Phase 5: Back to lying */
  86% {
    transform: translate(var(--drift-x), 0) scale(1);
    opacity: 0.85;
  }
  100% {
    transform: translate(0, 0) scale(1);
    opacity: 0.7;
  }
}

/* Hand stars get extra glow during high-5 */
.hero.hero-v11 .hand-star {
  animation: superman-loop 18s cubic-bezier(.45, .2, .55, .85) infinite,
             hand-glow-v11 18s ease-out infinite;
}
@keyframes hand-glow-v11 {
  0%, 42% { filter: url(#starGlow); }
  46%, 56% { filter: url(#starGlow) drop-shadow(0 0 14px #FBBF24); }
  62%, 100% { filter: url(#starGlow); }
}

/* Face stars with extra twinkle */
.hero.hero-v11 .face-star {

             face-twinkle 2.4s ease-in-out infinite;
}

/* Bones v11: rest body visible 0-22% and 86-100%, meet body visible 36-66% */
.hero.hero-v11 .bone {

}

}

/* High-5 halo (v11 timing) */

  48% { opacity: 0.9; transform: scale(1); }
  52% { opacity: 1; transform: scale(1.6); }
  58% { opacity: 0.5; transform: scale(2.2); }
  62% { opacity: 0; transform: scale(2.6); }
  100% { opacity: 0; transform: scale(0.4); }
}
.hero.hero-v11 .hi5-rays {

  place-items: center;
  border: 3px solid var(--paper);
  box-shadow: 0 4px 12px -3px rgba(20, 14, 32, .35);
  animation: sticker-drop 0.35s cubic-bezier(.18, .89, .32, 1.28) both;
}
@keyframes sticker-drop {
  0% { opacity: 0; transform: translateY(-12px) scale(0.5); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* =========================================================
   V12 — RULE: candidate labels with color, no circular medal
   ========================================================= */
.cand .cand-medal,
.picked-rule .ic { display: none !important; }

.cand-label {
  display: inline-block;
  padding: 4px 11px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: #fff;
  font-family: var(--f-body);
}
.cand-label-c1 {
  background: linear-gradient(135deg, #FF6B5A, #FF8A7A);
  box-shadow: 0 4px 12px -3px rgba(255, 107, 90, .45);
}
.cand-label-c2 {
  background: linear-gradient(135deg, #A78BFA, #C4B5FD);
  box-shadow: 0 4px 12px -3px rgba(167, 139, 250, .45);
}
.cand-label-c3 {
  background: linear-gradient(135deg, #34D399, #6EE7B7);
  box-shadow: 0 4px 12px -3px rgba(52, 211, 153, .45);
}

/* Candidate card border/accent by id */
.cand.cand-c1 { border-top: 3px solid var(--coral); }
.cand.cand-c2 { border-top: 3px solid var(--lilac); }
.cand.cand-c3 { border-top: 3px solid var(--mint); }
.cand.cand-c1.selected {
  background: linear-gradient(180deg, rgba(255, 107, 90, .06), transparent 40%);
  border-color: var(--coral);
  box-shadow: 0 0 0 2px rgba(255, 107, 90, .25), var(--sh-2);
}
.cand.cand-c2.selected {
  background: linear-gradient(180deg, rgba(167, 139, 250, .06), transparent 40%);
  border-color: var(--lilac);
  box-shadow: 0 0 0 2px rgba(167, 139, 250, .25), var(--sh-2);
}
.cand.cand-c3.selected {
  background: linear-gradient(180deg, rgba(52, 211, 153, .06), transparent 40%);
  border-color: var(--mint);
  box-shadow: 0 0 0 2px rgba(52, 211, 153, .25), var(--sh-2);
}

/* Picked-rule by id (in DetailForm) */
.picked-rule {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 18px;
  background: var(--cream-2);
  border-radius: var(--r-md);
  border-left: 3px solid var(--ink-3);
}
.picked-rule.pr-c1 { border-left-color: var(--coral); background: linear-gradient(90deg, rgba(255, 107, 90, .08), var(--cream-2)); }
.picked-rule.pr-c2 { border-left-color: var(--lilac); background: linear-gradient(90deg, rgba(167, 139, 250, .08), var(--cream-2)); }
.picked-rule.pr-c3 { border-left-color: var(--mint);  background: linear-gradient(90deg, rgba(52, 211, 153, .08), var(--cream-2)); }

/* Proposal groups by id */
.prop-group .pg-no { display: none !important; }
.prop-group.pg-c1 { border-top: 3px solid var(--coral); }
.prop-group.pg-c2 { border-top: 3px solid var(--lilac); }
.prop-group.pg-c3 { border-top: 3px solid var(--mint); }

/* =========================================================
   V12 — Participation: collapsible miss list
   ========================================================= */
.ab-miss-toggle {
  margin-top: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  padding: 8px 12px;
  background: var(--cream-2);
  border-radius: var(--r-sm);
  font-size: 11.5px;
  font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background .2s;
}
.ab-miss-toggle:hover {
  background: rgba(255, 107, 90, .08);
  color: var(--coral);
}
.ab-miss-toggle .ab-locked {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-3);
  margin-left: auto;
}
.ab-miss-toggle .pa-chev {
  display: inline-flex;
  transition: transform 0.2s;
  color: var(--ink-3);
}
.ab-miss-toggle .pa-chev.open {
  transform: rotate(180deg);
}
.ab-miss-label { display: none !important; }

/* =========================================================
   V12 — Streak flame: fill from bottom + Friday red blaze
   ========================================================= */
/* Override the v10 flame fill with proper SVG mask-based fill */
.flame-wrap {
  position: relative;
  width: 46px; height: 52px;
  display: grid; place-items: center;
}
.flame-svg { overflow: visible; }
.flame-fill {
  /* Animate y attribute via SMIL isn't reliable cross-browser,
     so use scale-y transform with bottom origin */
  transform-origin: 50% 28px;
  /* Initial: fully scaled */
  transition: transform 0.4s cubic-bezier(.18, .89, .32, 1.28);
  animation: flame-fill-rise 1.4s ease-in-out infinite;
}
.flame-wrap[style*="--fill: 100%"] .flame-fill {
  transform: scale(1, 0);  /* day 0: empty */
}
/* Friday blaze: flame turns red at full fill */
.flame-wrap.blaze .flame-svg {
  animation: blaze-pulse-v12 0.7s ease-in-out infinite;
}
.flame-wrap.blaze .flame-fill {
  filter: hue-rotate(-15deg) saturate(1.4) brightness(1.15)
          drop-shadow(0 0 8px rgba(255, 60, 30, .9));
  animation: flame-blaze-rise 0.5s ease-in-out infinite;
}
.flame-wrap.blaze .flame-tip {
  fill: #FFE8C0;
  filter: drop-shadow(0 0 12px #FF4A22);
}
@keyframes flame-fill-rise {
  0%, 100% { filter: brightness(1) drop-shadow(0 0 4px rgba(255, 107, 90, .5)); }
  50% { filter: brightness(1.1) drop-shadow(0 0 8px rgba(251, 191, 36, .7)); }
}
@keyframes flame-blaze-rise {
  0%, 100% { transform: scale(1, 1); }
  50% { transform: scale(1.04, 1.06); }
}
@keyframes blaze-pulse-v12 {
  0%, 100% { transform: scale(1) translateY(0); filter: drop-shadow(0 0 8px rgba(255, 76, 30, .65)); }
  50% { transform: scale(1.08) translateY(-2px); filter: drop-shadow(0 0 16px rgba(255, 76, 30, .9)); }
}

/* =========================================================
   V12 — Background drift twinkle stars
   ========================================================= */
.bg-tw {
  animation: bg-tw-flick 3s ease-in-out infinite;
}
@keyframes bg-tw-flick {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.7; }
}

/* =========================================================
   V12 — Hero v12 (replaces v11 lying-superman, back to scattered)
   ========================================================= */
.hero.hero-v12 {
  position: relative;
  padding: 22px 36px !important;
  min-height: 190px !important;
  display: flex !important;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  border-radius: var(--r-xl);
  overflow: hidden;
  background: linear-gradient(135deg, #0E0822 0%, #1A0F2E 50%, #2D1B3D 100%);
  box-shadow: var(--sh-3);
}
.hero.hero-v12 .hero-content {
  position: relative;
  z-index: 2;
  max-width: 760px;
}
.hero.hero-v12 .hero-title {
  margin: 0;
  font-family: 'Noto Serif KR', 'DM Serif Display', serif;
  font-weight: 600;
  font-style: italic;
  font-size: 34px;
  letter-spacing: 0.02em;
  line-height: 1.15;
  color: #fff;
  text-shadow: 0 2px 18px rgba(0, 0, 0, .45);
}
.hero.hero-v12 .hero-title .ht-text {
  display: inline-block;
  background: linear-gradient(135deg, #fff 30%, #FBE38A 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero.hero-v12 .hero-key {
  margin-top: 10px;
  font-size: 19px;
  line-height: 1.45;
  color: rgba(255, 255, 255, 0.95);
  font-family: 'Noto Serif KR', serif;

}
.hero.hero-v12 .hero-key .hk-quote {
  font-style: italic;
  color: var(--sun);
  font-size: 22px;
  opacity: 0.85;
  font-weight: 600;
}
.hero.hero-v12 .constellation {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
  opacity: 0.88;
}

/* Star animation v12 — random scatter → formation → high-5 → scatter (18s loop) */
.hero.hero-v12 .hero-star,
.hero.hero-v12 .hero-star-core {
  transform: translate(0, 0);
  transform-box: fill-box;
  transform-origin: center;
  animation: scatter-form-v12 18s cubic-bezier(.45, .2, .55, .85) infinite;
}
@keyframes scatter-form-v12 {
  /* Scattered phase with drift */
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 0.65;
  }
  8% {
    transform: translate(var(--drift-x), var(--drift-y)) scale(1);
    opacity: 0.9;
  }
  16% {
    transform: translate(calc(var(--drift-x) * -1), calc(var(--drift-y) * 0.5)) scale(1);
    opacity: 0.75;
  }
  22% {
    transform: translate(calc(var(--drift-x) * 0.5), calc(var(--drift-y) * -1)) scale(1);
    opacity: 0.85;
  }
  /* Gather → formation */
  32% {
    transform: translate(calc(var(--dx) * 0.45), calc(var(--dy) * 0.45)) scale(1);
    opacity: 0.92;
  }
  /* In formation */
  42%, 60% {
    transform: translate(var(--dx), var(--dy)) scale(1);
    opacity: 1;
  }
  /* High-5 pulse */
  48%, 54% {
    transform: translate(var(--dx), var(--dy)) scale(1.08);
  }
  /* Scatter back */
  70% {
    transform: translate(calc(var(--dx) * 0.45), calc(var(--dy) * 0.45)) scale(1);
    opacity: 0.85;
  }
  82% {
    transform: translate(var(--drift-x), var(--drift-y)) scale(1);
    opacity: 0.7;
  }
  92% {
    transform: translate(calc(var(--drift-x) * -1), 0) scale(1);
    opacity: 0.65;
  }
  100% {
    transform: translate(0, 0) scale(1);
    opacity: 0.65;
  }
}

/* Hand glow at high-5 */
.hero.hero-v12 .hand-star {
  animation: scatter-form-v12 18s cubic-bezier(.45, .2, .55, .85) infinite,
             hand-glow-v12 18s ease-out infinite;
}
@keyframes hand-glow-v12 {
  0%, 42% { filter: url(#starGlow); }
  46%, 60% { filter: url(#starGlow) drop-shadow(0 0 14px #FBBF24); }
  64%, 100% { filter: url(#starGlow); }
}
.hero.hero-v12 .face-star {
  animation: scatter-form-v12 18s cubic-bezier(.45, .2, .55, .85) infinite,
             face-twinkle 2.4s ease-in-out infinite;
}

/* Bones v12 — visible during formation */
.hero.hero-v12 .bone {
  stroke: rgba(251, 191, 36, 0.5);
  stroke-width: 0.7;
  fill: none;
  opacity: 0;
  animation: bone-fade-v12 18s ease-in-out infinite;
}
@keyframes bone-fade-v12 {
  0%, 35% { opacity: 0; }
  44%, 62% { opacity: 0.55; }
  72%, 100% { opacity: 0; }
}
.hero.hero-v12 .bone.hi5-bone {
  stroke: #FBBF24;
  stroke-width: 1.6;
  filter: drop-shadow(0 0 6px rgba(251, 191, 36, .7));
  animation: hi5-bone-v12 18s ease-out infinite;
}
@keyframes hi5-bone-v12 {
  0%, 44% { opacity: 0; }
  48%, 58% { opacity: 1; }
  64%, 100% { opacity: 0; }
}

/* Halo + rays v12 */
.hero.hero-v12 .hi5-halo {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: halo-burst-v12 18s ease-out infinite;
}
@keyframes halo-burst-v12 {
  0%, 44% { opacity: 0; transform: scale(0.4); }
  48% { opacity: 0.9; transform: scale(1); }
  52% { opacity: 1; transform: scale(1.6); }
  58% { opacity: 0.5; transform: scale(2.2); }
  64% { opacity: 0; transform: scale(2.6); }
  100% { opacity: 0; transform: scale(0.4); }
}
.hero.hero-v12 .hi5-rays {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: rays-burst-v12 18s ease-out infinite;
}
@keyframes rays-burst-v12 {
  0%, 44% { opacity: 0; transform: rotate(0deg) scale(0.5); }
  50% { opacity: 1; transform: rotate(30deg) scale(1.1); }
  58% { opacity: 0.6; transform: rotate(60deg) scale(1.5); }
  64% { opacity: 0; transform: rotate(80deg) scale(1.7); }
  100% { opacity: 0; transform: rotate(80deg) scale(0.5); }
}

.hero.hero-v13 {

  justify-content: center;

}
.hero.hero-v13 .hero-content {
  position: relative;
  z-index: 2;

}
.hero.hero-v13 .hero-title {
  margin: 0;

  font-style: italic;
  font-size: 44px;

  -webkit-background-clip: text;

}

/* Floating stars system */
.float-stars-bg {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: auto;  /* enable mouse events */
  overflow: hidden;
}
.fstar-anchor {
  position: absolute;
  pointer-events: none;
  transform: translate(-50%, -50%);
}
.fstar-evade {
  display: inline-block;
  transform: translate(var(--ox, 0px), var(--oy, 0px));
  transition: transform 0.45s cubic-bezier(.25, .8, .25, 1);
  pointer-events: none;
}
.fstar-drift {
  display: inline-block;
  animation: fstar-drift 6s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes fstar-drift {
  0%   { transform: translate(0, 0); }
  50%  { transform: translate(4px, -6px); }
  100% { transform: translate(-3px, 3px); }
}
.fstar-dot {
  display: block;
  width: var(--size, 2px);
  height: var(--size, 2px);
  background: white;
  border-radius: 50%;
  box-shadow:
    0 0 calc(4px + var(--glow, 0) * 18px) rgba(251, 191, 36, calc(0.3 + var(--glow, 0) * 0.6)),
    0 0 calc(2px + var(--glow, 0) * 8px) rgba(255, 255, 255, calc(0.4 + var(--glow, 0) * 0.5));
  opacity: calc(0.55 + var(--glow, 0) * 0.45);
  transition: box-shadow 0.35s, opacity 0.35s, transform 0.35s;
  transform: scale(calc(1 + var(--glow, 0) * 0.6));
}

/* =========================================================

   V13 — White input boxes (chat, leader comment, principle chat)

}

  background: transparent !important;
  border: none !important;
  padding: 0 !important;
  gap: 8px;
}
.leader-cmt-input-inline .white-input {

  padding: 10px 16px;

  56%  { transform: translate(var(--hi5-dx), var(--hi5-dy)); opacity: 1; }

/* =========================================================
   V18 — Constellation 4-stage cycle (REST → FAR → CLOSE → HI5)
   ========================================================= */
.clap-star-wrap {
  transform-box: fill-box;
  transform-origin: center;
  animation: clap-cycle-v18 22s cubic-bezier(.45, .2, .55, .85) infinite;
}
/* Override v17 cycle */
@keyframes clap-cycle {
  0% { transform: translate(0, 0); }
  100% { transform: translate(0, 0); }
}
@keyframes clap-cycle-v18 {
  /* Phase 1: scatter (0-12%) */
  0%   { transform: translate(0, 0); opacity: 0.55; }
  10%  { transform: translate(0, 0); opacity: 0.75; }
  /* Phase 2: gather to STAND_FAR (12-25%) — form people far apart */
  22%  { transform: translate(var(--far-dx), var(--far-dy)); opacity: 0.95; }
  30%  { transform: translate(var(--far-dx), var(--far-dy)); opacity: 1; }
  /* Phase 3: walk closer to STAND_CLOSE (30-42%) — bodies move inward, arms still down */
  42%  { transform: translate(var(--close-dx), var(--close-dy)); opacity: 1; }
  /* Phase 4: raise arms to HI5 (42-50%) — arms go up, hands meet */
  50%  { transform: translate(var(--hi5-dx), var(--hi5-dy)); opacity: 1; }
  54%  { transform: translate(var(--hi5-dx), var(--hi5-dy)) scale(1.08); }
  /* Phase 5: hold HI5 (50-60%) — clap moment */
  60%  { transform: translate(var(--hi5-dx), var(--hi5-dy)); opacity: 1; }
  /* Phase 6: lower arms, walk back to STAND_CLOSE → FAR (60-78%) */
  68%  { transform: translate(var(--close-dx), var(--close-dy)); opacity: 1; }
  78%  { transform: translate(var(--far-dx), var(--far-dy)); opacity: 0.95; }
  /* Phase 7: scatter back (78-100%) */
  90%  { transform: translate(0, 0); opacity: 0.7; }
  100% { transform: translate(0, 0); opacity: 0.55; }
}

.clap-hand-star {
  animation: clap-cycle-v18 22s cubic-bezier(.45, .2, .55, .85) infinite,
             clap-hand-glow-v18 22s ease-out infinite;
}
@keyframes clap-hand-glow-v18 {
  0%, 46% { filter: url(#clapStarGlow); }
  50%, 60% { filter: url(#clapStarGlow) drop-shadow(0 0 16px #FBBF24); }
  64%, 100% { filter: url(#clapStarGlow); }
}

/* Bones — 3 versions crossfade based on phase */
.clap-bone-far {
  animation: bone-far-v18 22s ease-in-out infinite;
}
@keyframes bone-far-v18 {
  0%, 16% { opacity: 0; }
  22%, 32% { opacity: 0.55; }
  38%, 78% { opacity: 0; }
  82% { opacity: 0.55; }
  90%, 100% { opacity: 0; }
}
.clap-bone-close {
  animation: bone-close-v18 22s ease-in-out infinite;
}
@keyframes bone-close-v18 {
  0%, 36% { opacity: 0; }
  42%, 44% { opacity: 0.55; }
  50%, 64% { opacity: 0; }
  68%, 72% { opacity: 0.55; }
  78%, 100% { opacity: 0; }
}
.clap-bone-hi5 {
  animation: bone-hi5-v18 22s ease-in-out infinite;
}
@keyframes bone-hi5-v18 {
  0%, 46% { opacity: 0; }
  50%, 60% { opacity: 0.65; }
  64%, 100% { opacity: 0; }
}
.clap-hi5-bone {
  stroke: #FBBF24;
  stroke-width: 1.5;
  fill: none;
  filter: drop-shadow(0 0 6px rgba(251, 191, 36, .7));
  animation: hi5-bone-v18 22s ease-out infinite;
}
@keyframes hi5-bone-v18 {
  0%, 48% { opacity: 0; }
  52%, 58% { opacity: 1; }
  62%, 100% { opacity: 0; }
}
.clap-halo {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: halo-clap-v18 22s ease-out infinite;
}
@keyframes halo-clap-v18 {
  0%, 48% { opacity: 0; transform: scale(0.4); }
  52% { opacity: 0.9; transform: scale(1); }
  56% { opacity: 1; transform: scale(1.6); }
  60% { opacity: 0.5; transform: scale(2.2); }
  64% { opacity: 0; transform: scale(2.6); }
  100% { opacity: 0; transform: scale(0.4); }
}
.clap-rays {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: rays-clap-v18 22s ease-out infinite;
}
@keyframes rays-clap-v18 {
  0%, 48% { opacity: 0; transform: rotate(0deg) scale(0.5); }
  54% { opacity: 1; transform: rotate(30deg) scale(1.1); }
  60% { opacity: 0.6; transform: rotate(60deg) scale(1.5); }
  64% { opacity: 0; transform: rotate(80deg) scale(1.7); }
  100% { opacity: 0; transform: rotate(80deg) scale(0.5); }
}

   ========================================================= */
.flame-fill5 {

}
.flame-fill5 svg { overflow: visible; }
.flame-fill5 .flame-fill-rect {

              height 0.4s cubic-bezier(.4, 0, .2, 1);
}
.flame-fill5.blaze {

}

}
@keyframes blaze-pulse-v18 {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.08); }
}
@keyframes tip-flick-v18 {
  0%, 100% { transform: scale(1) translateY(0); opacity: 0.9; }
  50%      { transform: scale(1.1, 1.15) translateY(-1px); opacity: 1; }

/* =========================================================
   V21 — Background rising starlight (dark tones on cream bg)
   ========================================================= */
.bg-stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}
.app {
  position: relative;
  z-index: 1;
}
.bg-star {
  position: absolute;
  bottom: -8px;
  border-radius: 50%;
  animation: star-rise linear infinite;
  opacity: 0;
  will-change: transform, opacity;
}
/* Tone 0 — Deep plum (most visible on cream) */
.bg-star-0 {
  background: radial-gradient(circle, rgba(45, 27, 61, 0.85) 0%, rgba(45, 27, 61, 0.5) 40%, rgba(45, 27, 61, 0) 100%);
  box-shadow: 0 0 5px rgba(45, 27, 61, 0.4);
}
/* Tone 1 — Lilac/violet (medium contrast) */
.bg-star-1 {
  background: radial-gradient(circle, rgba(135, 92, 162, 0.8) 0%, rgba(135, 92, 162, 0.45) 40%, rgba(135, 92, 162, 0) 100%);
  box-shadow: 0 0 6px rgba(135, 92, 162, 0.5);
}
/* Tone 2 — Deep amber (subtle warm accent) */
.bg-star-2 {
  background: radial-gradient(circle, rgba(168, 116, 30, 0.7) 0%, rgba(168, 116, 30, 0.4) 40%, rgba(168, 116, 30, 0) 100%);
  box-shadow: 0 0 5px rgba(168, 116, 30, 0.45);
}
/* Tone 3 — Coral mute (warm accent) */
.bg-star-3 {
  background: radial-gradient(circle, rgba(193, 61, 31, 0.7) 0%, rgba(193, 61, 31, 0.4) 40%, rgba(193, 61, 31, 0) 100%);
  box-shadow: 0 0 5px rgba(193, 61, 31, 0.4);
}
@keyframes star-rise {
  0%   { transform: translate(0, 0) scale(0.6); opacity: 0; }
  8%   { opacity: 0.55; transform: translate(calc(var(--drift, 0px) * 0.15), -8vh) scale(0.85); }
  25%  { opacity: 0.9; transform: translate(calc(var(--drift, 0px) * 0.4), -28vh) scale(1); }
  55%  { opacity: 1; transform: translate(var(--drift, 0px), -58vh) scale(1.1); }
  80%  { opacity: 0.7; transform: translate(calc(var(--drift, 0px) * 1.2), -85vh) scale(1); }
  100% { transform: translate(calc(var(--drift, 0px) * 1.4), -110vh) scale(0.7); opacity: 0; }
}

/* Add subtle twinkle to a portion of stars */
.bg-star:nth-child(3n) {
  animation: star-rise linear infinite, star-twinkle 2.4s ease-in-out infinite;
}
@keyframes star-twinkle {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.5) drop-shadow(0 0 4px currentColor); }
}

/* =========================================================
   V21 — Flame badge: floating + white flame flickering
   ========================================================= */
.flame-badge {
  animation: flame-badge-float 3.4s ease-in-out infinite;
  position: relative;
}
@keyframes flame-badge-float {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-5px); }
}

/* Outer glow ring breathes too */
.flame-badge .fb-outer {
  animation: fb-outer-breathe 2.8s ease-in-out infinite;
  transform-origin: 24px 24px;
  transform-box: fill-box;
}
@keyframes fb-outer-breathe {
  0%, 100% { opacity: 0.8; transform: scale(1); }
  50%      { opacity: 1; transform: scale(1.08); }
}

/* Main white flame body — flickering (scale + slight sway) */
.flame-badge .fb-flame {
  transform-origin: 24px 24px;
  transform-box: fill-box;
  animation: fb-flame-flicker 1.3s ease-in-out infinite;
  filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.4));
}
@keyframes fb-flame-flicker {
  0%   { transform: scale(1, 1) translateY(0) skewX(0deg); opacity: 1; }
  20%  { transform: scale(0.94, 1.1) translateY(-0.6px) skewX(-1.5deg); opacity: 0.92; }
  40%  { transform: scale(1.06, 0.96) translateY(0.3px) skewX(1deg); opacity: 1; }
  60%  { transform: scale(0.98, 1.06) translateY(-0.4px) skewX(-1deg); opacity: 0.95; }
  80%  { transform: scale(1.04, 0.98) translateY(0.2px) skewX(1.5deg); opacity: 1; }
  100% { transform: scale(1, 1) translateY(0) skewX(0deg); opacity: 1; }
}

/* Inner tip — faster, more erratic flicker */
.flame-badge .fb-tip {
  transform-origin: 24px 22px;
  transform-box: fill-box;
  animation: fb-tip-flick 0.85s ease-in-out infinite;
}
@keyframes fb-tip-flick {
  0%   { transform: scale(1, 1) translateY(0); opacity: 0.85; }
  30%  { transform: scale(1.15, 1.2) translateY(-1.2px); opacity: 0.6; }
  55%  { transform: scale(0.9, 1.1) translateY(0.4px); opacity: 1; }
  80%  { transform: scale(1.1, 0.95) translateY(-0.6px); opacity: 0.7; }
  100% { transform: scale(1, 1) translateY(0); opacity: 0.85; }
}

/* Blazing state — even more intense flicker */
.flame-badge.blaze {
  animation: flame-badge-float 2s ease-in-out infinite;
}
.flame-badge.blaze .fb-flame {
  animation: fb-flame-flicker 0.7s ease-in-out infinite;
  filter: drop-shadow(0 0 6px rgba(255, 220, 180, 0.8));
}
.flame-badge.blaze .fb-tip {
  animation: fb-tip-flick 0.45s ease-in-out infinite;
}

/* Proposal group columns can be different heights to fit their content */
.proposals.proposals-3col {
  align-items: start !important;
}

/* =========================================================
   V33 — Leader-pick-btn REMOVED entirely; card itself is clickable
   ========================================================= */
/* Defensively hide any lingering pick-button class */
.leader-pick-btn,
.leader-pick-btn.lpb-v26,
.leader-pick-btn.lpb-v27 {
  display: none !important;
}

/* Leader-clickable card: hover cue */
.prop.leader-clickable {
  cursor: pointer;
  transition: all 0.2s cubic-bezier(.4, 0, .2, 1);
  position: relative;
}
.prop.leader-clickable:hover {
  border-color: var(--lilac) !important;
  transform: translateY(-2px);
  box-shadow: 0 8px 20px -6px rgba(167, 139, 250, 0.45) !important;
}
/* Leader-clickable card: subtle "팀장 선택 가능" hint */
.prop.leader-clickable::after {
  content: "클릭하여 최종 그라운드룰로";
  position: absolute;
  bottom: 8px;
  right: 12px;
  font-size: 9px;
  color: var(--ink-3);
  opacity: 0;
  transition: opacity 0.2s;
  font-weight: 600;
  letter-spacing: -0.01em;
  pointer-events: none;
}
.prop.leader-clickable:hover::after {
  opacity: 0.65;
}
.prop.leader-clickable.leader-selected::after {
  display: none;
}

/* Selected card — leader has chosen this proposal */
.prop.leader-selected {
  border-color: #34D399 !important;
  background: linear-gradient(180deg, rgba(52, 211, 153, 0.10), #fff) !important;
  box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.35), 0 6px 18px -4px rgba(52, 211, 153, 0.35) !important;
  transform: translateY(-1px);
}
.prop.leader-selected:hover {
  border-color: #2E9D6E !important;
}

/* 팀장 선택 tag inside selected card */
.prop .prop-selected-tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  background: linear-gradient(135deg, #2E9D6E, #34D399);
  color: #fff;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.04em;
  padding: 2px 7px;
  border-radius: 999px;
  box-shadow: 0 2px 5px -1px rgba(46, 157, 110, 0.5);
  flex-shrink: 0;
  white-space: nowrap;
  line-height: 1.4;
  animation: prop-selected-pop 0.3s cubic-bezier(.18, .89, .32, 1.28);
}
@keyframes prop-selected-pop {
  0%   { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* 나의 제안 tag — make sure it's visible and styled */
.prop.is-mine .me-tag,
.prop .me-tag {
  font-family: var(--f-display) !important;
  font-style: italic !important;
  font-size: 9.5px !important;
  background: linear-gradient(90deg, var(--coral), var(--lilac)) !important;
  color: #fff !important;
  padding: 2px 8px !important;
  border-radius: 999px !important;
  font-weight: 700 !important;
  flex-shrink: 0 !important;
  white-space: nowrap !important;
  line-height: 1.4 !important;
  box-shadow: 0 2px 5px -1px rgba(255, 107, 90, 0.3);
  display: inline-flex !important;
  align-items: center !important;
}

/* "나의 제안" card: subtle warm tint to distinguish */
.prop.is-mine {
  background: linear-gradient(180deg, rgba(255, 107, 90, 0.04), #fff) !important;
  border-color: rgba(255, 107, 90, 0.25) !important;
}
.prop.is-mine.leader-selected {
  background: linear-gradient(180deg, rgba(52, 211, 153, 0.10), #fff) !important;
}

/* Make heart NOT trigger card click — also visual hint */
.prop .heart.heart-big {
  position: relative;
  z-index: 2;
}

/* =========================================================
   V34 — Candidate datetime label (replaces From nickname)
   ========================================================= */
.cand-datetime {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  color: var(--ink-3);
  font-weight: 600;
  letter-spacing: 0.01em;
  font-variant-numeric: tabular-nums;
}
.cand-datetime svg {
  color: var(--ink-3);
  opacity: 0.7;
  flex-shrink: 0;
}
/* Defensively hide any lingering cand-from element */
.cand-from { display: none !important; }

/* =========================================================
   V35 — Multi-rule confirmation: confirmed list + add-rule section
   ========================================================= */

/* List of confirmed rules (above the add form) */
.confirmed-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin: 14px 0 18px;
}

/* Individual confirmed rule item */
.confirmed-item {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: start;
  gap: 14px;
  padding: 14px 16px 14px 14px;
  background: linear-gradient(180deg, rgba(52, 211, 153, 0.07), #fff);
  border: 1px solid rgba(52, 211, 153, 0.35);
  border-radius: var(--r-md);
  box-shadow: 0 3px 10px -4px rgba(46, 157, 110, 0.18);
  animation: confirmed-item-in 0.4s cubic-bezier(.18, .89, .32, 1.28);
  position: relative;
}
@keyframes confirmed-item-in {
  0%   { opacity: 0; transform: translateY(-6px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* RULE number badge on the left */
.confirmed-item .ci-num {
  font-family: var(--f-display);
  font-size: 10.5px;
  font-weight: 800;
  letter-spacing: 0.12em;
  color: #fff;
  background: linear-gradient(135deg, #2E9D6E, #34D399);
  padding: 5px 10px 4px;
  border-radius: 999px;
  white-space: nowrap;
  box-shadow: 0 2px 6px -2px rgba(46, 157, 110, 0.4);
  align-self: start;
  margin-top: 2px;
}

/* Body of each confirmed rule */
.confirmed-item .ci-body {
  min-width: 0;
}
.confirmed-item .ci-body .conf-text {
  font-family: var(--f-display);
  font-size: 16px;
  font-weight: 700;
  line-height: 1.5;
  color: var(--ink);
  margin-bottom: 10px;
}
.confirmed-item .ci-body .conf-meta {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.confirmed-item .conf-meta .l {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.confirmed-item .conf-meta .v-block {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.5;
}
.confirmed-item .conf-meta .conf-half {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.confirmed-item .conf-meta .conf-half .v {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
}

/* Remove (X) button */
.confirmed-item .ci-remove {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink-3);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
  flex-shrink: 0;
  align-self: start;
  margin-top: 2px;
}
.confirmed-item .ci-remove:hover {
  background: rgba(255, 107, 90, 0.08);
  border-color: var(--coral);
  color: var(--coral);
  transform: scale(1.08);
}
.confirmed-item .ci-remove:active {
  transform: scale(0.92);
}

/* Add-rule section (form area) */
.add-rule-section {
  margin-top: 4px;
}
.add-rule-section.has-prior {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 2px dashed rgba(52, 211, 153, 0.35);
  position: relative;
}
.add-rule-section.has-prior::before {
  content: "또 다른 그라운드룰을 추가하려면 아래 폼을 채우거나, 위 제안 카드를 클릭하세요";
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--paper);
  padding: 0 12px;
  font-size: 10.5px;
  color: var(--ink-3);
  font-weight: 600;
  letter-spacing: -0.005em;
  white-space: nowrap;
}

/* "그라운드룰 추가하기" title above form */
.ars-title {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--f-display);
  font-size: 14.5px;
  font-weight: 800;
  color: var(--lilac);
  margin-bottom: 12px;
  padding: 4px 10px 4px 8px;
  background: rgba(167, 139, 250, 0.10);
  border: 1px solid rgba(167, 139, 250, 0.3);
  border-radius: 999px;
}

/* Status badge — accent when has confirmations */
.confirm-status.done .status-badge {
  background: linear-gradient(135deg, #2E9D6E, #34D399);
  color: #fff;
  border: none;
}

/* Responsive — collapse conf-half on narrow screens */
@media (max-width: 720px) {
  .confirmed-item .conf-meta .conf-half {
    grid-template-columns: 1fr 1fr;
  }
  .confirmed-item {
    grid-template-columns: 1fr;
  }
  .confirmed-item .ci-remove {
    position: absolute;
    top: 10px;
    right: 10px;
  }
}

/* =========================================================
   V36 — Confirmed rule display: BIGGER, CLEARER (v34-prominent style)
   ========================================================= */

/* The confirmed item card itself — solid white bg, bold green ring */
.confirmed-item {
  background: #fff !important;
  border: 2px solid #34D399 !important;
  box-shadow: 0 0 0 1px rgba(52, 211, 153, 0.18),
              0 6px 18px -4px rgba(46, 157, 110, 0.22) !important;
  padding: 18px 20px 18px 18px !important;
  border-radius: var(--r-lg) !important;
  gap: 18px !important;
}

/* RULE 01 / 02 badge — bigger and more prominent */
.confirmed-item .ci-num {
  font-size: 12px !important;
  font-weight: 800 !important;

  letter-spacing: 0.14em !important;
  box-shadow: 0 4px 10px -2px rgba(46, 157, 110, 0.55) !important;
}

/* The main rule text — large, bold, dark — like v34 "conf-text" */
.confirmed-item .ci-body .conf-text {
  font-family: 'Nanum Myeongjo', 'Noto Serif KR', var(--f-display), serif !important;
  font-size: 20px !important;
  font-weight: 800 !important;

  letter-spacing: -0.01em !important;
  margin-bottom: 14px !important;
  text-wrap: pretty;
}

/* Meta section spacing & labels */
.confirmed-item .conf-meta {
  gap: 12px !important;
  padding-top: 12px !important;
  border-top: 1px solid rgba(52, 211, 153, 0.18);
}
.confirmed-item .conf-meta .l {
  font-size: 11px !important;
  letter-spacing: 0.10em !important;
  color: #2E9D6E !important;
  font-weight: 800 !important;
  text-transform: uppercase !important;
  margin-bottom: 4px !important;
}

/* The "실천 방식" full text — bigger */
.confirmed-item .conf-meta .v-block {
  font-size: 15px !important;
  font-weight: 600 !important;
  color: var(--ink) !important;
  line-height: 1.55 !important;
  display: block;
}

/* 3-column row (빈도/기간/확정일) — bigger values */
.confirmed-item .conf-meta .conf-half {
  margin-top: 4px;
  gap: 16px !important;
}
.confirmed-item .conf-meta .conf-half .v {
  font-size: 15px !important;
  font-weight: 700 !important;
  color: var(--ink) !important;
}

/* Remove button — kept compact, but more visible against white bg */
.confirmed-item .ci-remove {
  width: 30px !important;
  height: 30px !important;
  border: 1.5px solid var(--line) !important;
}

/* When multiple rules, the spacing between them is more generous */
.confirmed-list {
  gap: 16px !important;
}

/* Add an "EMPLOYEE VIEW" subtle decoration above confirmed list to give weight */
.confirmed-list::before {
  content: "✓ 우리팀에서 확정된 그라운드룰";
  display: block;
  font-family: var(--f-display);
  font-size: 12.5px;
  font-weight: 800;
  letter-spacing: 0.04em;
  color: #2E9D6E;
  padding-bottom: 4px;
  border-bottom: 1px dashed rgba(52, 211, 153, 0.4);
  margin-bottom: 6px;
}

/* =========================================================
   V37 — Miss-row layout: name + position + 독려 button
   ========================================================= */
.miss-row {
  display: grid !important;
  grid-template-columns: auto auto 1fr auto !important;
  align-items: center !important;
  gap: 8px !important;
  padding: 7px 8px 7px 11px !important;
  transition: all 0.18s ease;
}
.miss-row .mn {
  font-weight: 600 !important;
}
.miss-row .mp {
  /* position label sits right after name */
}

/* 독려 button */
.encourage-btn {
  grid-column: 4;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 4px 9px 4px 8px;
  background: linear-gradient(135deg, var(--coral), #FF8A75);
  color: #fff;
  border: none;
  border-radius: 999px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: -0.01em;
  cursor: pointer;
  box-shadow: 0 2px 6px -1px rgba(255, 107, 90, 0.4);
  transition: all 0.18s ease;
  white-space: nowrap;
  flex-shrink: 0;
  line-height: 1.4;
}
.encourage-btn svg {
  flex-shrink: 0;
}
.encourage-btn:hover {
  transform: scale(1.06);
  box-shadow: 0 4px 10px -1px rgba(255, 107, 90, 0.55);
  filter: brightness(1.06);
}
.encourage-btn:active {
  transform: scale(0.94);
}

/* Sent state — green check */
.encourage-btn.sent {
  background: linear-gradient(135deg, #2E9D6E, #34D399);
  box-shadow: 0 2px 6px -1px rgba(46, 157, 110, 0.45);
  cursor: default;
}
.encourage-btn.sent:hover {
  transform: scale(1.04);
  filter: brightness(1);
}

/* Encouraged row gets a subtle green tint to indicate handled */
.miss-row.is-encouraged {
  background: linear-gradient(180deg, rgba(52, 211, 153, 0.06), var(--paper)) !important;
  border-color: rgba(52, 211, 153, 0.35) !important;
}
.miss-row.is-encouraged .mn,
.miss-row.is-encouraged .mp {
  opacity: 0.7;
}

   ========================================================= */
.layout {
  grid-template-columns: 260px minmax(0, 1fr) 280px !important;
  gap: 36px !important;
  padding: 22px 20px 60px !important;
  max-width: 1820px !important;
}

/* =========================================================
   V41 — Dark theme for outer frame (topnav + sidebars + page bg),
   center stays bright for focus
   ========================================================= */

/* ---------- 1. Body background — deep cosmic ---------- */
body {
  background:
    radial-gradient(ellipse 70% 40% at 15% 12%, rgba(94, 51, 138, 0.45) 0%, transparent 60%),
    radial-gradient(ellipse 60% 35% at 85% 88%, rgba(30, 91, 168, 0.32) 0%, transparent 55%),
    radial-gradient(ellipse 50% 30% at 50% 60%, rgba(80, 30, 120, 0.22) 0%, transparent 50%),
    linear-gradient(180deg, #0a0518 0%, #15082a 35%, #1a0f2e 65%, #0d0820 100%) !important;
  background-attachment: fixed !important;
  background-size: 100% 200vh, 100% 200vh, 100% 200vh, 100% 100%;
  min-height: 100vh;
}

/* Background stars become bright on dark bg */
.bg-star-0 {
  background: radial-gradient(circle, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.5) 40%, rgba(255, 255, 255, 0) 100%) !important;
  box-shadow: 0 0 7px rgba(255, 255, 255, 0.65), 0 0 14px rgba(255, 255, 255, 0.3) !important;
}

/* =========================================================
   V42 — Deeper darker background + twinkling stars + shooting stars
   ========================================================= */
body {
  background:
    radial-gradient(ellipse 60% 35% at 18% 14%, rgba(94, 51, 138, 0.32) 0%, transparent 60%),
    radial-gradient(ellipse 55% 32% at 82% 86%, rgba(30, 91, 168, 0.25) 0%, transparent 55%),
    radial-gradient(ellipse 40% 25% at 50% 55%, rgba(80, 30, 120, 0.15) 0%, transparent 50%),
    linear-gradient(180deg, #030208 0%, #07041a 35%, #0a0518 65%, #050218 100%) !important;
  background-attachment: fixed !important;
  background-size: 100% 200vh, 100% 200vh, 100% 200vh, 100% 100%;
}

/* Stars — gentle twinkling glow */
.bg-star {
  animation: bg-rise var(--rise, 20s) linear infinite,
             bg-twinkle var(--twinkle, 3s) ease-in-out infinite !important;
}
@keyframes bg-twinkle {
  0%, 100%  { filter: brightness(1) drop-shadow(0 0 4px currentColor); }
  50%       { filter: brightness(1.5) drop-shadow(0 0 8px currentColor); }
}

/* Background stars: vary twinkle timing for natural feel */
.bg-stars .bg-star:nth-child(3n)   { --twinkle: 2.3s; }
.bg-stars .bg-star:nth-child(3n+1) { --twinkle: 3.5s; }
.bg-stars .bg-star:nth-child(3n+2) { --twinkle: 4.2s; }

/* Shooting stars container — fixed full-screen overlay */
.shooting-stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 2;
}
.shooting-star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.95) 35%, #fff 50%, rgba(196, 181, 253, 0.9) 70%, rgba(196, 181, 253, 0) 100%);
  border-radius: 999px;
  box-shadow: 0 0 6px rgba(255, 255, 255, 0.9),
              0 0 14px rgba(196, 181, 253, 0.65),
              0 0 22px rgba(167, 139, 250, 0.4);
  opacity: 0;
}
.shooting-star::before {
  content: "";
  position: absolute;
  top: 50%;
  right: 100%;
  width: 140px;
  height: 1.5px;
  background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.0) 20%, rgba(255, 255, 255, 0.35) 75%, rgba(255, 255, 255, 0.85) 100%);
  transform: translateY(-50%);
  border-radius: 999px;
  filter: blur(0.5px);
}
.shooting-star.s1 {
  top: 12%; left: -150px;
  animation: shoot1 9s ease-in 1.5s infinite;
}
.shooting-star.s2 {
  top: 28%; left: -200px;
  animation: shoot2 14s ease-in 5.5s infinite;
}
.shooting-star.s3 {
  top: 8%; left: -180px;
  animation: shoot3 18s ease-in 11s infinite;
}
.shooting-star.s4 {
  top: 22%; left: -160px;
  animation: shoot4 22s ease-in 17s infinite;
}
@keyframes shoot1 {
  0%   { transform: translate(0, 0) rotate(20deg); opacity: 0; }
  3%   { opacity: 1; }
  18%  { opacity: 1; }
  22%  { transform: translate(110vw, 38vh) rotate(20deg); opacity: 0; }
  100% { transform: translate(110vw, 38vh) rotate(20deg); opacity: 0; }
}
@keyframes shoot2 {
  0%   { transform: translate(0, 0) rotate(28deg); opacity: 0; }
  2%   { opacity: 1; }
  14%  { opacity: 1; }
  18%  { transform: translate(115vw, 52vh) rotate(28deg); opacity: 0; }
  100% { transform: translate(115vw, 52vh) rotate(28deg); opacity: 0; }
}
@keyframes shoot3 {
  0%   { transform: translate(0, 0) rotate(15deg); opacity: 0; }
  3%   { opacity: 1; }
  15%  { opacity: 1; }
  20%  { transform: translate(120vw, 30vh) rotate(15deg); opacity: 0; }
  100% { transform: translate(120vw, 30vh) rotate(15deg); opacity: 0; }
}
@keyframes shoot4 {
  0%   { transform: translate(0, 0) rotate(32deg); opacity: 0; }
  2%   { opacity: 1; }
  12%  { opacity: 1; }
  16%  { transform: translate(118vw, 60vh) rotate(32deg); opacity: 0; }
  100% { transform: translate(118vw, 60vh) rotate(32deg); opacity: 0; }
}

  background: transparent !important;
}

/* Layout grid background - transparent */
.layout {
  background: transparent !important;
}

/* Make sidebar cards slightly less opaque so stars subtly visible behind them, but still readable */
.side .card,
.right .card,
.side > .character-card,
.side > .streak-card,
.side > .mission-card,
.right > .participation,
.right > .chat-card,
.right > .calendar {
  background: rgba(15, 8, 30, 0.82) !important;   /* very slight opacity to keep readability */
}

/* =========================================================
   V45 — Stars: scattered random x+y, floating drift (no vertical rise)
   ========================================================= */
.bg-star {
  position: absolute !important;
  /* `bottom: -8px` from older base — override with top from inline style */
  bottom: auto !important;
  border-radius: 50%;
  /* Two animations stacked: gentle drift + twinkle */
  animation: bg-drift var(--drift-dur, 12s) ease-in-out infinite,
             bg-twinkle-v45 var(--twinkle-dur, 3s) ease-in-out infinite !important;
  opacity: 0.85;
  will-change: transform, opacity, filter;
}

/* Gentle floating drift — small random orbit */
@keyframes bg-drift {
  0%   { transform: translate(0, 0); }
  25%  { transform: translate(var(--driftX, 0px), calc(var(--driftY, 0px) * 0.5)); }
  50%  { transform: translate(calc(var(--driftX, 0px) * 0.5), var(--driftY, 0px)); }
  75%  { transform: translate(calc(var(--driftX, 0px) * -0.3), calc(var(--driftY, 0px) * 0.3)); }
  100% { transform: translate(0, 0); }
}

/* Twinkle — brightness + glow pulse */
@keyframes bg-twinkle-v45 {
  0%, 100% {
    opacity: 0.55;
    filter: brightness(0.8);
  }
  50% {
    opacity: 1;
    filter: brightness(1.6) drop-shadow(0 0 4px currentColor);
  }
}

/* Override prior star-rise-bright if it was applied */
@keyframes star-rise-bright {
  0%   { transform: translate(0, 0); opacity: 0.55; }
  50%  { opacity: 1; }
  100% { transform: translate(0, 0); opacity: 0.55; }
}

   ========================================================= */

  animation: flame-flicker 1.4s ease-in-out infinite;

  0%, 100% { transform: scale(1) translateY(0); opacity: 1; }
  25%      { transform: scale(1.06) translateY(-0.3px); opacity: 0.92; }
  50%      { transform: scale(0.96) translateY(0.3px); opacity: 1; }
  75%      { transform: scale(1.04) translateY(-0.2px); opacity: 0.96; }
}
/* When blazing, all rings pulse together */
.flame-badge.flame-progress.blaze .fb-ring.blazing {
  animation: ring-blaze 2.2s ease-in-out infinite;
}
@keyframes ring-blaze {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.7; }
}
/* When blazing, outer glow pulses */
.flame-badge.flame-progress.blaze .fb-glow {
  animation: glow-pulse 2s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%, 100% { opacity: 1;   transform-origin: 24px 24px; }
  50%      { opacity: 0.6; }
}

/* ------------------------------------------------------------------

   ------------------------------------------------------------------ */

}

  background: linear-gradient(135deg, #FF5544, #8B6FF0) !important;

  box-shadow: 0 10px 22px -5px rgba(255, 107, 90, 0.7) !important;
  color: #fff !important;
}
.peek-btn svg { stroke-width: 2.4 !important; }

/* ------------------------------------------------------------------
   8) 오로라 색감 톤다운 (채도 ↓)
   ------------------------------------------------------------------ */
/* hero key emphasis — 채도 낮춘 그라데이션 */
.hero.hero-v24 .hero-key-emphasis,
.hero.hero-v60 .hero-key-emphasis {
  background: linear-gradient(
    90deg,
    #C76659 0%,
    #B97A6E 25%,
    #8E7CA8 50%,
    #B97A6E 75%,
    #C76659 100%
  ) !important;
  background-size: 200% 100% !important;
  -webkit-background-clip: text !important;
  -webkit-text-fill-color: transparent !important;
  background-clip: text !important;

  filter: none !important;
}
.hero.hero-v24 .hero-key-emphasis::before {
  opacity: 0.4 !important;
  animation-duration: 10s !important;
}
/* brand-aurora (topnav brand) — 거의 정적으로 */

  0%, 100% { background-position: 0% 50%; }
  50%      { background-position: 50% 50%; }
}

  50%      { background-position: 30% 50%; }
}

}

}

/* ------------------------------------------------------------------
   11) 일정표 — 막대 내부 글씨 대비 강화 (더 진하게)
   ------------------------------------------------------------------ */
.gantt-bar {

}

}

}

          폰 input 하단 고정, 질문/안내 2줄 처리
   ========================================================= */

/* ------------------------------------------------------------------
   1) Streak: 연속참여 옆 "14일" 텍스트만 — pill/테두리/그라데이션 제거

  padding: 0 !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}
.streak-count-right .sc-num {
  font-family: var(--f-display) !important;
  font-size: 26px !important;
  font-weight: 800 !important;
  font-style: italic !important;

}
.streak-count-right .sc-unit {

  font-weight: 700 !important;

}

/* ------------------------------------------------------------------
   2) TABS — v60 탭형 변경 되돌리고 v19 원본 복원

}
.tabs.tabs-v19 .tab {
  background: transparent !important;
  border: none !important;
  border-radius: var(--r-md) !important;
  padding: 16px 24px !important;
  margin-bottom: 0 !important;
  top: 0 !important;
  flex: 1 !important;
  min-width: 0 !important;
  color: var(--ink-2) !important;
  position: relative;
}
.tabs.tabs-v19 .tab:hover {
  background: rgba(255, 107, 90, 0.05) !important;
  color: var(--coral) !important;
  top: 0 !important;
}
.tabs.tabs-v19 .tab.active {
  background: linear-gradient(135deg, var(--ink), var(--plum-2)) !important;
  border-color: transparent !important;
  color: #fff !important;
  box-shadow: 0 8px 22px -8px rgba(45, 27, 61, 0.55) !important;

}

.tabs.tabs-v19 .tab .tlabel {

}
.tabs.tabs-v19 .tab.active .tlabel {

/* ------------------------------------------------------------------
   3) Primary 버튼들 — 오로라/그라데이션 제거, 무난한 단색
        대상: 등록(cmt-submit), 보내기(pc-send),
              랜덤 직원 뽑기 / 내 의견 등록하기 / 조직장 권한으로 확정하기 (btn primary),
              상단바 활성 quest pill (qb-pill.active)
   ------------------------------------------------------------------ */

/* btn primary — 솔리드 플럼 (튀지 않는 진중한 다크) */
.btn.primary {
  background: #2D1B3D !important;
  color: #fff !important;
  box-shadow: 0 4px 12px -3px rgba(45, 27, 61, 0.35) !important;
}
.btn.primary:hover {
  background: #432659 !important;
  box-shadow: 0 8px 20px -4px rgba(45, 27, 61, 0.5) !important;
}
.btn.primary.is-disabled,
.btn.primary:disabled {
  background: #B8B0C2 !important;
  color: rgba(255, 255, 255, 0.85) !important;
  box-shadow: none !important;
}

/* 등록 (LeaderCard 댓글 등록) */
.leader-cmt-input-stable .cmt-submit {
  background: #2D1B3D !important;
  color: #fff !important;
  box-shadow: 0 3px 9px -2px rgba(45, 27, 61, 0.3) !important;
}

  background: #432659 !important;

  background: #2D1B3D !important;
  color: #fff !important;
}
.pc-send:hover { background: #432659 !important; }

.topnav .qb-pill.active {

  color: #2D1B3D !important;
  border-color: rgba(255, 255, 255, 0.25) !important;
  box-shadow: 0 4px 14px -4px rgba(0, 0, 0, 0.35) !important;
}
.topnav .qb-pill.active .qb-name { color: #2D1B3D !important; }
.topnav .qb-pill.active .qb-dot {
  background: #2D1B3D !important;
  color: #F3ECDF !important;
}
.topnav .qb-pill.active .pick-badge {
  background: rgba(45, 27, 61, 0.12) !important;
  color: #2D1B3D !important;
  border-color: rgba(45, 27, 61, 0.25) !important;
}

/* ------------------------------------------------------------------
   4) 섹션 마커 — leader 도 02(코랄)와 동일하게
   ------------------------------------------------------------------ */

  background: linear-gradient(135deg, #FF6B5A, #FF8A7A) !important;
  color: #fff !important;
  box-shadow: 0 3px 10px -3px rgba(255, 107, 90, 0.5) !important;
}

/* ------------------------------------------------------------------

   ------------------------------------------------------------------ */
.phone-screen .pc-head {
  padding: 16px 14px 14px !important;
}
.phone-screen .pc-head .pc-rule-bigger {
  display: flex !important;
  flex-direction: column !important;
  gap: 3px !important;
  font-size: 17px !important;          /* 두 줄이라 약간 다운 */
  line-height: 1.35 !important;
  font-weight: 800 !important;
  color: #2D1B3D !important;
  letter-spacing: -0.018em !important;
  padding: 0 !important;
}
.pc-rule-line {
  display: block;
  text-align: center;
}

/* ------------------------------------------------------------------
   6) 안전안내문자 — 2줄 본문, 글자 잘리지 않도록 width 확보
   ------------------------------------------------------------------ */
.pc-emergency {
  max-width: 320px !important;
  width: calc(100% - 20px) !important;
  padding: 16px 16px 12px !important;
}
.pc-emergency-body {
  display: flex;
  flex-direction: column;
  gap: 3px;
  word-break: keep-all;     /* 한글 단어 단위로 줄바꿈 */
}
.pc-em-line {
  display: block;
  font-size: 16px !important;
  font-weight: 800 !important;
  color: #1A0F0D !important;
  line-height: 1.45 !important;
  letter-spacing: -0.02em !important;
}

/* ------------------------------------------------------------------
   7) 휴대폰 레이아웃 — input이 항상 하단에 빈틈없이
   ------------------------------------------------------------------ */
.phone-screen {
  display: flex !important;
  flex-direction: column !important;
  height: 660px !important;             /* 고정 높이로 일관 */
  min-height: 660px !important;
  max-height: 660px !important;
  padding-top: 28px !important;
}
.phone-screen .pc-head { flex-shrink: 0 !important; }
.phone-screen .pc-feed {
  flex: 1 1 auto !important;
  min-height: 0 !important;
  max-height: none !important;          /* v25 max-height 480 제거 */
  overflow-y: auto !important;
}
.phone-screen .pc-input {
  flex-shrink: 0 !important;
  margin-top: 0 !important;             /* 빈틈없이 */
}

/* =========================================================
   V62 — Peek 단순화, ChatCard → 알림방, RULE Step 버튼화,
          질문 더 크게, 안내창 동일 사이즈 + 수신팀 인라인
   ========================================================= */

/* ------------------------------------------------------------------
   1) 의견 엿보기 버튼 — 오로라 제거, 단색 코랄로 단순/명확
   ------------------------------------------------------------------ */

  background: var(--coral) !important;
  border-color: var(--coral) !important;
  color: #fff !important;
  font-weight: 800 !important;
  padding: 9px 16px !important;
  font-size: 13px !important;
  box-shadow: 0 4px 12px -3px rgba(255, 107, 90, 0.45) !important;
}
.peek-btn:hover {
  background: #E0301A !important;
  border-color: #E0301A !important;
  color: #fff !important;
  transform: translateY(-1px) !important;
  box-shadow: 0 7px 18px -4px rgba(224, 48, 26, 0.55) !important;
}
.peek-btn svg { stroke-width: 2.4 !important; }

   2) 알림방 (구 ChatCard) — 시스템 알림만, 입력창 X, 탭 X
   ------------------------------------------------------------------ */
.notice-card .chat-tabs { display: none !important; }
.notice-card .chat-input { display: none !important; }
.notice-card .chat-feed {
  background: linear-gradient(180deg, #FAF6EE 0%, #F5EDDF 100%) !important;
  padding: 16px 14px !important;
  gap: 10px !important;
}
.notice-card .chat-msg.system .body {
  background: #fff !important;
  border: 1px solid var(--line) !important;
  border-left: 3px solid var(--coral) !important;
  border-radius: 10px !important;
  padding: 11px 14px !important;
  box-shadow: 0 2px 6px -2px rgba(45, 27, 61, 0.08) !important;
  max-width: 100% !important;
}
.notice-card .chat-msg.system .body .txt {
  font-size: 13px !important;
  font-weight: 600 !important;
  color: var(--ink) !important;
  line-height: 1.5 !important;
  background: none !important;
  padding: 0 !important;
  text-align: left !important;
}
.notice-card .card-hd .online .on-air-dot {
  background: var(--coral) !important;
  animation: notice-pulse 1.6s ease-in-out infinite;
}
@keyframes notice-pulse {

   3) RULE Step 01~05 — TALK 02 마커와 같은 코랄 그라데이션 버튼형
   ------------------------------------------------------------------ */
.step-label {
  display: inline-flex !important;
  align-items: center !important;
  justify-content: center !important;
  padding: 5px 13px !important;
  border-radius: 8px !important;
  background: linear-gradient(135deg, #FF6B5A, #FF8A7A) !important;
  color: #fff !important;
  font-family: var(--f-display) !important;
  font-style: italic !important;
  font-size: 13px !important;
  font-weight: 800 !important;
  letter-spacing: 0.06em !important;
  margin-bottom: 8px !important;
  box-shadow: 0 3px 10px -3px rgba(255, 107, 90, 0.5) !important;
  text-transform: uppercase;
  line-height: 1 !important;
}

/* ------------------------------------------------------------------
   4) 휴대폰 질문 — 한층 더 크게 (2줄 처리는 그대로)
   ------------------------------------------------------------------ */

  font-size: 20px !important;          /* was 17 → +3px */

  font-weight: 800 !important;
  letter-spacing: -0.02em !important;

   5) 안전안내문자 — 두 개 동일 사이즈, 헤더에 수신팀 인라인, 푸터 X
   ------------------------------------------------------------------ */

  /* 두 폰 모두 같은 크기 — 본문 길이에 관계없이 고정 */

  display: flex;
  flex-direction: column;
}
.pc-emergency-head {
  display: flex !important;
  align-items: center !important;
  flex-wrap: wrap !important;
  gap: 6px !important;
  padding-bottom: 10px !important;
  margin-bottom: 12px !important;
  border-bottom: 1.5px dashed rgba(193, 53, 45, 0.55) !important;
}
.pc-emergency-tag {
  flex: 1 1 auto;
  font-size: 12px !important;
  font-weight: 900 !important;
  color: #8C1F18 !important;
  letter-spacing: 0.03em !important;
  white-space: nowrap;
}
.pc-emergency-recipient {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 800;
  color: #8C1F18;
