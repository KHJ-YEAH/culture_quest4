<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>High-5 Culture Quest · 소통과 인정</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Serif+KR:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
/* =========================================================
   HIGH-5 CULTURE QUEST — DESIGN TOKENS & GLOBAL STYLES
   ========================================================= */

:root {
  /* surfaces */
  --cream: #FAF6EE;
  --cream-2: #F3ECDF;
  --paper: #FFFDF9;
  --ink: #221335;
  --ink-2: #4A3960;
  --ink-3: #7B6A8F;
  --line: #E8DFD0;
  --line-2: #F0E7D6;

  /* quest: 소통과인정 (Communication & Recognition) */
  --coral: #FF6B5A;
  --coral-2: #FF8A7A;
  --coral-soft: #FFE4DE;
  --lilac: #A78BFA;
  --lilac-2: #C4B5FD;
  --lilac-soft: #EDE9FE;

  /* accents */
  --mint: #34D399;
  --mint-soft: #D1FAE5;
  --sun: #FBBF24;
  --sun-soft: #FEF3C7;
  --plum: #2D1B3D;
  --plum-2: #432659;
  --night: #1A0F2E;

  /* radii */
  --r-xs: 8px;
  --r-sm: 12px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
  --r-pill: 999px;

  /* shadow */
  --sh-1: 0 1px 2px rgba(45, 27, 61, .04), 0 2px 8px rgba(45, 27, 61, .04);
  --sh-2: 0 4px 16px rgba(45, 27, 61, .06), 0 1px 2px rgba(45, 27, 61, .04);
  --sh-3: 0 18px 48px -16px rgba(45, 27, 61, .22), 0 4px 12px rgba(45, 27, 61, .08);
  --sh-glow-coral: 0 8px 32px -8px rgba(255, 107, 90, .55);
  --sh-glow-lilac: 0 8px 32px -8px rgba(167, 139, 250, .55);

  /* fonts */
  --f-body: "Pretendard Variable", "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  --f-display: "DM Serif Display", "Pretendard Variable", serif;
  --f-mono: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
}

@font-face {
  font-family: 'Pretendard Variable';
  font-weight: 45 920;
  font-style: normal;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/PretendardVariable.woff2') format('woff2-variations');
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--f-body);
  background: var(--cream);
  color: var(--ink);
  font-feature-settings: "ss02", "ss05";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.5;
  letter-spacing: -0.011em;
  overflow-x: hidden;
}

button { font: inherit; color: inherit; }
input, textarea { font: inherit; }

/* =========================================================
   APP SHELL
   ========================================================= */

.app {
  min-height: 100vh;
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(167, 139, 250, .14), transparent 60%),
    radial-gradient(1000px 700px at -5% 30%, rgba(255, 107, 90, .10), transparent 55%),
    var(--cream);
}

/* --- top nav --- */
.topnav {
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 16px 32px;
  border-bottom: 1px solid var(--line);
  background: rgba(250, 246, 238, .82);
  backdrop-filter: saturate(140%) blur(10px);
  position: sticky;
  top: 0;
  z-index: 50;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--f-display);
  font-size: 22px;
  letter-spacing: -.01em;
  color: var(--plum);
  white-space: nowrap;
  flex-shrink: 0;
}
.brand .mark {
  width: 36px; height: 36px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--coral) 0%, var(--lilac) 100%);
  display: grid; place-items: center;
  color: #fff;
  font-family: var(--f-display);
  font-size: 17px;
  box-shadow: var(--sh-glow-coral);
  position: relative;
}
.brand .mark::after {
  content: ""; position: absolute; inset: -3px; border-radius: 15px;
  border: 1.5px dashed rgba(255,255,255,.55);
  animation: spin 22s linear infinite;
  opacity: .8;
}
@keyframes spin { to { transform: rotate(360deg); } }
.brand em {
  font-style: italic;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.questbar { display: flex; align-items: center; gap: 6px; margin-left: 10px; }
.qb-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px 7px 8px;
  border-radius: var(--r-pill);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  background: transparent;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all .2s ease;
  white-space: nowrap;
}
.qb-pill:hover { background: var(--paper); }
.qb-pill.active {
  background: var(--paper);
  border-color: var(--line);
  color: var(--ink);
  box-shadow: var(--sh-1);
}
.qb-pill .qb-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; font-weight: 700;
  color: #fff;
  background: var(--ink-3);
}
.qb-pill.active .qb-dot {
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  box-shadow: 0 0 0 3px rgba(255, 107, 90, .15);
}
.qb-pill.locked { color: var(--ink-3); }
.qb-pill.locked .qb-dot { background: var(--cream-2); color: var(--ink-3); }

.nav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
}
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 12px;
  border: 1px solid var(--line);
  background: var(--paper);
  display: grid; place-items: center;
  cursor: pointer;
  position: relative;
  transition: transform .15s ease;
}
.icon-btn:hover { transform: translateY(-1px); }
.icon-btn .dot {
  position: absolute; top: 7px; right: 7px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--coral);
  box-shadow: 0 0 0 2px var(--paper);
}
.profile-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 14px 4px 4px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  cursor: pointer;
}
.profile-chip .avatar { width: 28px; height: 28px; border-radius: 50%; }
.profile-chip .name { font-size: 13px; font-weight: 600; }
.profile-chip .team { font-size: 11px; color: var(--ink-3); }

/* --- layout grid --- */
.layout {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr) 340px;
  gap: 22px;
  padding: 22px 32px 60px;
  max-width: 1640px;
  margin: 0 auto;
}

/* =========================================================
   LEFT SIDEBAR
   ========================================================= */

.side { display: flex; flex-direction: column; gap: 18px; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--sh-1);
}
.card-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 10px;
}
.card-hd h3 {
  margin: 0;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .02em;
  color: var(--ink-2);
  text-transform: uppercase;
}
.card-hd .more { font-size: 12px; color: var(--ink-3); cursor: pointer; }

/* --- character card --- */
.char {
  position: relative;
  overflow: hidden;
  border-radius: var(--r-xl);
  background: linear-gradient(160deg, #2D1B3D 0%, #432659 50%, #6A3A6E 100%);
  color: #fff;
  padding: 22px 20px 20px;
  box-shadow: var(--sh-3);
}
.char::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(120px 80px at 80% 20%, rgba(255, 107, 90, .35), transparent 60%),
    radial-gradient(140px 90px at 15% 85%, rgba(167, 139, 250, .35), transparent 60%);
  pointer-events: none;
}
.char .stars {
  position: absolute; inset: 0;
  pointer-events: none;
}
.char .stars i {
  position: absolute;
  width: 2px; height: 2px;
  background: #fff;
  border-radius: 50%;
  opacity: .8;
  animation: twinkle 3s ease-in-out infinite;
}
.char .stars i:nth-child(1) { top: 14%; left: 18%; animation-delay: 0s; }
.char .stars i:nth-child(2) { top: 22%; left: 72%; animation-delay: .6s; width: 3px; height: 3px; }
.char .stars i:nth-child(3) { top: 60%; left: 88%; animation-delay: 1.2s; }
.char .stars i:nth-child(4) { top: 78%; left: 22%; animation-delay: 1.8s; width: 3px; height: 3px; }
.char .stars i:nth-child(5) { top: 40%; left: 6%; animation-delay: 2.4s; }
@keyframes twinkle {
  0%, 100% { opacity: .25; transform: scale(.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

.char-row { position: relative; display: flex; align-items: center; gap: 14px; }
.char-avatar {
  width: 64px; height: 64px;
  border-radius: 18px;
  background: linear-gradient(135deg, var(--coral) 0%, var(--lilac) 100%);
  display: grid; place-items: center;
  font-family: var(--f-display);
  font-size: 26px;
  position: relative;
  box-shadow: 0 6px 18px rgba(255, 107, 90, .45);
}
.char-avatar .ring {
  position: absolute; inset: -6px;
  border-radius: 22px;
  border: 1.5px dashed rgba(255, 255, 255, .35);
  animation: spin 18s linear infinite;
}
.char-name { font-size: 17px; font-weight: 700; letter-spacing: -.01em; }
.char-meta { display: flex; gap: 6px; align-items: center; font-size: 12px; opacity: .8; margin-top: 2px;}
.char-meta .lv {
  font-family: var(--f-display);
  background: linear-gradient(135deg, var(--sun), var(--coral-2));
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  font-size: 13px;
}
.char-title {
  margin-top: 14px;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: var(--r-pill);
  font-size: 11px;
  letter-spacing: .04em;
  text-transform: uppercase;
  position: relative;
}
.char-title svg { width: 12px; height: 12px; }

.char-xp {
  position: relative;
  margin-top: 16px;
  display: flex; align-items: center; gap: 10px;
}
.char-xp .label { font-size: 11px; opacity: .7; letter-spacing: .04em; }
.xp-bar {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,.12);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.xp-bar .fill {
  height: 100%;
  width: 68%;
  background: linear-gradient(90deg, var(--coral), var(--sun));
  border-radius: 999px;
  position: relative;
}
.xp-bar .fill::after {
  content: "";
  position: absolute; top: 0; right: 0; bottom: 0; width: 30px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.55));
  animation: shimmer 2.4s ease-in-out infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-60px); }
  100% { transform: translateX(60px); }
}
.char-xp .val { font-size: 11px; font-family: var(--f-display); }

.char-stats {
  position: relative;
  margin-top: 18px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.char-stat {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--r-md);
  padding: 12px;
}
.char-stat .l { font-size: 10px; letter-spacing: .06em; text-transform: uppercase; opacity: .65; }
.char-stat .v { font-family: var(--f-display); font-size: 22px; line-height: 1.1; margin-top: 4px; }
.char-stat .s { font-size: 11px; opacity: .7; margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.char-stat .s .up { color: var(--mint); }

/* --- streak card --- */
.streak {
  padding: 16px 18px;
}
.streak-top { display: flex; align-items: center; justify-content: space-between; }
.streak-top .label { font-size: 12px; color: var(--ink-3); }
.streak-top .num { font-family: var(--f-display); font-size: 30px; color: var(--coral); display: flex; align-items: baseline; gap: 4px; }
.streak-top .num .unit { font-size: 14px; color: var(--ink-2); font-family: var(--f-body); font-weight: 600; }
.streak-top .flame {
  width: 44px; height: 44px;
  background: radial-gradient(circle at 50% 70%, var(--sun), var(--coral) 70%);
  border-radius: 50%;
  display: grid; place-items: center;
  box-shadow: 0 6px 24px rgba(251, 191, 36, .45);
  position: relative;
  animation: bob 2.4s ease-in-out infinite;
}
@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.streak-week {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  margin-top: 14px;
}
.streak-day {
  height: 26px;
  border-radius: 8px;
  background: var(--cream-2);
  display: grid; place-items: center;
  font-size: 10px;
  color: var(--ink-3);
}
.streak-day.done {
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  color: #fff;
  font-weight: 700;
}
.streak-day.today {
  background: var(--paper);
  border: 1.5px solid var(--coral);
  color: var(--coral);
  font-weight: 700;
}

/* --- mission card --- */
.mission {
  padding: 16px 18px 18px;
  position: relative;
  overflow: hidden;
}
.mission::before {
  content: "";
  position: absolute; right: -30px; top: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, var(--coral-soft), transparent 70%);
  border-radius: 50%;
}
.mission .title {
  font-family: var(--f-display); font-size: 17px; line-height: 1.3;
  position: relative; margin-top: 4px;
}
.mission .desc { font-size: 12px; color: var(--ink-3); margin-top: 6px; position: relative;}
.mission-progress {
  position: relative;
  margin-top: 14px;
  display: flex; align-items: center; gap: 10px;
}
.mp-bar { flex: 1; height: 8px; background: var(--cream-2); border-radius: 999px; overflow: hidden; }
.mp-bar .f { height: 100%; width: 60%; background: linear-gradient(90deg, var(--coral), var(--lilac)); border-radius: 999px; }
.mp-text { font-family: var(--f-display); font-size: 14px; color: var(--coral); }

.mission-reward {
  position: relative;
  margin-top: 14px;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--sun-soft);
  border-radius: var(--r-sm);
  font-size: 12px;
  color: var(--plum);
}
.mission-reward strong { font-family: var(--f-display); font-size: 14px; }

/* --- mini chat --- */
.chat-card {
  display: flex; flex-direction: column;
  height: 280px;
}
.chat-card .card-hd {
  border-bottom: 1px solid var(--line);
}
.chat-card .card-hd .online {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--ink-3); font-weight: 500;
}
.chat-card .card-hd .online::before {
  display: none;
}
.chat-feed { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.chat-msg { display: flex; gap: 8px; align-items: flex-start; }
.chat-msg .av { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; font-size: 10px; display: grid; place-items: center; color: #fff; font-weight: 700; }
.chat-msg .body { flex: 1; min-width: 0; }
.chat-msg .who { font-size: 11px; font-weight: 600; color: var(--ink-2); }
.chat-msg .who .role { color: var(--ink-3); font-weight: 500; margin-left: 4px; }
.chat-msg .txt { font-size: 12px; color: var(--ink); margin-top: 1px; word-break: break-word; }
.chat-msg.system .txt {
  background: var(--lilac-soft);
  padding: 6px 10px;
  border-radius: 10px;
  color: var(--plum);
  font-size: 11px;
}
.chat-input {
  border-top: 1px solid var(--line);
  padding: 10px 12px;
  display: flex; gap: 8px; align-items: center;
}
.chat-input input {
  flex: 1; border: none; outline: none;
  background: var(--cream);
  border-radius: var(--r-pill);
  padding: 8px 14px;
  font-size: 12px;
}
.chat-input .send {
  width: 30px; height: 30px;
  border-radius: 50%; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  color: #fff; display: grid; place-items: center;
}

/* =========================================================
   CENTER — QUEST HERO + TABS
   ========================================================= */

.center { display: flex; flex-direction: column; gap: 18px; min-width: 0; }

.hero {
  position: relative;
  border-radius: var(--r-xl);
  overflow: hidden;
  padding: 28px 32px 26px;
  background:
    radial-gradient(420px 280px at 88% 30%, rgba(255, 138, 122, .65), transparent 65%),
    radial-gradient(380px 280px at 8% 110%, rgba(167, 139, 250, .55), transparent 65%),
    linear-gradient(135deg, #2D1B3D 0%, #1A0F2E 100%);
  color: #fff;
  box-shadow: var(--sh-3);
}
.hero .stars i {
  position: absolute;
  background: #fff; border-radius: 50%;
  opacity: .8;
  animation: twinkle 3s ease-in-out infinite;
}
.hero .stars i:nth-child(1) { top: 12%; left: 30%; width: 2px; height: 2px; }
.hero .stars i:nth-child(2) { top: 30%; left: 65%; width: 3px; height: 3px; animation-delay: .5s; }
.hero .stars i:nth-child(3) { top: 70%; left: 18%; width: 2px; height: 2px; animation-delay: 1s; }
.hero .stars i:nth-child(4) { top: 78%; left: 78%; width: 3px; height: 3px; animation-delay: 1.5s; }
.hero .stars i:nth-child(5) { top: 22%; left: 90%; width: 2px; height: 2px; animation-delay: 2s; }

.hero-orb {
  position: absolute;
  right: 36px;
  top: 50%;
  transform: translateY(-50%);
  width: 180px; height: 180px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%, #FFF, var(--coral-2) 35%, var(--lilac) 80%);
  box-shadow:
    0 0 80px rgba(255, 138, 122, .55),
    inset -20px -20px 60px rgba(45, 27, 61, .4);
  animation: float 5s ease-in-out infinite;
}
.hero-orb::before {
  content: "";
  position: absolute; inset: -16px;
  border-radius: 50%;
  border: 1px dashed rgba(255, 255, 255, .35);
  animation: spin 24s linear infinite;
}
.hero-orb::after {
  content: "";
  position: absolute; inset: -32px;
  border-radius: 50%;
  border: 1px dotted rgba(255, 255, 255, .18);
  animation: spin 36s linear infinite reverse;
}
@keyframes float {
  0%, 100% { transform: translateY(-50%); }
  50% { transform: translateY(calc(-50% - 8px)); }
}

.hero-kicker {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px 6px 6px;
  border-radius: var(--r-pill);
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.15);
  font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  position: relative;
}
.hero-kicker .n {
  width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  display: grid; place-items: center;
  font-family: var(--f-display); font-size: 11px;
}
.hero-title {
  margin: 14px 0 6px;
  font-family: var(--f-display);
  font-size: 44px;
  line-height: 1.05;
  letter-spacing: -.015em;
  position: relative;
}
.hero-title .accent {
  font-style: italic;
  background: linear-gradient(135deg, var(--sun), var(--coral-2), var(--lilac-2));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.hero-sub {
  font-size: 14px;
  opacity: .8;
  position: relative;
  max-width: 540px;
}
.hero-meta {
  margin-top: 18px;
  display: flex; gap: 22px;
  position: relative;
}
.hero-meta .m { display: flex; flex-direction: column; gap: 2px; }
.hero-meta .l { font-size: 10px; opacity: .6; letter-spacing: .08em; text-transform: uppercase; }
.hero-meta .v { font-family: var(--f-display); font-size: 18px; }

/* --- tabs --- */
.tabs {
  display: flex; gap: 8px;
  position: relative;
  padding: 6px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  box-shadow: var(--sh-1);
  align-self: flex-start;
}
.tab {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 22px;
  border: none; background: transparent;
  border-radius: var(--r-pill);
  font-size: 14px; font-weight: 600;
  color: var(--ink-2);
  cursor: pointer;
  transition: all .25s cubic-bezier(.4, 0, .2, 1);
  position: relative;
}
.tab .tno {
  font-family: var(--f-display);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: .04em;
}
.tab:hover { color: var(--ink); }
.tab.active {
  background: linear-gradient(135deg, var(--ink) 0%, var(--plum-2) 100%);
  color: #fff;
  box-shadow: 0 8px 24px -8px rgba(45, 27, 61, .5);
}
.tab.active .tno { color: var(--coral-2); }
.tab .badge {
  font-size: 10px;
  font-weight: 700;
  background: var(--coral);
  color: #fff;
  padding: 2px 7px;
  border-radius: 999px;
  margin-left: -2px;
}

/* =========================================================
   TALK TAB
   ========================================================= */

.talk-leaders {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.leader-card {
  position: relative;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px 18px 16px;
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease;
}
.leader-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--sh-2);
}
.leader-card::before {
  content: "";
  position: absolute; right: -40px; top: -40px;
  width: 140px; height: 140px;
  border-radius: 50%;
  opacity: .15;
}
.leader-card.c1::before { background: var(--coral); }
.leader-card.c2::before { background: var(--lilac); }
.leader-card.c3::before { background: var(--mint); }
.leader-rank {
  position: absolute; top: 14px; right: 14px;
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--cream);
  display: grid; place-items: center;
  font-family: var(--f-display); font-size: 14px;
  color: var(--ink-2);
  border: 1px solid var(--line);
}
.leader-card.c1 .leader-rank { background: linear-gradient(135deg, var(--sun), var(--coral)); color: #fff; border-color: transparent; }
.leader-who {
  display: flex; align-items: center; gap: 10px;
  position: relative;
}
.leader-av {
  width: 40px; height: 40px;
  border-radius: 12px;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 14px;
}
.leader-name { font-size: 14px; font-weight: 700; }
.leader-role { font-size: 11px; color: var(--ink-3); }
.leader-msg {
  font-size: 13px;
  line-height: 1.55;
  color: var(--ink);
  margin: 12px 0 10px;
  position: relative;
  flex: 1;
  text-wrap: pretty;
}
.leader-msg::before {
  content: "“";
  font-family: var(--f-display); font-size: 36px;
  color: var(--coral); opacity: .25;
  position: absolute; top: -14px; left: -4px;
  line-height: 1;
}
.leader-foot {
  display: flex; align-items: center; gap: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  position: relative;
  font-size: 12px;
}
.leader-foot .act { display: inline-flex; align-items: center; gap: 5px; color: var(--ink-3); cursor: pointer; transition: color .15s; }
.leader-foot .act:hover { color: var(--coral); }
.leader-foot .act.liked { color: var(--coral); }
.leader-foot .time { margin-left: auto; color: var(--ink-3); font-size: 11px; }

/* --- group chat (anonymous) --- */
.group-chat {
  background: linear-gradient(180deg, #1A0F2E 0%, #2D1B3D 100%);
  border-radius: var(--r-xl);
  overflow: hidden;
  position: relative;
  box-shadow: var(--sh-3);
}
.gc-head {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  background: rgba(255,255,255,.04);
  border-bottom: 1px solid rgba(255,255,255,.08);
  color: #fff;
}
.gc-head .ph {
  width: 36px; height: 36px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  display: grid; place-items: center;
  font-size: 18px;
}
.gc-head .gn { font-size: 14px; font-weight: 700; }
.gc-head .gp { font-size: 11px; opacity: .55; margin-top: 1px; }
.gc-head .lock {
  margin-left: auto;
  font-size: 11px;
  color: rgba(255,255,255,.55);
  display: inline-flex; align-items: center; gap: 6px;
}

.gc-rules {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 14px 20px 0;
}
.gc-rule {
  position: relative;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.04);
  border-radius: var(--r-md);
  padding: 12px 14px;
  color: #fff;
}
.gc-rule .n {
  position: absolute; top: -8px; left: 12px;
  font-family: var(--f-display); font-size: 11px;
  padding: 2px 8px;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  border-radius: 999px;
  letter-spacing: .04em;
}
.gc-rule .t { font-size: 12px; line-height: 1.5; opacity: .85; margin-top: 4px; }

.gc-feed {
  padding: 14px 20px 14px;
  display: flex; flex-direction: column; gap: 10px;
  max-height: 460px;
  overflow-y: auto;
}
.gc-day {
  align-self: center;
  font-size: 10px; color: rgba(255,255,255,.45);
  padding: 4px 10px; background: rgba(255,255,255,.06); border-radius: 999px;
}
.gc-bub {
  max-width: 78%;
  display: flex; flex-direction: column; gap: 4px;
}
.gc-bub.me { align-self: flex-end; align-items: flex-end; }
.gc-bub .nm {
  font-size: 10px; color: rgba(255,255,255,.6);
  display: flex; align-items: center; gap: 6px;
}
.gc-bub .nm .av {
  width: 16px; height: 16px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 8px; color: #fff;
}
.gc-bub .bb {
  background: rgba(255,255,255,.08);
  padding: 10px 14px;
  border-radius: 16px 16px 16px 4px;
  font-size: 13px;
  color: #fff;
  line-height: 1.5;
  position: relative;
  text-wrap: pretty;
}
.gc-bub.me .bb {
  background: linear-gradient(135deg, var(--coral) 0%, var(--coral-2) 100%);
  border-radius: 16px 16px 4px 16px;
  color: #fff;
}
.gc-bub .react {
  display: inline-flex; gap: 4px; align-items: center;
  margin-top: 2px;
  font-size: 10px;
  color: rgba(255,255,255,.7);
}
.gc-bub .react .em {
  background: rgba(255,255,255,.10);
  border: 1px solid rgba(255,255,255,.12);
  padding: 2px 7px;
  border-radius: 999px;
  display: inline-flex; align-items: center; gap: 3px;
  cursor: pointer;
  transition: all .15s;
}
.gc-bub .react .em:hover { background: rgba(255,255,255,.18); }
.gc-bub .react .em.hot { background: var(--coral-soft); color: var(--coral); border-color: transparent; }
.gc-bub .rank-flag {
  position: absolute; top: -10px; right: -8px;
  font-family: var(--f-display); font-size: 10px;
  background: linear-gradient(135deg, var(--sun), var(--coral));
  color: #fff;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: .04em;
  box-shadow: 0 4px 12px rgba(251, 191, 36, .4);
}

.gc-input {
  margin: 0 20px 16px;
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,.08);
  padding: 8px 8px 8px 16px;
  border-radius: var(--r-pill);
}
.gc-input input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fff; font-size: 13px;
}
.gc-input input::placeholder { color: rgba(255,255,255,.45); }
.gc-input .anon {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; color: rgba(255,255,255,.6);
}
.gc-input .send {
  width: 36px; height: 36px;
  border-radius: 50%; border: none; cursor: pointer;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  color: #fff; display: grid; place-items: center;
}

/* =========================================================
   PLAY TAB
   ========================================================= */

.play-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 18px;
}
.play-main {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.play-main::before {
  content: "";
  position: absolute; right: -80px; top: -80px;
  width: 280px; height: 280px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--lilac-soft), transparent 70%);
  pointer-events: none;
}
.play-hd { display: flex; align-items: flex-start; justify-content: space-between; position: relative; }
.play-hd h2 {
  margin: 0;
  font-family: var(--f-display);
  font-size: 26px;
  letter-spacing: -.01em;
}
.play-hd .chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--coral-soft);
  color: var(--coral);
  border-radius: var(--r-pill);
  font-size: 12px; font-weight: 600;
}
.play-desc { font-size: 13px; color: var(--ink-3); margin-top: 4px; position: relative; }

.picker {
  margin-top: 22px;
  position: relative;
}
.picker-stage {
  display: flex; justify-content: center; gap: 18px;
  padding: 28px 0;
}
.picker-slot {
  width: 110px; height: 140px;
  border-radius: 18px;
  background: var(--cream);
  border: 2px dashed var(--line);
  display: grid; place-items: center;
  position: relative;
  transition: all .3s cubic-bezier(.4,0,.2,1);
}
.picker-slot.filled {
  background: var(--paper);
  border: 1px solid var(--line);
  box-shadow: var(--sh-2);
}
.picker-slot.spinning {
  animation: shake .15s ease-in-out infinite;
  border-color: var(--coral);
}
@keyframes shake {
  0%, 100% { transform: translate(0); }
  25% { transform: translate(-2px, 1px); }
  50% { transform: translate(2px, -1px); }
  75% { transform: translate(-1px, 2px); }
}
.picker-slot .av {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 22px; color: #fff; font-weight: 700;
  font-family: var(--f-display);
  transition: transform .25s;
}
.picker-slot .nm { font-size: 12px; font-weight: 600; margin-top: 8px; }
.picker-slot .tm { font-size: 10px; color: var(--ink-3); margin-top: 1px; }
.picker-slot .placeholder { color: var(--ink-3); font-size: 11px; }
.picker-slot.empty .placeholder svg { width: 28px; height: 28px; opacity: .35; margin-bottom: 4px; }

.picker-actions {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px;
}
.picker-chances { font-size: 12px; color: var(--ink-3); }
.picker-chances strong { color: var(--coral); font-family: var(--f-display); font-size: 16px; margin: 0 2px; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 22px;
  border-radius: var(--r-pill);
  font-size: 13px; font-weight: 700;
  border: none; cursor: pointer;
  transition: all .2s ease;
  letter-spacing: -.005em;
}
.btn.primary {
  background: linear-gradient(135deg, var(--coral) 0%, var(--lilac) 100%);
  color: #fff;
  box-shadow: var(--sh-glow-coral);
}
.btn.primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px -8px rgba(255, 107, 90, .65); }
.btn.primary:active { transform: translateY(0); }
.btn.ghost {
  background: var(--paper);
  border: 1px solid var(--line);
  color: var(--ink-2);
}
.btn.ghost:hover { background: var(--cream-2); }
.btn.dark {
  background: var(--plum); color: #fff;
}
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn.sm { padding: 8px 14px; font-size: 12px; }

.sticker-row {
  margin-top: 22px;
  padding: 20px;
  background: var(--cream);
  border-radius: var(--r-lg);
  position: relative;
}
.sticker-row .l { font-size: 12px; color: var(--ink-3); letter-spacing: .02em; }
.sticker-list {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-top: 12px;
}
.sticker {
  width: 78px;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 10px 6px;
  border-radius: var(--r-md);
  transition: all .2s cubic-bezier(.4,0,.2,1);
  background: var(--paper);
  border: 1px solid var(--line);
  user-select: none;
  position: relative;
}
.sticker:hover { transform: translateY(-3px) rotate(-2deg); box-shadow: var(--sh-2); }
.sticker.selected {
  border-color: transparent;
  background: linear-gradient(135deg, rgba(255,107,90,.10), rgba(167,139,250,.10));
  box-shadow: 0 0 0 2px var(--coral);
  transform: translateY(-2px);
}
.sticker.selected::after {
  content: "✓"; position: absolute; top: -6px; right: -6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--coral); color: #fff;
  font-size: 11px; font-weight: 700;
  display: grid; place-items: center;
  box-shadow: var(--sh-glow-coral);
}
.sticker .badge {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: grid; place-items: center;
  position: relative;
  box-shadow: 0 4px 14px rgba(45, 27, 61, .12);
}
.sticker .badge::after {
  content: "";
  position: absolute; inset: -3px;
  border-radius: 50%;
  border: 1.5px dashed rgba(255, 255, 255, .55);
  opacity: 0;
  transition: opacity .2s;
}
.sticker:hover .badge::after { opacity: 1; animation: spin 8s linear infinite; }
.sticker .nm { font-size: 11px; font-weight: 600; color: var(--ink); text-align: center; }

/* assign stage: showing selected target & sticker placement */
.assign-stage {
  margin-top: 20px;
  padding: 18px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  display: flex; align-items: center; gap: 18px;
}
.assign-target {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px 10px 10px;
  background: var(--cream);
  border-radius: var(--r-pill);
  min-width: 200px;
}
.assign-target .av {
  width: 38px; height: 38px; border-radius: 50%;
  display: grid; place-items: center; color: #fff; font-weight: 700;
  font-family: var(--f-display);
}
.assign-target .nm { font-size: 13px; font-weight: 700; }
.assign-target .tm { font-size: 11px; color: var(--ink-3); }

.assign-pellet-row {
  display: flex; gap: 6px;
  margin-left: auto;
}
.assign-pellet {
  width: 38px; height: 38px; border-radius: 50%;
  border: 2px dashed var(--line);
  display: grid; place-items: center;
  font-size: 11px; color: var(--ink-3);
}
.assign-pellet.filled { border-style: solid; border-color: transparent; }

/* --- right: my stickers ranking --- */
.recv {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 0 0 16px;
  overflow: hidden;
}
.recv-hd {
  padding: 20px 22px 14px;
  background: linear-gradient(135deg, var(--lilac-soft), var(--coral-soft));
  border-bottom: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.recv-hd::after {
  content: "";
  position: absolute; right: -20px; bottom: -20px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(255,255,255,.7), transparent 60%);
  border-radius: 50%;
}
.recv-hd h3 { margin: 0; font-family: var(--f-display); font-size: 20px; position: relative; }
.recv-hd .sub { font-size: 12px; color: var(--ink-2); opacity: .8; margin-top: 2px; position: relative; }
.recv-hd .tot { position: absolute; right: 22px; top: 22px; }
.recv-hd .tot .v { font-family: var(--f-display); font-size: 32px; color: var(--coral); line-height: 1; }
.recv-hd .tot .l { font-size: 10px; color: var(--ink-3); letter-spacing: .04em; text-align: right; }

.recv-list { padding: 12px 16px 0; display: flex; flex-direction: column; gap: 8px; }
.recv-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border-radius: var(--r-md);
  background: var(--cream);
  transition: background .15s;
}
.recv-item:hover { background: var(--cream-2); }
.recv-item .rank {
  font-family: var(--f-display); font-size: 14px;
  width: 22px; color: var(--ink-3);
}
.recv-item.top1 .rank { color: var(--coral); }
.recv-item .badge {
  width: 34px; height: 34px; border-radius: 50%;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.recv-item .nm { font-size: 13px; font-weight: 600; flex: 1; }
.recv-item .count {
  font-family: var(--f-display); font-size: 18px; color: var(--ink);
}
.recv-item .count .u { font-size: 11px; color: var(--ink-3); font-family: var(--f-body); margin-left: 2px; }

.recv-top-givers {
  margin: 14px 16px 0;
  padding: 14px;
  background: var(--cream);
  border-radius: var(--r-md);
}
.recv-top-givers .l { font-size: 11px; color: var(--ink-3); letter-spacing: .04em; text-transform: uppercase; }
.recv-givers-row { display: flex; gap: -4px; margin-top: 8px; align-items: center; }
.recv-givers-row .av {
  width: 28px; height: 28px; border-radius: 50%;
  display: grid; place-items: center;
  color: #fff; font-weight: 700; font-size: 10px;
  border: 2px solid var(--paper);
  margin-left: -6px;
}
.recv-givers-row .av:first-child { margin-left: 0; }
.recv-givers-row .more {
  font-size: 11px; color: var(--ink-3); margin-left: 10px;
}

/* =========================================================
   RULE TAB
   ========================================================= */

.rule-step-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 22px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  box-shadow: var(--sh-1);
}
.step {
  display: flex; align-items: center; gap: 10px;
}
.step .n {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--cream-2);
  display: grid; place-items: center;
  font-family: var(--f-display); font-size: 13px;
  color: var(--ink-3);
}
.step.done .n { background: var(--mint); color: #fff; }
.step.active .n {
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  color: #fff;
  box-shadow: var(--sh-glow-coral);
}
.step .t { font-size: 12px; font-weight: 600; color: var(--ink-3); }
.step.active .t, .step.done .t { color: var(--ink); }
.step-line { flex: 1; height: 2px; background: var(--cream-2); border-radius: 2px; }
.step-line.done { background: var(--mint); }

.candidates {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.cand {
  position: relative;
  background: var(--paper);
  border: 2px solid var(--line);
  border-radius: var(--r-lg);
  padding: 20px 20px 16px;
  cursor: pointer;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  overflow: hidden;
}
.cand:hover {
  transform: translateY(-3px);
  box-shadow: var(--sh-2);
}
.cand.selected {
  border-color: var(--coral);
  box-shadow: var(--sh-glow-coral);
}
.cand::before {
  content: "";
  position: absolute; right: -50px; top: -50px;
  width: 140px; height: 140px;
  border-radius: 50%;
  opacity: .15;
}
.cand.c1::before { background: var(--sun); }
.cand.c2::before { background: var(--lilac); }
.cand.c3::before { background: var(--mint); }
.cand-top { display: flex; align-items: center; gap: 8px; position: relative; }
.cand-medal {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: var(--f-display); font-size: 14px;
  color: #fff;
  flex-shrink: 0;
}
.cand.c1 .cand-medal { background: linear-gradient(135deg, var(--sun), var(--coral)); }
.cand.c2 .cand-medal { background: linear-gradient(135deg, var(--lilac), var(--coral)); }
.cand.c3 .cand-medal { background: linear-gradient(135deg, var(--mint), var(--lilac)); }
.cand-from { font-size: 11px; color: var(--ink-3); }
.cand-from b { color: var(--ink-2); font-weight: 600; }
.cand-body {
  margin-top: 12px;
  font-size: 14px;
  line-height: 1.55;
  color: var(--ink);
  font-weight: 500;
  position: relative;
  text-wrap: pretty;
  min-height: 64px;
}
.cand-foot {
  display: flex; align-items: center; gap: 12px;
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
  font-size: 12px; color: var(--ink-3);
  position: relative;
}
.cand-foot .hot {
  display: inline-flex; align-items: center; gap: 4px;
  color: var(--coral); font-weight: 700;
  font-family: var(--f-display);
  font-size: 14px;
}
.cand .pick-tag {
  position: absolute; top: 14px; right: 14px;
  font-size: 11px; font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--cream);
  color: var(--ink-3);
}
.cand.selected .pick-tag {
  background: var(--coral); color: #fff;
}

/* detail form */
.detail-form {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px;
  position: relative;
}
.detail-form .head {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 18px;
}
.detail-form .head h3 {
  margin: 0; font-family: var(--f-display); font-size: 22px;
}
.detail-form .head p { margin: 4px 0 0; font-size: 13px; color: var(--ink-3); }
.detail-form .picked-rule {
  background: linear-gradient(135deg, var(--coral-soft), var(--lilac-soft));
  border-radius: var(--r-lg);
  padding: 14px 16px;
  margin-bottom: 18px;
  font-size: 14px;
  display: flex; gap: 12px; align-items: flex-start;
}
.detail-form .picked-rule .ic {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  color: #fff;
  display: grid; place-items: center;
  flex-shrink: 0;
  font-family: var(--f-display);
  font-size: 12px;
}
.detail-form .picked-rule .l { font-size: 11px; color: var(--ink-3); }
.detail-form .picked-rule .t { font-weight: 600; margin-top: 2px; text-wrap: pretty; }

.fld { margin-bottom: 16px; }
.fld label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--ink-2); margin-bottom: 6px;
  letter-spacing: .01em;
}
.fld label .req { color: var(--coral); margin-left: 2px; }
.fld textarea, .fld input, .fld select {
  width: 100%;
  padding: 12px 14px;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  font: inherit;
  color: var(--ink);
  outline: none;
  transition: border-color .15s, background .15s;
}
.fld textarea { resize: vertical; min-height: 90px; }
.fld textarea:focus, .fld input:focus, .fld select:focus {
  border-color: var(--coral);
  background: var(--paper);
}
.fld-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.chip-opt {
  padding: 8px 14px;
  border-radius: var(--r-pill);
  background: var(--cream);
  border: 1px solid var(--line);
  font-size: 12px; font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s;
}
.chip-opt:hover { background: var(--cream-2); }
.chip-opt.active {
  background: var(--plum);
  border-color: var(--plum);
  color: #fff;
}

/* photos */
.photos-card {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px;
}
.photos-card .head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 16px;
}
.photos-card .head h3 { margin: 0; font-family: var(--f-display); font-size: 22px; }
.photos-card .head .sub { font-size: 12px; color: var(--ink-3); margin-top: 4px; }
.photos-card .head .progress {
  font-family: var(--f-display); font-size: 14px;
}
.photos-card .head .progress .v { color: var(--coral); font-size: 22px; }

.photo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.photo {
  aspect-ratio: 4/5;
  border-radius: var(--r-md);
  overflow: hidden;
  position: relative;
  background: var(--cream-2);
}
.photo .img {
  width: 100%; height: 100%;
  display: grid; place-items: center;
  position: relative;
}
.photo .tag {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,.55); color: #fff;
  font-size: 10px; padding: 3px 8px;
  border-radius: 999px;
  font-weight: 600;
}
.photo .cap {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,.6));
  color: #fff; font-size: 11px;
}
.photo .cap .dt { opacity: .8; font-size: 10px; }
.photo.upload {
  border: 2px dashed var(--line);
  background: var(--cream);
  cursor: pointer;
  display: grid; place-items: center;
  color: var(--ink-3);
  transition: all .2s;
}
.photo.upload:hover {
  border-color: var(--coral);
  color: var(--coral);
  background: var(--coral-soft);
}
.photo.upload .ph { text-align: center; font-size: 11px; }
.photo.upload svg { display: block; margin: 0 auto 6px; width: 22px; height: 22px; }

/* =========================================================
   RIGHT PANEL
   ========================================================= */

.right { display: flex; flex-direction: column; gap: 18px; }

.leader-banner {
  background: linear-gradient(135deg, var(--plum) 0%, var(--plum-2) 100%);
  color: #fff;
  border-radius: var(--r-xl);
  padding: 16px 18px;
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
  position: relative;
  overflow: hidden;
}
.leader-banner::before {
  content: "";
  position: absolute; right: -20px; top: -20px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, var(--coral-soft), transparent 60%);
  opacity: .25;
  border-radius: 50%;
}
.leader-banner .icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--sun), var(--coral));
  display: grid; place-items: center;
  flex-shrink: 0;
}
.leader-banner b { font-family: var(--f-display); }

.absentees .ab-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 0 16px 14px;
}
.ab-stat {
  background: var(--cream);
  border-radius: var(--r-md);
  padding: 12px 14px;
}
.ab-stat .l { font-size: 11px; color: var(--ink-3); }
.ab-stat .v { font-family: var(--f-display); font-size: 22px; margin-top: 2px; display: flex; align-items: baseline; gap: 4px; }
.ab-stat .v .u { font-size: 12px; color: var(--ink-3); font-family: var(--f-body); }
.ab-stat.warn .v { color: var(--coral); }

.absentees .ab-list {
  padding: 0 8px 14px;
  display: flex; flex-direction: column;
  max-height: 240px; overflow-y: auto;
}
.ab-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  transition: background .12s;
}
.ab-row:hover { background: var(--cream); }
.ab-row .av {
  width: 32px; height: 32px; border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; color: #fff; font-weight: 700;
}
.ab-row .nm-col { flex: 1; min-width: 0; }
.ab-row .nm { font-size: 13px; font-weight: 600; }
.ab-row .miss { font-size: 11px; color: var(--ink-3); }
.ab-row .nudge {
  padding: 6px 12px;
  font-size: 11px; font-weight: 600;
  border-radius: 999px;
  background: var(--cream);
  border: 1px solid var(--line);
  color: var(--ink-2);
  cursor: pointer;
  transition: all .15s;
}
.ab-row .nudge:hover {
  background: var(--coral);
  border-color: var(--coral);
  color: #fff;
}
.ab-row .nudge.sent {
  background: var(--mint-soft); color: var(--mint); border-color: transparent;
}

/* calendar */
.calendar {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 18px;
}
.cal-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.cal-head .m { font-family: var(--f-display); font-size: 18px; }
.cal-head .nav { display: flex; gap: 4px; }
.cal-head .nav button {
  width: 26px; height: 26px;
  border-radius: 8px;
  background: var(--cream);
  border: 1px solid var(--line);
  cursor: pointer; display: grid; place-items: center;
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.cal-grid .dow {
  font-size: 10px;
  color: var(--ink-3);
  text-align: center;
  padding: 4px 0;
  letter-spacing: .04em;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px;
  font-size: 11px;
  color: var(--ink-2);
  background: var(--cream);
  cursor: pointer;
  transition: all .15s;
  position: relative;
}
.cal-cell:hover { background: var(--cream-2); }
.cal-cell.off { color: var(--ink-3); opacity: .4; }
.cal-cell.event { background: linear-gradient(135deg, var(--coral-soft), var(--lilac-soft)); color: var(--plum); font-weight: 600; }
.cal-cell.event .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--coral); }
.cal-cell.today {
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  color: #fff; font-weight: 700;
  box-shadow: var(--sh-glow-coral);
}
.cal-cell.today .dot { background: #fff; }
.cal-cell.sat { color: #4F86E8; }
.cal-cell.sun { color: #E85F73; }
.cal-cell.off.sat, .cal-cell.off.sun { opacity: .35; }

.cal-events {
  margin-top: 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.cal-evt {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px;
  padding: 6px 0;
}
.cal-evt .pill {
  width: 36px; text-align: center;
  font-family: var(--f-display); font-size: 11px;
  padding: 3px 6px;
  border-radius: 6px;
  background: var(--cream);
  color: var(--ink-2);
}
.cal-evt.now .pill { background: var(--coral); color: #fff; }
.cal-evt .nm { flex: 1; color: var(--ink); }
.cal-evt .nm small { color: var(--ink-3); display: block; font-size: 10px; margin-top: 1px; }
.cal-evt .dot-c { width: 6px; height: 6px; border-radius: 50%; }

/* small util */
.scroll-y::-webkit-scrollbar { width: 6px; }
.scroll-y::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
.dark .scroll-y::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); }

/* fade-in for tab content */
.tab-content {
  animation: fadeUp .35s cubic-bezier(.4,0,.2,1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* helpers */
.row { display: flex; align-items: center; gap: 10px; }
.spread { display: flex; align-items: center; justify-content: space-between; }
.mt-12 { margin-top: 12px; }
.mt-20 { margin-top: 20px; }
.gap-12 { gap: 12px; }

/* responsive guard */
@media (max-width: 1380px) {
  .layout { grid-template-columns: 280px minmax(0,1fr) 300px; padding: 20px 22px 60px; gap: 16px; }
  .hero-title { font-size: 36px; }
  .hero-orb { width: 140px; height: 140px; right: 24px; }
  .topnav { padding: 14px 22px; gap: 18px; }
  .brand { font-size: 19px; }
  .questbar { overflow-x: auto; flex-shrink: 1; min-width: 0; scrollbar-width: none; }
  .questbar::-webkit-scrollbar { display: none; }
}
@media (max-width: 1100px) {
  .topnav { gap: 12px; }
  .questbar .qb-pill:not(.active) { padding: 7px 10px 7px 6px; font-size: 12px; }
  .hero { padding: 22px 24px 22px; }
  .hero-orb { display: none; }
  .play-grid { grid-template-columns: 1fr; }
  .candidates { grid-template-columns: 1fr; }
  .talk-leaders { grid-template-columns: 1fr; }
  .photo-grid { grid-template-columns: repeat(2, 1fr); }
}

/* =========================================================
   v55 EXTENSIONS — Mission checklist + chat keywords (v1 visual)
   ========================================================= */

/* ---- Mission checklist (v55) ---- */
.mission-list { gap: 0; }
.mission-list .mission-total {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 10px 14px;
  margin: 4px -14px 8px;
  background: linear-gradient(90deg, rgba(255, 107, 90, .10), rgba(167, 139, 250, .10));
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.mission-list .mission-total .l {
  font-size: 11px; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: .08em;
}
.mission-list .mission-total .v {
  font-family: var(--f-display); font-size: 20px; color: var(--coral);
}
.mission-list .mission-total .v em {
  font-size: 12px; color: var(--ink-3); font-style: normal;
  margin-left: 1px;
}
.mission-list .mission-items {
  display: flex; flex-direction: column; gap: 1px;
  background: var(--line-2);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.mi-row {
  display: grid;
  grid-template-columns: 18px 1fr auto;
  align-items: center; gap: 10px;
  padding: 9px 12px;
  background: var(--paper);
  font-size: 12.5px;
  transition: background .2s;
}
.mi-row:hover { background: rgba(255, 107, 90, .04); }
.mi-row.done { background: linear-gradient(90deg, rgba(52, 211, 153, .08), var(--paper) 70%); }
.mi-ck {
  width: 18px; height: 18px;
  border-radius: 6px;
  border: 1.5px solid var(--line);
  display: grid; place-items: center;
  font-size: 11px; color: #fff;
  background: transparent;
  transition: all .25s;
}
.mi-row.done .mi-ck {
  background: var(--mint);
  border-color: var(--mint);
  box-shadow: 0 0 10px rgba(52, 211, 153, .4);
}
.mi-nm { color: var(--ink-2); }
.mi-row.done .mi-nm { color: var(--ink); font-weight: 500; }
.mi-pts {
  font-family: var(--f-display); font-style: italic;
  font-size: 12px; color: var(--ink-3);
  white-space: nowrap;
}
.mi-row.done .mi-pts { color: var(--coral); }
.mi-n {
  display: inline-block;
  transition: transform .35s cubic-bezier(.18,.89,.32,1.28);
}
@keyframes count-bump-v7 {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.45); color: var(--coral); text-shadow: 0 0 14px rgba(255, 107, 90, .55); }
  100% { transform: scale(1); }
}
.mi-n.bump { animation: count-bump-v7 .55s cubic-bezier(.18,.89,.32,1.28); }

/* ---- Chat — my message + keyword highlighting ---- */
.chat-msg.me {
  background: linear-gradient(180deg, rgba(255, 107, 90, .10), rgba(167, 139, 250, .08));
  border: 1px solid rgba(255, 107, 90, .25);
  border-radius: var(--r-md);
  padding: 8px 10px;
}
.chat-msg.me .av {
  box-shadow: 0 0 14px rgba(255, 107, 90, .35);
}
.chat-msg.me .who {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
}

/* +N point tag pill */
.chat-msg .pt-tag {
  font-family: var(--f-display); font-style: italic;
  font-size: 10.5px;
  background: linear-gradient(90deg, var(--coral), var(--lilac));
  color: #fff;
  padding: 1px 8px;
  border-radius: 999px;
  letter-spacing: .04em;
  font-weight: 700;
  margin-left: auto;
  box-shadow: 0 0 10px rgba(255, 107, 90, .4);
  animation: pt-pop-v7 .55s ease-out;
}
@keyframes pt-pop-v7 {
  0%   { transform: scale(.5); opacity: 0; }
  60%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* Keyword highlights in messages */
.kw {
  padding: 1px 5px;
  border-radius: 5px;
  font-weight: 600;
  display: inline-block;
  line-height: 1.3;
  margin: 0 1px;
}
.kw-cyan    { background: rgba(96, 165, 250, .20); color: #2563EB; border-bottom: 1px dashed rgba(96, 165, 250, .55); }
.kw-violet  { background: rgba(167, 139, 250, .22); color: #7C3AED; border-bottom: 1px dashed rgba(167, 139, 250, .55); }
.kw-praise  { background: rgba(251, 191, 36, .22); color: #B45309; border-bottom: 1px dashed rgba(251, 191, 36, .55); }
.kw-green   { background: rgba(52, 211, 153, .22); color: #047857; border-bottom: 1px dashed rgba(52, 211, 153, .55); }
.kw-crimson { background: rgba(255, 107, 90, .22); color: #C2410C; border-bottom: 1px dashed rgba(255, 107, 90, .55); }
.kw-h5 {
  background: linear-gradient(90deg, var(--coral), var(--lilac));
  color: #fff;
  font-weight: 700;
  padding: 1px 8px;
  border-radius: 999px;
  box-shadow: 0 0 10px rgba(255, 107, 90, .45);
}

/* =========================================================
   BUILD8 — Layout slim sides + Hero compact + Tabs prominent
   ========================================================= */

/* Narrow sides — give more weight to center */
.layout {
  grid-template-columns: 270px minmax(0, 1fr) 290px !important;
  gap: 18px !important;
  padding: 18px 28px 60px !important;
}

/* ---- Hero: compact (only title + key message) ---- */
.hero.hero-compact {
  padding: 28px 36px 32px !important;
  min-height: auto !important;
}
.hero.hero-compact .hero-title {
  margin: 0;
  font-size: 48px;
  line-height: 1.08;
  letter-spacing: -0.02em;
}
.hero.hero-compact .hero-title .accent {
  font-family: var(--f-display);
  font-style: italic;
  color: var(--coral);
  display: inline-block;
  margin-left: 6px;
  text-shadow: 0 0 24px rgba(255, 107, 90, .55);
}
.hero.hero-compact .hero-key {
  margin-top: 12px;
  font-size: 18px;
  line-height: 1.5;
  color: rgba(255, 255, 255, .9);
  font-family: var(--f-body);
  letter-spacing: -0.01em;
  max-width: 80%;
  position: relative;
  z-index: 2;
}

/* ---- Tabs: prominent big cards ---- */
.tabs.tabs-big {
  margin: 24px 0 22px;
}
.tabs.tabs-big .tabs-eyebrow {
  text-align: center;
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 600;
}
.tabs.tabs-big .tabs-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.tabs.tabs-big .tab {
  position: relative;
  display: flex; flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  padding: 18px 20px;
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: all .2s cubic-bezier(.2,.7,.2,1);
  box-shadow: var(--sh-1);
  text-align: left;
}
.tabs.tabs-big .tab:hover {
  transform: translateY(-2px);
  box-shadow: var(--sh-2);
  border-color: var(--coral-2);
}
.tabs.tabs-big .tab.active {
  background: linear-gradient(135deg, rgba(255, 107, 90, .06), rgba(167, 139, 250, .06));
  border-color: var(--coral);
  box-shadow: 0 0 0 3px rgba(255, 107, 90, .18), var(--sh-glow-coral);
  transform: translateY(-3px);
}
.tabs.tabs-big .tab .tno {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 14px;
  color: var(--ink-3);
}
.tabs.tabs-big .tab.active .tno { color: var(--coral); }
.tabs.tabs-big .tab .tlabel {
  font-family: var(--f-display);
  font-size: 28px;
  line-height: 1;
  color: var(--ink);
  margin-top: 2px;
}
.tabs.tabs-big .tab.active .tlabel {
  background: linear-gradient(90deg, var(--coral), var(--lilac));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.tabs.tabs-big .tab .tsub {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-top: 4px;
  font-weight: 500;
}
.tabs.tabs-big .tab .badge {
  position: absolute; top: 12px; right: 14px;
  background: var(--coral);
  color: #fff;
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 999px;
  letter-spacing: 0.08em;
  box-shadow: 0 0 10px var(--gold-glow, rgba(255, 107, 90, .55));
}

/* =========================================================
   Character card — simplified (no Lv/XP)
   ========================================================= */
.char-title-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 6px;
}
.char-pos {
  font-size: 11.5px;
  color: rgba(255, 255, 255, .85);
  background: rgba(255, 255, 255, .12);
  padding: 2px 9px;
  border-radius: 999px;
  letter-spacing: 0.04em;
}
.char-team {
  font-size: 12px;
  color: rgba(255, 255, 255, .7);
  margin-top: 4px;
}

/* =========================================================
   Streak — daily reward chip
   ========================================================= */
.streak-reward {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px;
  padding: 8px 12px;
  background: linear-gradient(90deg, rgba(255, 107, 90, .10), rgba(251, 191, 36, .10));
  border-radius: var(--r-sm);
  font-size: 11.5px;
  color: var(--ink-2);
}
.streak-reward strong {
  color: var(--coral);
  font-family: var(--f-display);
  font-size: 13px;
}

/* =========================================================
   Mission checklist (v55, 7 items)
   ========================================================= */
.mission-list .mission-total {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 8px 14px;
  margin: 0 -14px 8px;
  background: linear-gradient(90deg, rgba(255, 107, 90, .10), rgba(167, 139, 250, .10));
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.mission-list .mission-total .l {
  font-size: 11px; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: .08em;
}
.mission-list .mission-total .v {
  font-family: var(--f-display); font-size: 20px; color: var(--coral);
}
.mission-list .mission-total .v em {
  font-size: 12px; color: var(--ink-3); font-style: normal;
  margin-left: 1px;
}
.mission-list .mission-items {
  display: flex; flex-direction: column; gap: 1px;
  background: var(--line-2);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.mi-row {
  display: grid;
  grid-template-columns: 18px 1fr auto;
  align-items: center; gap: 8px;
  padding: 8px 11px;
  background: var(--paper);
  font-size: 12px;
  transition: background .2s;
}
.mi-row:hover { background: rgba(255, 107, 90, .04); }
.mi-row.done { background: linear-gradient(90deg, rgba(52, 211, 153, .08), var(--paper) 70%); }
.mi-ck {
  width: 18px; height: 18px;
  border-radius: 6px;
  border: 1.5px solid var(--line);
  display: grid; place-items: center;
  font-size: 11px; color: #fff;
  background: transparent;
  transition: all .25s;
}
.mi-row.done .mi-ck {
  background: var(--mint);
  border-color: var(--mint);
  box-shadow: 0 0 10px rgba(52, 211, 153, .4);
}
.mi-nm { color: var(--ink-2); }
.mi-row.done .mi-nm { color: var(--ink); font-weight: 500; }
.mi-pts {
  font-family: var(--f-display); font-style: italic;
  font-size: 11.5px; color: var(--ink-3);
  white-space: nowrap;
}
.mi-row.done .mi-pts { color: var(--coral); }
.mi-n { display: inline-block; transition: transform .35s cubic-bezier(.18,.89,.32,1.28); }
@keyframes count-bump-v8 {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.5); color: var(--coral); text-shadow: 0 0 14px rgba(255, 107, 90, .55); }
  100% { transform: scale(1); }
}
.mi-n.bump { animation: count-bump-v8 .55s cubic-bezier(.18,.89,.32,1.28); }

.mission-reward {
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  background: linear-gradient(90deg, rgba(255, 107, 90, .08), rgba(167, 139, 250, .08));
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 11px;
  color: var(--ink-2);
  line-height: 1.5;
}

/* =========================================================
   Chat — tall + filter tabs + my message + keyword highlights
   ========================================================= */
.chat-card.tall { min-height: 540px; }
.chat-card.tall .chat-feed { min-height: 320px; max-height: 420px; }

.chat-tabs {
  display: flex; gap: 4px;
  padding: 0 14px 8px;
  border-bottom: 1px solid var(--line);
}
.chat-tabs .ct {
  background: transparent; border: 0;
  padding: 6px 10px;
  font-size: 11.5px;
  color: var(--ink-3);
  border-radius: var(--r-pill);
  cursor: pointer;
  font-weight: 500;
  transition: all .2s;
  display: flex; align-items: center; gap: 4px;
}
.chat-tabs .ct:hover { color: var(--ink); background: var(--cream-2); }
.chat-tabs .ct.active {
  color: #fff;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  box-shadow: 0 4px 12px -2px rgba(255, 107, 90, .35);
}
.chat-tabs .ct-count {
  font-size: 9.5px;
  background: rgba(255, 255, 255, .25);
  padding: 1px 5px;
  border-radius: 999px;
  font-weight: 700;
}
.chat-tabs .ct:not(.active) .ct-count {
  background: var(--cream-2);
  color: var(--ink-3);
}

.chat-msg.me {
  background: linear-gradient(180deg, rgba(255, 107, 90, .10), rgba(167, 139, 250, .08));
  border: 1px solid rgba(255, 107, 90, .25);
  border-radius: var(--r-md);
  padding: 8px 10px;
}
.chat-msg.me .av {
  box-shadow: 0 0 14px rgba(255, 107, 90, .35);
}
.chat-msg.me .who { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.chat-msg .scope-tag.team {
  background: var(--lilac-soft);
  color: var(--lilac);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 999px;
  letter-spacing: 0.04em;
  font-weight: 700;
}
.chat-msg .pt-tag {
  font-family: var(--f-display); font-style: italic;
  font-size: 10.5px;
  background: linear-gradient(90deg, var(--coral), var(--lilac));
  color: #fff;
  padding: 1px 8px;
  border-radius: 999px;
  letter-spacing: .04em;
  font-weight: 700;
  margin-left: auto;
  box-shadow: 0 0 10px rgba(255, 107, 90, .4);
  animation: pt-pop-v8 .55s ease-out;
}
.chat-msg .time {
  font-size: 10px;
  color: var(--ink-3);
  margin-top: 4px;
}
@keyframes pt-pop-v8 {
  0%   { transform: scale(.5); opacity: 0; }
  60%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.kw { padding: 1px 5px; border-radius: 5px; font-weight: 600; display: inline-block; line-height: 1.3; margin: 0 1px; }
.kw-cyan    { background: rgba(96, 165, 250, .20); color: #2563EB; border-bottom: 1px dashed rgba(96, 165, 250, .55); }
.kw-violet  { background: rgba(167, 139, 250, .22); color: #7C3AED; border-bottom: 1px dashed rgba(167, 139, 250, .55); }
.kw-praise  { background: rgba(251, 191, 36, .22); color: #B45309; border-bottom: 1px dashed rgba(251, 191, 36, .55); }
.kw-green   { background: rgba(52, 211, 153, .22); color: #047857; border-bottom: 1px dashed rgba(52, 211, 153, .55); }
.kw-crimson { background: rgba(255, 107, 90, .22); color: #C2410C; border-bottom: 1px dashed rgba(255, 107, 90, .55); }
.kw-h5 {
  background: linear-gradient(90deg, var(--coral), var(--lilac));
  color: #fff; font-weight: 700;
  padding: 1px 8px; border-radius: 999px;
  box-shadow: 0 0 10px rgba(255, 107, 90, .45);
}

/* =========================================================
   TALK — leader expandable comments + phone-chats 2 cols
   ========================================================= */
.leader-comments {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
}
.leader-comment {
  display: flex; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--line-2);
}
.leader-comment:last-of-type { border-bottom: none; }
.leader-comment .av-emo {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: var(--cream);
  border-radius: 50%;
  font-size: 14px;
  flex-shrink: 0;
}
.leader-comment .body { flex: 1; min-width: 0; }
.leader-comment .who { font-size: 12px; font-weight: 600; color: var(--ink); }
.leader-comment .who .t { color: var(--ink-3); font-weight: 400; margin-left: 6px; }
.leader-comment .txt { font-size: 12.5px; color: var(--ink-2); line-height: 1.5; margin-top: 2px; }
.leader-cmt-input {
  display: flex; gap: 6px;
  margin-top: 10px;
}
.leader-cmt-input input {
  flex: 1;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 8px 12px;
  font-size: 12px;
  outline: none;
}
.leader-cmt-input input:focus { border-color: var(--coral); }
.leader-cmt-input .send {
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  display: grid; place-items: center;
  color: #fff;
  cursor: pointer;
}

.leader-card .act.open {
  background: var(--coral-soft);
  color: var(--coral);
}

/* Phone-chats — 2 columns (one per principle) */
.phone-chats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}
.phone-chat {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  display: flex; flex-direction: column;
  box-shadow: var(--sh-2);
  overflow: hidden;
}
.pc-head {
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, var(--cream-2), var(--paper));
}
.pc-title {
  display: flex; flex-direction: column; gap: 4px;
}
.pc-no {
  display: inline-block;
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
  letter-spacing: 0.08em;
  align-self: flex-start;
}
.pc-rule { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.pc-meta {
  display: flex; align-items: center; gap: 6px;
  margin-top: 8px;
  font-size: 11px;
  color: var(--ink-3);
}
.pc-meta .dot-on {
  width: 6px; height: 6px;
  background: var(--mint);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--mint);
}
.pc-feed {
  flex: 1;
  padding: 14px 16px;
  background: var(--cream);
  min-height: 320px; max-height: 460px;
  display: flex; flex-direction: column; gap: 12px;
}
.pc-day {
  text-align: center;
  font-size: 11px;
  color: var(--ink-3);
  padding: 4px 12px;
  background: var(--line-2);
  border-radius: 999px;
  align-self: center;
}
.pc-bub {
  display: flex; gap: 8px;
  align-items: flex-start;
}
.pc-bub.me { flex-direction: row-reverse; }
.pc-av {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--paper);
  display: grid; place-items: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: var(--sh-1);
}
.pc-col {
  display: flex; flex-direction: column;
  max-width: 75%;
  gap: 3px;
}
.pc-bub.me .pc-col { align-items: flex-end; }
.pc-nm {
  font-size: 10.5px;
  color: var(--ink-3);
  font-weight: 600;
}
.pc-row {
  display: flex; gap: 6px; align-items: flex-end;
}
.pc-bb {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 14px 14px 14px 4px;
  padding: 9px 12px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--ink);
  box-shadow: var(--sh-1);
}
.pc-bub.me .pc-bb {
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  border-color: transparent;
  color: #fff;
  border-radius: 14px 14px 4px 14px;
  box-shadow: 0 4px 12px -2px rgba(255, 107, 90, .35);
}
.pc-time {
  font-size: 9.5px;
  color: var(--ink-3);
  white-space: nowrap;
}
.pc-react { font-size: 11px; }
.pc-react .heart {
  cursor: pointer;
  color: var(--ink-3);
  transition: color .2s;
  padding: 1px 5px;
  border-radius: 999px;
}
.pc-react .heart:hover { color: var(--coral); }
.pc-react .heart.liked { color: var(--coral); font-weight: 600; }
.pc-react.me { text-align: right; }
.pc-input {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px;
  border-top: 1px solid var(--line);
  background: var(--paper);
}
.pc-input .anon {
  font-size: 10.5px;
  color: var(--ink-3);
  background: var(--cream-2);
  padding: 4px 8px;
  border-radius: 999px;
  display: flex; align-items: center; gap: 4px;
  font-weight: 600;
  white-space: nowrap;
}
.pc-input input {
  flex: 1;
  background: var(--cream);
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  padding: 8px 14px;
  font-size: 12.5px;
  outline: none;
  min-width: 0;
}
.pc-input input:focus { border-color: var(--coral); }
.pc-send {
  background: linear-gradient(135deg, var(--coral), var(--lilac));
  border: none;
  width: 34px; height: 34px;
  border-radius: 50%;
  display: grid; place-items: center;
  color: #fff;
  cursor: pointer;
  flex-shrink: 0;
}

/* =========================================================
   PLAY — sticker tooltip
   ========================================================= */
.sticker { position: relative; cursor: pointer; }
.sticker .sticker-tip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(4px);
  background: linear-gradient(135deg, var(--plum), var(--plum-2));
  color: #fff;
  padding: 8px 12px;
  border-radius: var(--r-sm);
  font-size: 11.5px;
  line-height: 1.4;
  white-space: nowrap;
  max-width: 240px;
  white-space: normal;
  width: max-content;
  opacity: 0;
  pointer-events: none;
  transition: all .2s;
  z-index: 100;
  box-shadow: var(--sh-3);
  text-align: center;
  font-weight: 500;
}
.sticker .sticker-tip::after {
  content: "";
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border-style: solid;
  border-width: 6px 6px 0 6px;
  border-color: var(--plum-2) transparent transparent transparent;
}
.sticker:hover .sticker-tip,
.sticker.selected .sticker-tip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* =========================================================
   RULE — 3-column proposals
   ========================================================= */
.proposals.proposals-3col {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
}
.prop-group {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  display: flex; flex-direction: column;
  box-shadow: var(--sh-1);
  overflow: hidden;
}
.pg-head {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, var(--cream-2), var(--paper));
}
.pg-head-top {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.pg-no {
  font-size: 10px; font-weight: 700;
  background: var(--coral);
  color: #fff;
  padding: 2px 8px;
  border-radius: 999px;
  letter-spacing: 0.08em;
}
.prop-group:nth-child(2) .pg-no { background: var(--lilac); }
.prop-group:nth-child(3) .pg-no { background: var(--mint); }
.pg-meta { font-size: 10.5px; color: var(--ink-3); }
.pg-title { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.4; }

.prop-list {
  padding: 10px 12px;
  max-height: 440px;
  display: flex; flex-direction: column; gap: 10px;
  flex: 1;
}
.prop {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  box-shadow: var(--sh-1);
}
.prop .top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.prop .av-emo {
  width: 24px; height: 24px;
  background: var(--cream);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 13px;
  flex-shrink: 0;
}
.prop .who {
  flex: 1; font-size: 11.5px; color: var(--ink);
  font-weight: 600;
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
}
.prop .who .t { color: var(--ink-3); font-weight: 400; }
.prop .me-tag {
  font-family: var(--f-display); font-style: italic;
  font-size: 9.5px;
  background: linear-gradient(90deg, var(--coral), var(--lilac));
  color: #fff;
  padding: 0 6px;
  border-radius: 999px;
  font-weight: 700;
}
.prop .heart {
  font-size: 11px;
  color: var(--ink-3);
  cursor: pointer;
  padding: 2px 7px;
  border-radius: 999px;
  transition: all .2s;
}
.prop .heart:hover { background: var(--coral-soft); color: var(--coral); }
.prop .heart.liked { background: var(--coral-soft); color: var(--coral); font-weight: 700; }
.prop .txt {
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.5;
}
.prop .tags {
  display: flex; gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.prop .tag {
  font-size: 10.5px;
  color: var(--ink-2);
  background: var(--cream-2);
  padding: 2px 7px;
  border-radius: 999px;
  display: inline-flex; gap: 3px;
}
.prop .tag em {
  font-style: normal;
  color: var(--ink-3);
}

/* =========================================================
   RULE — Step 04 confirm status
   ========================================================= */
.confirm-status {
  margin-top: 16px;
  border-radius: var(--r-xl);
  padding: 22px 26px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: var(--sh-3);
  background: linear-gradient(135deg, var(--plum), var(--plum-2));
}
.confirm-status::before {
  content: "";
  position: absolute;
  right: -40px; top: -40px;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255, 107, 90, .55), transparent 65%);
  pointer-events: none;
}
.confirm-status .cs-head {
  display: flex; align-items: center; gap: 14px;
  position: relative;
}
.confirm-status .cs-head .crown {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--sun), var(--coral));
  border-radius: 14px;
  display: grid; place-items: center;
  box-shadow: var(--sh-glow-coral);
}
.confirm-status .cs-head h3 {
  margin: 0;
  font-family: var(--f-display);
  font-size: 19px;
  margin-top: 2px;
}
.confirm-status .cs-head .eyebrow {
  font-size: 11px;
  opacity: .7;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.confirm-status .status-badge {
  margin-left: auto;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  background: rgba(255, 255, 255, .15);
  color: #fff;
}
.confirm-status.done .status-badge {
  background: var(--mint);
  box-shadow: 0 0 12px rgba(52, 211, 153, .55);
}
.confirm-status .pending-msg {
  margin-top: 16px;
  padding: 12px 14px;
  background: rgba(255, 255, 255, .08);
  border: 1px dashed rgba(255, 255, 255, .25);
  border-radius: var(--r-sm);
  display: flex; align-items: center; gap: 8px;
  font-size: 12.5px;
  position: relative;
  color: rgba(255, 255, 255, .85);
}
.confirm-status .conf-text {
  margin-top: 14px;
  font-size: 17px;
  line-height: 1.5;
  position: relative;
  font-family: var(--f-display);
  font-style: italic;
}
.confirm-status .conf-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 22px;
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid rgba(255, 255, 255, .15);
  position: relative;
}
.confirm-status .conf-meta .l {
  font-size: 10.5px;
  opacity: .65;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.confirm-status .conf-meta .v {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 18px;
  color: var(--sun);
  margin-top: 2px;
  display: block;
}
.confirm-status .confirm-action {
  margin-top: 18px;
  display: flex; justify-content: flex-end;
  position: relative;
}

/* =========================================================
   ParticipationCard — collapsible, default closed
   ========================================================= */
.participation {
  padding: 14px 16px;
}
.participation .pa-head {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
  padding: 4px 0;
}
.participation .pa-head h3 {
  margin: 0; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-2);
}
.participation .pa-head-right {
  display: flex; align-items: center; gap: 10px;
}
.participation .pa-pct {
  font-family: var(--f-display);
  font-style: italic;
  font-size: 18px;
  color: var(--coral);
}
.participation .pa-chev {
  display: inline-grid; place-items: center;
  width: 20px; height: 20px;
  color: var(--ink-3);
  transition: transform .2s;
}
.participation .pa-chev.open { transform: rotate(180deg); }
.participation.closed .ab-stats,
.participation.closed .ab-list { display: none; }
.participation.open .ab-stats { margin-top: 12px; }
.participation .pa-state {
  font-size: 13px;
  font-weight: 700;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
}
.participation .pa-state.done {
  background: var(--mint-soft);
  color: var(--mint);
}
.participation .pa-state.miss {
  background: var(--line-2);
  color: var(--ink-3);
}

/* =========================================================
   Calendar — July 2026 + Gantt timeline
   ========================================================= */
.cal-cell .cell-dots {
  position: absolute;
  bottom: 2px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 2px;
}
.cal-cell .cd {
  width: 4px; height: 4px;
  border-radius: 50%;
}
.cd.coral { background: var(--coral); }
.cd.lilac { background: var(--lilac); }
.cd.mint  { background: var(--mint); }

.cal-schedule {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}
.cal-schedule .lbl {
  font-size: 10.5px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.gantt { display: flex; flex-direction: column; gap: 8px; }
.gantt-row {
  display: grid;
  grid-template-columns: 44px 1fr;
